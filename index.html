<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AST Deobfuscator v11 (The Silver Bullet)</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; --success: #3fb950; --error: #f85149; --warning: #d29922; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 26px; color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 75vh; }
        textarea {
            width: 100%; height: 100%; font-family: 'Consolas', monospace; padding: 15px;
            background: #010409; color: #7ee787; border: 1px solid var(--border); border-radius: 8px;
            resize: none; box-sizing: border-box; font-size: 14px; line-height: 1.5; outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        .controls { padding: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        button { background-color: var(--success); color: #fff; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; align-self: flex-start; transition: 0.2s; }
        button:hover:not(:disabled) { filter: brightness(1.2); }
        button:disabled { background-color: var(--border); color: #8b949e; cursor: not-allowed; }
        #log { font-family: monospace; font-size: 13px; color: var(--accent); white-space: pre-wrap; max-height: 200px; overflow-y: auto; padding: 10px; background: #010409; border-radius: 6px; border: 1px solid var(--border);}
    </style>
</head>
<body>

<div class="container">
    <h1>Ultimate AST Deobfuscator v11 (The Silver Bullet)</h1>
    
    <div class="controls">
        <button id="runBtn" onclick="runDeobfuscator()" disabled>システム起動中...</button>
        <div id="log"></div>
    </div>

    <div class="grid">
        <textarea id="input" spellcheck="false" placeholder="/* ここに難読化コードを貼り付け */"></textarea>
        <textarea id="output" spellcheck="false" readonly placeholder="/* 解析結果がここに表示されます (ファイルの末尾を確認してください) */"></textarea>
    </div>
</div>

<script>
const logEl = document.getElementById('log');
const btn = document.getElementById('runBtn');

function log(msg, colorType = 'inherit') {
    let color = colorType === 'error' ? 'var(--error)' : colorType === 'warning' ? 'var(--warning)' : 'inherit';
    logEl.innerHTML += `<span style="color: ${color}">${msg}</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;
}

window.onload = function() {
    logEl.innerHTML = "";
    if (typeof Babel !== 'undefined' && typeof js_beautify !== 'undefined') {
        log("✅ 全システムの起動が完了しました。");
        btn.disabled = false;
        btn.innerText = "Deobfuscate 実行";
    } else {
        log("❌ 致命的エラー: ライブラリの読み込みに失敗", 'error');
    }
};

const yieldThread = () => new Promise(resolve => setTimeout(resolve, 10));

async function runDeobfuscator() {
    btn.disabled = true;
    btn.innerText = "解析中...";
    logEl.innerHTML = "";
    document.getElementById('output').value = "";

    let code = document.getElementById('input').value;
    if (!code.trim()) { 
        log("❌ エラー: コードが入力されていません。", 'error'); 
        btn.disabled = false; btn.innerText = "Deobfuscate 実行"; 
        return; 
    }

    let iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    let win = iframe.contentWindow;
    let doc = iframe.contentDocument;

    try {
        const babelTransform = window.Babel.transform;

        // =====================================================================
        // Phase 1: サンドボックス構築とパッカーのネイティブ実行
        // =====================================================================
        log("[*] Phase 1/6: サンドボックス構築とパッカーのネイティブ実行..."); await yieldThread();
        
        // 悪意のある処理を無効化し、外部からスクリプトスコープにアクセスできるヘルパーを注入
        doc.write(`
            <script>
                window.console = new Proxy({}, { get: () => function(){} });
                window.alert = window.confirm = window.prompt = function(){};
                window.setTimeout = window.setInterval = function(){};
                window.document.write = function(){};
                window.__eval = function(expr) {
                    try { return eval(expr); } catch(e) { return null; }
                };
            <\/script>
        `);

        // 入力されたコードを一切改変せずに流し込む (アンチ改ざんを100%回避)
        let escapedCode = code.replace(/<\/script>/gi, '<\\/script>');
        doc.write(`<script>${escapedCode}<\/script>`);
        doc.close();
        await yieldThread();

        // =====================================================================
        // Phase 2: 定数畳み込み (Constant Folding)
        // =====================================================================
        log("[*] Phase 2/6: ASTの静的定数畳み込み..."); await yieldThread();
        code = babelTransform(code, {
            plugins: [function(babel) {
                const t = babel.types;
                return {
                    visitor: {
                        "BinaryExpression|LogicalExpression|UnaryExpression"(path) {
                            try {
                                const evaluated = path.evaluate();
                                if (evaluated.confident && evaluated.value !== undefined && evaluated.value !== null) {
                                    if (typeof evaluated.value === 'number' && isNaN(evaluated.value)) return;
                                    path.replaceWith(t.valueToNode(evaluated.value));
                                }
                            } catch(e) {}
                        }
                    }
                };
            }], retainLines: false
        }).code;

        // =====================================================================
        // Phase 3: 動的 Brute-force 式評価 (ネストの完全解体)
        // =====================================================================
        log("[*] Phase 3/6: 生きたデコーダへの直接問い合わせ (Brute-force)..."); await yieldThread();
        
        let prevCode = "";
        let iterations = 0;
        
        // ネストされた暗号化 ( _0x123(_0x456(1)) など ) を完全に解くため、変更がなくなるまでループ
        while (prevCode !== code && iterations < 5) {
            prevCode = code;
            iterations++;
            code = babelTransform(code, {
                plugins: [function(babel) {
                    const t = babel.types;

                    // ASTノードを評価用文字列に再構築
                    function nodeToCode(node) {
                        if (!node) return null;
                        if (node.type === 'Identifier') return node.name;
                        if (node.type === 'StringLiteral') return JSON.stringify(node.value);
                        if (node.type === 'NumericLiteral') return node.value;
                        if (node.type === 'BooleanLiteral') return node.value;
                        if (node.type === 'MemberExpression') {
                            let obj = nodeToCode(node.object);
                            if (!obj) return null;
                            if (node.computed) {
                                let prop = nodeToCode(node.property);
                                if (!prop) return null; return `${obj}[${prop}]`;
                            } else {
                                return `${obj}.${node.property.name}`;
                            }
                        }
                        if (node.type === 'CallExpression') {
                            let callee = nodeToCode(node.callee);
                            if (!callee) return null;
                            let args = node.arguments.map(nodeToCode);
                            if (args.includes(null)) return null;
                            return `${callee}(${args.join(',')})`;
                        }
                        if (node.type === 'UnaryExpression') {
                            let arg = nodeToCode(node.argument);
                            if (!arg) return null; return `${node.operator}${arg}`;
                        }
                        if (node.type === 'ArrayExpression') {
                            let elems = node.elements.map(nodeToCode);
                            if (elems.includes(null)) return null; return `[${elems.join(',')}]`;
                        }
                        return null;
                    }

                    const resolveDynamic = (path) => {
                        let codeSnippet = nodeToCode(path.node);
                        if (!codeSnippet) return;
                        
                        // ネイティブAPIやプログラム本来の副作用（console.log等）は絶対に横取りしない
                        if (/^(console|document|window|alert|prompt|confirm|setTimeout|setInterval|Math|Date|String|Number|Array|Object|RegExp)\b/.test(codeSnippet)) return;
                        
                        try {
                            // サンドボックスのデコーダに計算させる
                            let res = win.__eval(codeSnippet);
                            if (res !== null && res !== undefined && typeof res !== 'function' && typeof res !== 'object') {
                                if (typeof res === 'string') path.replaceWith(t.stringLiteral(res));
                                else if (typeof res === 'number') path.replaceWith(t.numericLiteral(res));
                                else if (typeof res === 'boolean') path.replaceWith(t.booleanLiteral(res));
                            }
                        } catch(e) {}
                    };

                    return {
                        visitor: {
                            CallExpression(path) { resolveDynamic(path); },
                            MemberExpression(path) {
                                // 親が呼び出しの場合は、部分的な置換を避けて全体で評価させる
                                if (path.parent.type === 'CallExpression' && path.parent.callee === path.node) return;
                                if (path.parent.type === 'AssignmentExpression' && path.parent.left === path.node) return;
                                resolveDynamic(path);
                            }
                        }
                    };
                }], retainLines: false
            }).code;
        }

        // =====================================================================
        // Phase 4: ASTの正規化
        // =====================================================================
        log("[*] Phase 4/6: ASTの正規化..."); await yieldThread();
        code = babelTransform(code, {
            plugins: [function(babel) {
                const t = babel.types;
                return {
                    visitor: {
                        ExpressionStatement(path) {
                            if (path.node.expression && path.node.expression.type === 'SequenceExpression') {
                                path.replaceWithMultiple(path.node.expression.expressions.map(e => t.expressionStatement(e)));
                            }
                        },
                        MemberExpression(path) {
                            if (path.node.computed && path.node.property.type === 'StringLiteral') {
                                const prop = path.node.property.value;
                                if (/^[a-zA-Z_$][0-9a-zA-Z_$]*$/.test(prop)) {
                                    path.node.property = t.identifier(prop);
                                    path.node.computed = false;
                                }
                            }
                        }
                    }
                };
            }], retainLines: false
        }).code;

        // =====================================================================
        // Phase 5: デッドコード（ゴミ箱）の清掃
        // =====================================================================
        log("[*] Phase 5/6: 不要変数の削除 (Dead Code Elimination)..."); await yieldThread();
        code = babelTransform(code, {
            plugins: [function() {
                return {
                    visitor: {
                        "VariableDeclarator"(path) {
                            if (path.node.id && path.node.id.name) {
                                const binding = path.scope.getBinding(path.node.id.name);
                                if (binding && !binding.referenced && !binding.constantViolations.length) path.remove();
                            }
                        }
                    }
                };
            }], retainLines: false
        }).code;

        // =====================================================================
        // Phase 6: フォーマット
        // =====================================================================
        log("[*] Phase 6/6: コードの美化フォーマット..."); await yieldThread();
        code = js_beautify(code, { indent_size: 4, space_in_empty_paren: true, preserve_newlines: false });
        
        document.getElementById('output').value = code;
        log("✅ 解読完了！ 出力ファイルの【一番下】に本物のコードが出現します。", 'warning');

    } catch (e) {
        log(`❌ 致命的なエラーが発生しました:\n${e.name}: ${e.message}`, 'error');
    } finally {
        if (iframe) document.body.removeChild(iframe);
        btn.disabled = false;
        btn.innerText = "Deobfuscate 実行";
    }
}
</script>
</body>
</html>
