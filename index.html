<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal JS Deobfuscator Studio</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Fira Code) -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* モバイルキーボード対策：fixedを利用し全体のスクロール・見切れを無効化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden !important; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .toolbar { padding: 10px 15px; background-color: #0d1117; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        
        .main-container { 
            display: flex; 
            flex-direction: column; /* モバイルでは縦並び */
            gap: 15px; 
            padding: 0 15px 15px 15px; 
            flex: 1; 
            min-height: 0;
        }
        
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row; /* PCでは横並び */
                padding: 0 20px 20px 20px;
                gap: 20px;
            }
            .toolbar { padding: 12px 20px; gap: 10px; }
        }
        
        /* ウィンドウ風パネル */
        .window-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
            min-height: 0;
        }
        .window-header { 
            padding: 8px 15px; 
            background-color: #21262d; 
            font-size: 0.9em; 
            font-weight: 600; 
            border-bottom: 1px solid #30363d; 
            color: #e6edf3; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0;
        }
        
        /* エディタ部分 */
        .editor { 
            flex: 1; 
            background-color: #0d1117; 
            color: #e6edf3; 
            border: none; 
            padding: 15px; 
            font-family: 'Fira Code', monospace; 
            font-size: 13px; 
            line-height: 1.5;
            outline: none; 
            resize: none; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* ログウィンドウ */
        .log-container {
            padding: 0 15px 15px 15px;
            height: 25dvh;
            display: flex;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .log-container { padding: 0 20px 20px 20px; height: 280px; }
        }
        .log-content { 
            flex: 1; 
            padding: 12px 15px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-family: 'Fira Code', monospace; 
            font-size: 12px; 
            color: #8b949e; 
            background-color: #0d1117;
        }
        .log-entry { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #21262d; word-break: break-all; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.success { color: #3fb950; }
        .log-entry.error { color: #f85149; }
        .log-entry.warning { color: #d29922; }
        
        .btn-custom { background-color: #21262d; color: #c9d1d9; border: 1px solid #363b42; }
        .btn-custom:hover { background-color: #30363d; color: #fff; border-color: #8b949e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h5" style="font-weight: 600;">
            <i class="bi bi-shield-check me-2" style="color: #3fb950;"></i>Universal JS Deobfuscator
        </span>
    </div>
</nav>

<div class="toolbar">
    <button class="btn btn-success btn-sm fw-bold" id="btn-auto" title="Packer抽出とAST解除を安全に連続実行します">
        <i class="bi bi-magic me-1"></i> Deep Auto
    </button>
    <button class="btn btn-custom btn-sm" id="btn-unpack"><i class="bi bi-box-arrow-up-right me-1"></i> Static Unpack</button>
    <button class="btn btn-custom btn-sm" id="btn-strings"><i class="bi bi-fonts me-1"></i> AST Decode</button>
    <button class="btn btn-custom btn-sm" id="btn-format"><i class="bi bi-code-slash me-1"></i> Beautify</button>
    <button class="btn btn-outline-danger btn-sm ms-auto" id="btn-clear"><i class="bi bi-trash"></i></button>
</div>

<div class="main-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-code me-2"></i>Input (Obfuscated)</span>
        </div>
        <textarea class="editor" id="input-editor" spellcheck="false" placeholder="ここに難読化されたJavaScriptコードを貼り付けてください..."></textarea>
    </div>
    
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-check me-2"></i>Output (Deobfuscated)</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-copy" title="Copy to Clipboard"><i class="bi bi-clipboard"></i></button>
        </div>
        <textarea class="editor" id="output-editor" spellcheck="false" readonly placeholder="デコード・整形されたコードがここに表示されます..."></textarea>
    </div>
</div>

<div class="log-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-terminal me-2"></i>Execution Log</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-clear-log" title="Clear Logs"><i class="bi bi-eraser"></i></button>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</div>

<!-- Babel Standalone (AST Parsing) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- js-beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

<script>
    const inputEditor = document.getElementById('input-editor');
    const outputEditor = document.getElementById('output-editor');
    const logContent = document.getElementById('log-content');

    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        if (type === 'error') icon = 'bi-x-circle';
        if (type === 'warning') icon = 'bi-exclamation-triangle';
        entry.innerHTML = `<span style="color: #484f58; font-size: 0.9em;">[${timestamp}]</span> <i class="bi ${icon} me-1"></i> ${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        inputEditor.value = ''; outputEditor.value = ''; logContent.innerHTML = '';
        log('エディタとログをクリアしました。', 'info');
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => logContent.innerHTML = '');
    document.getElementById('btn-copy').addEventListener('click', () => {
        outputEditor.select(); document.execCommand('copy');
        log('出力コードをクリップボードにコピーしました。', 'success');
    });

    function formatCode(code) {
        if (typeof js_beautify !== 'function') return code;
        try {
            return js_beautify(code, {
                indent_size: 4, space_in_empty_paren: true, preserve_newlines: true, max_preserve_newlines: 2, jslint_happy: true, brace_style: "collapse"
            });
        } catch (e) {
            return code;
        }
    }

    document.getElementById('btn-format').addEventListener('click', () => {
        const code = outputEditor.value || inputEditor.value;
        if (!code) return;
        outputEditor.value = formatCode(code);
        log("コードの整形が完了しました。", "success");
    });

    // ==========================================
    // 1. Static Unpacker (JS Confuser等 Function(...)パッカー対応)
    // ==========================================
    function staticUnpack(code) {
        let payload = code;
        let unpacked = false;

        try {
            Babel.transform(code, {
                ast: false, code: false,
                parserOpts: { allowReturnOutsideFunction: true },
                plugins:[
                    function({ types: t }) {
                        return {
                            visitor: {
                                CallExpression(path) {
                                    if (path.node._visited) return;
                                    
                                    // パターン: Function("...", "コード")(...)
                                    if (t.isCallExpression(path.node.callee) && t.isIdentifier(path.node.callee.callee, {name: 'Function'})) {
                                        const args = path.node.callee.arguments;
                                        if (args.length > 0 && t.isStringLiteral(args[args.length - 1])) {
                                            payload = args[args.length - 1].value;
                                            unpacked = true;
                                            path.stop();
                                        }
                                    }
                                    // パターン: eval("コード")
                                    else if (t.isIdentifier(path.node.callee, {name: 'eval'})) {
                                        const args = path.node.arguments;
                                        if (args.length === 1 && t.isStringLiteral(args[0])) {
                                            payload = args[0].value;
                                            unpacked = true;
                                            path.stop();
                                        }
                                    }
                                }
                            }
                        };
                    }
                ]
            });
        } catch (e) {
            log("静的アンパック中にASTパースエラー: " + e.message, "warning");
        }

        if (unpacked) log(`Function/eval パッカーからコードを抽出しました (${payload.length} bytes)`, "success");
        return { code: payload, changed: unpacked };
    }

    document.getElementById('btn-unpack').addEventListener('click', () => {
        const code = inputEditor.value;
        if (!code) return;
        const res = staticUnpack(code);
        outputEditor.value = formatCode(res.code);
    });

    // ==========================================
    // 2. Safe AST Decoder & Deflattener
    // ==========================================
    function decodeAST(code) {
        let setupCode = "";
        
        // --- 1. セットアップコードの安全な抽出 ---
        try {
            Babel.transform(code, {
                ast: false, code: false,
                parserOpts: { allowReturnOutsideFunction: true },
                plugins:[
                    function({ types: t }) {
                        return {
                            visitor: {
                                VariableDeclaration(path) {
                                    if (t.isProgram(path.parent) || t.isBlockStatement(path.parent)) {
                                        setupCode += Babel.transformFromAst(t.program([t.cloneNode(path.node)]), "", {}).code + "\n";
                                    }
                                },
                                FunctionDeclaration(path) {
                                    if (t.isProgram(path.parent) || t.isBlockStatement(path.parent)) {
                                        setupCode += Babel.transformFromAst(t.program([t.cloneNode(path.node)]), "", {}).code + "\n";
                                    }
                                },
                                ExpressionStatement(path) {
                                    if (t.isProgram(path.parent) || t.isBlockStatement(path.parent)) {
                                        const snippet = Babel.transformFromAst(t.program([t.cloneNode(path.node)]), "", {}).code;
                                        // 配列シフト等の初期化処理らしきものを許可
                                        if (snippet.includes('push') || snippet.includes('shift') || snippet.includes('indexOf')) {
                                            setupCode += snippet + "\n";
                                        }
                                    }
                                }
                            }
                        };
                    }
                ]
            });
        } catch(e) {
            log("ASTのパースに失敗: " + e.message, "error");
            return { code, changed: false };
        }

        // サンドボックスで評価 (安全な部分だけを評価して環境を作る)
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const win = iframe.contentWindow;
        try {
            win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{} };
            win.setTimeout = function(){}; win.setInterval = function(){};
            win.eval(setupCode);
        } catch (e) {
            // 無視
        }

        let replacedCount = 0;
        let foldedCount = 0;

        // --- 2. デコーダ関数の実行と制御フロー平坦化の解除 ---
        const deobfuscatePlugin = function({ types: t }) {
            return {
                visitor: {
                    // デコーダー関数の評価と置換
                    CallExpression(path) {
                        if (path.node._visited) return;
                        if (t.isIdentifier(path.node.callee)) {
                            const funcName = path.node.callee.name;
                            // 危険なネイティブ関数は無視
                            if (['eval', 'require', 'setTimeout', 'setInterval', 'Function', 'console', 'parseInt', 'String'].includes(funcName)) return;
                            
                            const isLiteral = (arg) => t.isLiteral(arg) || (t.isUnaryExpression(arg) && t.isLiteral(arg.argument));
                            
                            if (path.node.arguments.length > 0 && path.node.arguments.every(isLiteral)) {
                                if (typeof win[funcName] === 'function') {
                                    try {
                                        const callCode = Babel.transformFromAst(t.program([t.expressionStatement(t.cloneNode(path.node))]), "", {ast:false, code:true}).code;
                                        const res = win.eval(callCode);
                                        
                                        let newNode = null;
                                        if (typeof res === 'string') newNode = t.stringLiteral(res);
                                        else if (typeof res === 'number') newNode = t.numericLiteral(res);
                                        else if (typeof res === 'boolean') newNode = t.booleanLiteral(res);

                                        if (newNode) {
                                            newNode._visited = true; // 無限ループ防止フラグ
                                            path.replaceWith(newNode);
                                            replacedCount++;
                                        }
                                    } catch(e) {}
                                }
                            }
                        }
                    },
                    
                    // 定数畳み込み
                    BinaryExpression(path) {
                        if (path.node._visited) return;
                        try {
                            const evaluated = path.evaluate();
                            if (evaluated.confident) {
                                let newNode = null;
                                if (typeof evaluated.value === 'string') newNode = t.stringLiteral(evaluated.value);
                                else if (typeof evaluated.value === 'number') newNode = t.numericLiteral(evaluated.value);
                                else if (typeof evaluated.value === 'boolean') newNode = t.booleanLiteral(evaluated.value);

                                if (newNode) {
                                    newNode._visited = true;
                                    path.replaceWith(newNode);
                                    foldedCount++;
                                }
                            }
                        } catch(e){}
                    },

                    // 制御フロー平坦化の解除
                    WhileStatement(path) {
                        if (path.node._visited) return;
                        const body = path.node.body;
                        if (!t.isBlockStatement(body)) return;
                        const switchStmt = body.body.find(n => t.isSwitchStatement(n));
                        if (!switchStmt) return;
                        
                        // パターン: switch(array[x++])
                        if (t.isMemberExpression(switchStmt.discriminant) && t.isUpdateExpression(switchStmt.discriminant.property)) {
                            const arrayName = switchStmt.discriminant.object.name;
                            const binding = path.scope.getBinding(arrayName);
                            if (binding && binding.path.isVariableDeclarator()) {
                                const init = binding.path.node.init;
                                let seq;
                                const evalRes = binding.path.get('init').evaluate();
                                if (evalRes.confident && Array.isArray(evalRes.value)) {
                                    seq = evalRes.value;
                                } else {
                                    try { 
                                        const codePart = Babel.transformFromAst(t.program([t.expressionStatement(t.cloneNode(init))]), "", {}).code;
                                        seq = win.eval(codePart); 
                                    } catch(e) {}
                                }
                                
                                if (Array.isArray(seq)) {
                                    const caseMap = {};
                                    switchStmt.cases.forEach(c => {
                                        if (c.test && (t.isStringLiteral(c.test) || t.isNumericLiteral(c.test))) {
                                            caseMap[c.test.value] = c.consequent.filter(n => !t.isContinueStatement(n) && !t.isBreakStatement(n));
                                        }
                                    });
                                    
                                    let unflattened =[];
                                    let valid = true;
                                    seq.forEach(key => {
                                        if (caseMap[key]) {
                                            caseMap[key].forEach(n => { 
                                                const cloned = t.cloneNode(n, true);
                                                cloned._visited = true; 
                                                unflattened.push(cloned); 
                                            });
                                        } else valid = false;
                                    });
                                    
                                    if (valid && unflattened.length > 0) {
                                        path.node._visited = true;
                                        path.replaceWithMultiple(unflattened);
                                        replacedCount++;
                                    }
                                }
                            }
                        }

                        // パターン: switch(state) (Example 4)
                        if (t.isIdentifier(switchStmt.discriminant)) {
                            const stateVarName = switchStmt.discriminant.name;
                            const binding = path.scope.getBinding(stateVarName);
                            if (binding && binding.path.isVariableDeclarator()) {
                                const initVal = binding.path.node.init;
                                if (t.isNumericLiteral(initVal) || t.isStringLiteral(initVal)) {
                                    let currentState = initVal.value;
                                    const caseMap = {};
                                    switchStmt.cases.forEach(c => {
                                        if (c.test && (t.isNumericLiteral(c.test) || t.isStringLiteral(c.test))) {
                                            const stmts = c.consequent.filter(stmt => !t.isBreakStatement(stmt));
                                            let nextState = null;
                                            const cleanStmts =[];
                                            for (const stmt of stmts) {
                                                if (t.isExpressionStatement(stmt) && t.isAssignmentExpression(stmt.expression) && t.isIdentifier(stmt.expression.left, { name: stateVarName })) {
                                                    if (t.isNumericLiteral(stmt.expression.right) || t.isStringLiteral(stmt.expression.right)) {
                                                        nextState = stmt.expression.right.value;
                                                        continue;
                                                    }
                                                }
                                                // ブロック内の代入をチェック
                                                if (t.isBlockStatement(stmt)) {
                                                    let innerNextState = null;
                                                    const cleanInner =[];
                                                    for (const inner of stmt.body) {
                                                        if (t.isExpressionStatement(inner) && t.isAssignmentExpression(inner.expression) && t.isIdentifier(inner.expression.left, { name: stateVarName })) {
                                                            if (t.isNumericLiteral(inner.expression.right) || t.isStringLiteral(inner.expression.right)) {
                                                                innerNextState = inner.expression.right.value;
                                                                continue;
                                                            }
                                                        }
                                                        inner._visited = true;
                                                        cleanInner.push(inner);
                                                    }
                                                    if (innerNextState !== null) { nextState = innerNextState; stmt.body = cleanInner; }
                                                }
                                                stmt._visited = true;
                                                cleanStmts.push(stmt);
                                            }
                                            caseMap[c.test.value] = { stmts: cleanStmts, nextState: nextState };
                                        }
                                    });
                                    
                                    const unflattened =[];
                                    let curr = currentState;
                                    let visited = new Set();
                                    
                                    while (curr !== null && caseMap[curr] && !visited.has(curr)) {
                                        visited.add(curr);
                                        caseMap[curr].stmts.forEach(s => {
                                            const cloned = t.cloneNode(s, true);
                                            cloned._visited = true;
                                            unflattened.push(cloned);
                                        });
                                        curr = caseMap[curr].nextState;
                                    }
                                    
                                    if (unflattened.length > 0) {
                                        path.node._visited = true;
                                        path.replaceWithMultiple(unflattened);
                                        replacedCount++;
                                    }
                                }
                            }
                        }
                    }
                }
            };
        };

        try {
            const transformed = Babel.transform(code, {
                ast: false, code: true,
                parserOpts: { allowReturnOutsideFunction: true },
                generatorOpts: { jsescOption: { minimal: true } },
                plugins: [deobfuscatePlugin]
            });
            document.body.removeChild(iframe);
            if (replacedCount > 0 || foldedCount > 0) {
                log(`AST置換: ロジック解除 ${replacedCount}箇所, 定数計算 ${foldedCount}箇所`, "info");
            }
            return { code: transformed.code, changed: (replacedCount > 0 || foldedCount > 0) };
        } catch (e) {
            document.body.removeChild(iframe);
            log("AST置換エラー: " + e.message, "error");
            return { code, changed: false };
        }
    }

    document.getElementById('btn-strings').addEventListener('click', () => {
        const code = inputEditor.value;
        if (!code) return;
        const result = decodeAST(code);
        outputEditor.value = formatCode(result.code);
    });

    // ==========================================
    // 3. Deep Auto Deobfuscation (パイプライン統合)
    // ==========================================
    document.getElementById('btn-auto').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        
        log("==== Deep Auto Deobfuscation 開始 ====", "success");
        outputEditor.value = "解析・復元中...";
        
        let currentCode = code;
        let prevOverallCode = "";
        let globalIter = 0;
        const MAX_GLOBAL_ITER = 3;

        while (currentCode !== prevOverallCode && globalIter < MAX_GLOBAL_ITER) {
            prevOverallCode = currentCode;
            globalIter++;
            log(`[Pass ${globalIter}] アンパックと解析を実行中...`, "warning");
            
            // 1. 静的アンパック (Function("...") 解除)
            const unpackRes = staticUnpack(currentCode);
            if (unpackRes.changed) {
                currentCode = unpackRes.code;
            }

            // 2. AST デコード (変化がなくなるまで回す)
            let prevAstCode = "";
            let astIter = 0;
            const MAX_AST_ITER = 4;
            while (currentCode !== prevAstCode && astIter < MAX_AST_ITER) {
                prevAstCode = currentCode;
                const result = decodeAST(currentCode);
                currentCode = result.code;
                if (!result.changed) break;
                astIter++;
            }
        }
        
        log("コードをフォーマットしています...", "info");
        currentCode = formatCode(currentCode);
        
        outputEditor.value = currentCode;
        log(`==== 解析完了 (総実行パス数: ${globalIter}) ====`, "success");
    });
</script>
</body>
</html>
