<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal JS Deobfuscator Studio</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Fira Code & Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/darcula.min.css">
    
    <style>
        /* お気に入りの色合いを維持しつつ、余白・丸みを削ったコンパクトなスタイル */
        html, body {
            margin: 0;
            padding: 12px;
            height: 100vh;
            background-color: #17181a; 
            color: #d4d4d4; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* ダッシュボード型（各パネル内でスクロール） */
            box-sizing: border-box;
        }
        * { box-sizing: border-box; }
        
        header { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 12px; 
            border-bottom: 1px solid #2d2f33; 
            padding-bottom: 10px; 
            flex-shrink: 0; 
        }
        h1 { 
            margin: 0; 
            font-size: 18px; 
            font-weight: 600; 
            color: #e4e4e4;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toolbar { 
            display: flex; 
            gap: 8px; 
            align-items: center;
            margin-left: auto;
        }

        .btn-custom { background-color: #2b2d31; color: #dbdee1; border: 1px solid #3d4047; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-custom:hover { background-color: #383a40; color: #ffffff; border-color: #5c6168; }
        
        .btn-success-custom { background-color: #238636; color: #fff; border: 1px solid #2ea043; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-success-custom:hover { background-color: #2ea043; }
        
        .btn-danger-custom { background-color: transparent; color: #f85149; border: 1px solid #f85149; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-danger-custom:hover { background-color: #f85149; color: #fff; }

        .dropdown-menu {
            border-radius: 6px;
            padding: 6px 0;
            background-color: #25262a;
            border: 1px solid #3d4047;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            font-size: 13px;
        }
        .dropdown-item { padding: 8px 16px; color: #d4d4d4; transition: background 0.2s; }
        .dropdown-item:hover { background-color: #313338; color: #ffffff; }
        
        .main-container { 
            display: flex; 
            gap: 12px; 
            flex: 1; 
            min-height: 0; 
            flex-direction: row; 
        }
        
        /* コンパクトで四角いウィンドウパネル */
        .window-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #1e1f22; 
            border: 1px solid #2d2f33; 
            border-radius: 6px; 
            overflow: hidden;
            min-height: 0; 
        }
        
        .window-header { 
            padding: 6px 12px; 
            background-color: #25262a; 
            font-size: 12px; 
            font-weight: 600; 
            border-bottom: 1px solid #2d2f33; 
            color: #e4e4e4; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0;
        }
        
        .editor-container {
            flex: 1;
            position: relative;
        }
        
        /* CodeMirror */
        .CodeMirror {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            height: 100% !important;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .cm-s-darcula.CodeMirror { background-color: #1e1f22; color: #e4e4e4; }
        .cm-s-darcula .CodeMirror-gutters { background-color: #1e1f22; border-right: 1px solid #2d2f33; }
        .cm-s-darcula .CodeMirror-linenumber { color: #6b6f75; padding-left: 6px; }
        .cm-s-darcula .CodeMirror-cursor { border-left: 2px solid #e4e4e4; }
        .CodeMirror-selected { background: #32445a !important; }
        .CodeMirror-line::selection, .CodeMirror-line > span::selection { background: #32445a !important; }
        .CodeMirror-placeholder { color: #5c6168 !important; }
        
        /* ログエリア */
        .log-section { 
            height: 150px; 
            flex-shrink: 0; 
            background-color: #1e1f22; 
            border: 1px solid #2d2f33; 
            border-radius: 6px; 
            margin-top: 12px; 
            display: flex; 
            flex-direction: column; 
        }
        .log-header { 
            padding: 6px 12px; 
            font-size: 12px; 
            font-weight: 600; 
            color: #b9bbbe; 
            border-bottom: 1px solid #2d2f33; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0; 
        }
        .log-content { 
            flex: 1; 
            padding: 8px 12px; 
            overflow-y: auto; 
            font-family: 'Fira Code', monospace; 
            font-size: 12px; 
            line-height: 1.5;
            margin: 0; 
            color: #b9bbbe; 
        }
        
        .log-msg { border-bottom: 1px dashed rgba(45, 47, 51, 0.8); padding: 4px 0; word-break: break-all; }
        .log-msg.info { color: #58a6ff; } 
        .log-msg.success { color: #3fb950; }
        .log-msg.error { color: #f85149; } 
        .log-msg.warning { color: #d29922; } 
        
        .icon-btn { 
            background: transparent; color: #b9bbbe; border: none; padding: 4px 8px; cursor: pointer; 
            border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 12px; gap: 4px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: #e4e4e4; }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3d4047; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5c6168; }

        /* スマホ時のレスポンシブ処理 */
        @media (max-width: 768px) {
            body { height: auto; display: block; overflow-y: auto; }
            header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .toolbar { margin-left: 0; width: 100%; flex-wrap: wrap; }
            .main-container { flex-direction: column; display: flex; height: auto; }
            .window-panel { min-height: 300px; flex: none; }
            .log-section { flex-shrink: 0; height: 200px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="bi bi-shield-check" style="color: #3fb950; font-size: 20px;"></i> Universal JS Deobfuscator</h1>
    <div class="toolbar">
        <div class="dropdown">
            <button class="btn-success-custom dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">

            <ul class="dropdown-menu dropdown-menu-dark shadow-lg">

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Babel Standalone -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- js-beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

<!-- CodeMirror Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/placeholder.min.js"></script>

<script>
    // CodeMirror Initialization
    const cmInput = CodeMirror.fromTextArea(document.getElementById('input-editor'), {
        mode: "javascript",
        theme: "darcula",
        lineNumbers: true,
        lineWrapping: true,
        matchBrackets: true,
        indentUnit: 4,
        placeholder: "// Paste your obfuscated JavaScript code here..."
    });
    
    const cmOutput = CodeMirror.fromTextArea(document.getElementById('output-editor'), {
        mode: "javascript",
        theme: "darcula",
        lineNumbers: true,
        lineWrapping: true,
        matchBrackets: true,
        readOnly: false,
        indentUnit: 4,
        placeholder: "// Decoded output will appear here..."
    });

    const logContent = document.getElementById('log-content');

    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-msg ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        if (type === 'error') icon = 'bi-x-circle';
        if (type === 'warning') icon = 'bi-exclamation-triangle';
        
        entry.innerHTML = `<span style="color: #6b6f75; margin-right: 6px;">[${timestamp}]</span><i class="bi ${icon} me-1"></i> ${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        cmInput.setValue(''); 
        cmOutput.setValue(''); 
        logContent.innerHTML = '';
        log('Workspace cleared.', 'info');
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => logContent.innerHTML = '');
    
    document.getElementById('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(cmOutput.getValue()).then(() => {
            const btn = document.getElementById('btn-copy');
            btn.innerHTML = '<i class="bi bi-check2" style="color:var(--success);"></i> Copied';
            setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 1500);
            log('Output copied to clipboard.', 'success');
        }).catch(err => {
            log('Failed to copy: ' + err, 'error');
        });
    });

    // --- Format ---
    // --- Format (Enhanced Beautify) ---
    function formatCode(code) {
        if (typeof js_beautify !== 'function') return code;
        try {
            return js_beautify(code, {
                indent_size: 4, 
                space_in_empty_paren: false, 
                preserve_newlines: false, // 元の不自然な改行を完全に無視する
                max_preserve_newlines: 0, // 余分な空白行を消す
                jslint_happy: true, 
                brace_style: "collapse", 
                space_before_conditional: true
            });
        } catch (e) {
            log("Format Error: " + e.message, "warning");
            return code;
        }
    }
    // --- Final Cleanup & Beautify (Minify without renaming -> Format) ---
    function finalizeCode(code) {
        try {
            const cleanupPlugin = function({ types: t }) {
                return {
                    visitor: {
                        // 1. 到達不能コード (return, break, continue, throw の後) の削除
                        BlockStatement(path) {
                            let stopIndex = -1;
                            for (let i = 0; i < path.node.body.length; i++) {
                                const stmt = path.node.body[i];
                                if (t.isReturnStatement(stmt) || t.isThrowStatement(stmt) || t.isBreakStatement(stmt) || t.isContinueStatement(stmt)) {
                                    stopIndex = i;
                                    break;
                                }
                            }
                            // ストップ位置以降にコードがあれば削除
                            if (stopIndex !== -1 && stopIndex < path.node.body.length - 1) {
                                path.node.body.splice(stopIndex + 1);
                            }
                        },
                        // 2. 関数の最後にある意味のない「return;」を削除
                        ReturnStatement(path) {
                            if (!path.node.argument) {
                                const parent = path.parentPath;
                                if (parent.isBlockStatement() && parent.node.body[parent.node.body.length - 1] === path.node) {
                                    const grandparent = parent.parentPath;
                                    if (grandparent.isFunction()) path.remove();
                                }
                            }
                        },
                        // 3. 余剰なネストブロック { { ... } } を解除して平坦化
                        BlockStatement: {
                            exit(path) {
                                if (path.parentPath.isBlockStatement()) {
                                    path.replaceWithMultiple(path.node.body);
                                }
                            }
                        },
                        // 4. 無意味な空ステートメント (;) を削除
                        EmptyStatement(path) {
                            if (!path.parentPath.isLoop() && !path.parentPath.isIfStatement()) {
                                path.remove();
                            }
                        }
                    }
                };
            };
            
            // パス1: Minify (名前は維持しつつ、コメントや余白を完全削除、構造を最小化)
            const minified = Babel.transform(code, {
                ast: false,
                code: true,
                comments: false, // 全コメント削除
                compact: true,   // 完全なMinify（スペース・改行を削る）
                generatorOpts: { 
                    jsescOption: { minimal: true }
                },
                plugins: [cleanupPlugin]
            });
            
            // パス2: Beautify (Minifyされて1行になったコードを改めて綺麗に整形)
            return formatCode(minified.code);
        } catch (e) {
            log("Final Cleanup Error: " + e.message, "warning");
            return formatCode(code); // エラー時は通常のBeautifyのみにフォールバック
        }
    }
    
    document.getElementById('btn-format').addEventListener('click', (e) => {
        e.preventDefault();
        const code = cmOutput.getValue() || cmInput.getValue();
        if (!code) return;
        cmOutput.setValue(formatCode(code));
        log("Code formatted.", "success");
    });

    // --- Anti-Minify ---
    function antiMinify(code) {
        try {
            const ast = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast;
            const antiMinifyPlugin = function({ types: t }) {
                return {
                    visitor: {
                        Scopable(path) {
                            const bindings = path.scope.bindings;
                            for (const name in bindings) {
                                if (name.length <= 2 && !['e', '_', '$'].includes(name) && /^[a-zA-Z]+$/.test(name)) {
                                    const binding = bindings[name];
                                    let prefix = "_var";
                                    if (binding.kind === "param") prefix = "_arg";
                                    else if (binding.path.isFunctionDeclaration() || binding.path.isFunctionExpression()) prefix = "_func";
                                    else if (binding.path.isClassDeclaration()) prefix = "_class";
                                    else if (binding.kind === "const") prefix = "_const";
                                    const newName = path.scope.generateUid(prefix);
                                    path.scope.rename(name, newName);
                                }
                            }
                        },
                        UnaryExpression(path) {
                            if (['!', '+', '-', '~'].includes(path.node.operator)) {
                                const arg = path.node.argument;
                                if (t.isCallExpression(arg) && (t.isFunctionExpression(arg.callee) || t.isArrowFunctionExpression(arg.callee))) {
                                    if (path.parentPath.isExpressionStatement() || path.parentPath.isSequenceExpression()) {
                                        path.replaceWith(arg);
                                    }
                                }
                            }
                        }
                    }
                };
            };
            const transformed = Babel.transformFromAst(ast, code, {
                generatorOpts: { retainLines: false, jsescOption: { minimal: true } },
                plugins:[antiMinifyPlugin]
            });
            return transformed.code;
        } catch(e) {
            log("Anti-Minify Error: " + e.message, "warning");
            return code;
        }
    }

    document.getElementById('btn-antiminify').addEventListener('click', (e) => {
        e.preventDefault();
        const code = cmOutput.getValue() || cmInput.getValue();
        if (!code) return;
        cmOutput.setValue(formatCode(antiMinify(code)));
        log("Anti-Minify applied.", "success");
    });

    // --- Snippet Parser ---
    function canParseJavaScript(code) {
        try { Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true, allowAwaitOutsideFunction: true } }); return true; } 
        catch (e) { return false; }
    }

    function splitInputIntoSnippets(rawCode) {
        const normalized = String(rawCode || "").replace(/^\uFEFF/, "").trim();
        if (!normalized) return [];
        if (canParseJavaScript(normalized)) return[{ title: "", code: normalized }];
        const lines = normalized.split(/\r?\n/);
        const snippets =[];
        let currentTitle = ""; let bucket =[];
        const flushBucket = () => {
            const chunk = bucket.join("\n").trim(); bucket =[];
            if (!chunk) return;
            if (canParseJavaScript(chunk)) snippets.push({ title: currentTitle, code: chunk });
        };
        lines.forEach((line) => {
            const marker = line.match(/^\s*(?:\/\/\s*)?Example\s+(\d+)\s*:?\s*$/i);
            if (marker) { flushBucket(); currentTitle = `Example ${marker[1]}`; return; }
            bucket.push(line);
        });
        flushBucket();
        if (snippets.length > 0) return snippets;
        const markerRemoved = normalized.replace(/^\s*(?:\/\/\s*)?Example\s+\d+\s*:?\s*$/gim, "").trim();
        if (markerRemoved && canParseJavaScript(markerRemoved)) return[{ title: "", code: markerRemoved }];
        return [{ title: "", code: normalized }];
    }

    function buildMultiSnippetOutput(results) {
        if (results.length === 1) return results[0].code;
        return results.map((result, index) => {
            const title = result.title || `Snippet ${index + 1}`;
            return `/* ${title} */\n${result.code}`;
        }).join("\n\n");
    }

    // --- Dynamic Unpack ---
    function dynamicUnpack(code) {
        return new Promise((resolve) => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            let payloads =[];
            try {
                const win = iframe.contentWindow;
                win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{}, info: ()=>{} };
                win.onerror = () => true; 
                function checkAndPush(payload) {
                    if (typeof payload === 'string' && payload.trim().length > 0) {
                        try { Babel.transform(payload, { ast: true, code: false }); payloads.push(payload); } catch(e) {}
                    }
                }
                const origEval = win.eval; win.eval = function(payload) { checkAndPush(payload); try { return origEval.apply(this, arguments); } catch(e){} };
                const origFunction = win.Function;
                const hookedFunction = function(...args) { if (args.length > 0) checkAndPush(args[args.length - 1]); try { return origFunction.apply(this, args); } catch(e){} };
                win.Function = hookedFunction; win.Function.prototype = origFunction.prototype; win.Function.prototype.constructor = hookedFunction;
                const origWrite = win.document.write; win.document.write = function(payload) { checkAndPush(payload); return origWrite.apply(this, arguments); };
                win.setTimeout = (cb) => { if(typeof cb === 'function') cb(); return 0; }; win.setInterval = () => 0;
                const script = win.document.createElement('script'); script.textContent = code; win.document.body.appendChild(script);
            } catch (err) { log(`Sandbox execution error: ${err.message}`, "warning"); }
            setTimeout(() => {
                document.body.removeChild(iframe);
                if (payloads.length > 0) {
                    payloads.sort((a, b) => b.length - a.length);
                    log(`Packer removed (${payloads[0].length} bytes)`, "success");
                    resolve(payloads[0]);
                } else resolve(code);
            }, 250);
        });
    }

    document.getElementById('btn-dynamic').addEventListener('click', async (e) => {
        e.preventDefault();
        const snippets = splitInputIntoSnippets(cmInput.getValue());
        if (!snippets.length) return;
        const results =[];
        for (const snippet of snippets) {
            log(`Dynamic Unpack: Running sandbox...`, "info");
            const unpacked = await dynamicUnpack(snippet.code);
            // 修正箇所: formatCode を finalizeCode に変更
            results.push({ title: snippet.title, code: finalizeCode(unpacked) });
        }
        cmOutput.setValue(buildMultiSnippetOutput(results));
    });

    // --- AST Decode Engine (Full Logic Restored) ---
    // --- AST Decode Engine (Enhanced with Auto-Hook, Unflattening, and DCE) ---
    // --- AST Decode Engine (Enhanced for For-Loops, Array Methods, and DCE) ---
    // --- AST Decode Engine (Enhanced with AST cloning and Dead Code Elimination) ---
    // --- AST Decode Engine (Enhanced with AST cloning and Dead Code Elimination) ---
    // --- AST Decode Engine (Enhanced with Dynamic Safe Dead Code Elimination) ---
    // --- AST Decode Engine (Browser-Safe Dynamic DCE Edition) ---
    // --- AST Decode Engine (Enhanced with Static Domino DCE & Property Normalization) ---
    // --- AST Decode Engine (Ultimate Universal Edition for obfuscator.io) ---
    // --- AST Decode Engine (Ultimate Universal Edition for obfuscator.io) ---
    // --- AST Decode Engine (Ultimate Universal Edition for obfuscator.io) ---
    // --- AST Decode Engine (Stable & Universal Edition) ---
    // --- AST Decode Engine (Ultimate Full-Sandbox Execution Edition) ---
    function decodeStringsAST(code) {
        let ast;
        try { ast = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast; } 
        catch(e) { log("AST parsing failed: " + e.message, "error"); return { code, changed: false }; }

        let replacedCount = 0; let foldedCount = 0;

        // 1. サンドボックス用「完全ミラー環境」の構築プラグイン
        let setupCode = "";
        try {
            const sandboxAst = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast;
            const sandboxPrepPlugin = function({ types: t }) {
                return {
                    visitor: {
                        DebuggerStatement(path) { path.remove(); },
                        // アンチデバッグの無限ループ罠を無効化（1万回でBreak）
                        "WhileStatement|ForStatement|DoWhileStatement"(path) {
                            const cnt = path.scope.generateUidIdentifier("loop_cnt");
                            path.insertBefore(t.variableDeclaration("let",[t.variableDeclarator(cnt, t.numericLiteral(0))]));
                            const limitCheck = t.ifStatement(
                                t.binaryExpression(">", t.updateExpression("++", cnt), t.numericLiteral(15000)),
                                t.breakStatement()
                            );
                            if (t.isBlockStatement(path.node.body)) {
                                path.node.body.body.unshift(limitCheck);
                            } else {
                                path.node.body = t.blockStatement([limitCheck, path.node.body]);
                            }
                        },
                        // 全ての関数を window にエクスポート（IIFE内部の関数も強制的に引っ張り出す）
                        FunctionDeclaration(path) {
                            if (path.node.id) {
                                const name = path.node.id.name;
                                path.insertAfter(t.expressionStatement(t.assignmentExpression("=", t.memberExpression(t.identifier("window"), t.identifier(name)), t.identifier(name))));
                            }
                        },
                        // 全ての変数を window にエクスポート
                        VariableDeclaration(path) {
                            if (path.parentPath.isForStatement() || path.parentPath.isWhileStatement() || path.parentPath.isForInStatement() || path.parentPath.isForOfStatement()) return;
                            const assignments = [];
                            path.node.declarations.forEach(decl => {
                                if (t.isIdentifier(decl.id)) {
                                    const name = decl.id.name;
                                    assignments.push(t.expressionStatement(t.assignmentExpression("=", t.memberExpression(t.identifier("window"), t.identifier(name)), t.identifier(name))));
                                }
                            });
                            if (assignments.length > 0) path.insertAfter(assignments);
                        }
                    }
                };
            };
            setupCode = Babel.transformFromAst(sandboxAst, code, { ast: false, code: true, plugins: [sandboxPrepPlugin] }).code;
        } catch(e) {
            setupCode = code; // Fallback
        }

        // 2. Iframeへのフルコード注入と実行（暗号配列のシャッフルなどをすべて完了させる）
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const win = iframe.contentWindow;
        try {
            win.console = new Proxy({}, { get: () => () => {} });
            ['alert', 'prompt', 'confirm', 'open', 'print', 'fetch'].forEach(m => win[m] = ()=>{});
            win.XMLHttpRequest = function(){};
            win.setTimeout = ()=>{return 0;}; win.setInterval = ()=>{return 0;};
            
            const script = win.document.createElement('script');
            script.textContent = setupCode;
            win.document.body.appendChild(script);
        } catch (e) {
            log("Sandbox execution error: " + e.message, "error");
        }

        // 3. 超強力インサイド・アウト デオプフスケーションプラグイン
        const deobfuscatePlugin = function({ types: t }) {
            const blockedCallees = new Set(['eval', 'require', 'setTimeout', 'setInterval', 'Function', 'console']);
            
            const isLiteralLike = (arg) => {
                if (t.isLiteral(arg)) return true;
                if (t.isUnaryExpression(arg) && t.isLiteral(arg.argument)) return true;
                if (t.isArrayExpression(arg)) return arg.elements.every(e => e === null || isLiteralLike(e));
                if (t.isObjectExpression(arg)) return arg.properties.every(p => t.isObjectProperty(p) && isLiteralLike(p.value));
                return false;
            };
            
            const toLiteralNode = (value) => {
                if (typeof value === 'string') return t.stringLiteral(value);
                if (typeof value === 'number' && Number.isFinite(value)) return t.numericLiteral(value);
                if (typeof value === 'boolean') return t.booleanLiteral(value);
                if (value === null) return t.nullLiteral(); 
                if (Array.isArray(value) || (typeof value === 'object' && value !== null)) {
                    try { return Babel.transform(`(${JSON.stringify(value)})`, {ast: true, code: false}).ast.program.body[0].expression; } 
                    catch(e) { return null; }
                }
                return null;
            };

            // ASTノードをコード化してIframeで評価する
            const tryEval = (path) => {
                try {
                    const { code: exprCode } = Babel.transformFromAst(t.program([t.expressionStatement(t.cloneNode(path.node, true))]), "", { ast: false, code: true });
                    const res = win.eval(exprCode);
                    if (res !== undefined && typeof res !== 'function') {
                        const literalNode = toLiteralNode(res);
                        if (literalNode) { 
                            path.replaceWith(literalNode); 
                            replacedCount++; 
                            return true; 
                        }
                    }
                } catch (e) {}
                return false;
            };

            // 関数の中身を走査し、副作用（console.logなど）を持つペイロード関数か、純粋な暗号解読関数かを見分ける
            const hasSideEffects = (funcName, scope) => {
                const binding = scope.getBinding(funcName);
                if (!binding || !binding.path.isFunction()) return false;
                let sideEffect = false;
                binding.path.traverse({
                    Identifier(p) {
                        if (['console', 'document', 'window', 'alert', 'fetch', 'XMLHttpRequest', 'setTimeout', 'setInterval'].includes(p.node.name)) {
                            sideEffect = true; p.stop();
                        }
                    }
                });
                return sideEffect;
            };

            return {
                visitor: {
                    // 最深部（引数）から評価するための exit トラバース
                    CallExpression: {
                        exit(path) {
                            if (t.isIdentifier(path.node.callee)) {
                                const funcName = path.node.callee.name;
                                if (blockedCallees.has(funcName)) return;
                                
                                // 副作用がある関数（例: greet）は評価をスキップし、純粋なデコード関数だけを評価する
                                if (hasSideEffects(funcName, path.scope)) return;
                                
                                if (path.node.arguments.every(isLiteralLike)) {
                                    tryEval(path);
                                }
                            } else if (t.isMemberExpression(path.node.callee)) {
                                // .filter().join() などの配列操作チェーンの評価
                                let safe = true;
                                path.traverse({ 
                                    Identifier(p) { 
                                        if (['window', 'document', 'eval', 'XMLHttpRequest', 'fetch', 'setTimeout', 'setInterval', 'Function', 'console'].includes(p.node.name)) { 
                                            safe = false; p.stop(); 
                                        } 
                                    },
                                    CallExpression(p) {
                                        if (t.isIdentifier(p.node.callee) && blockedCallees.has(p.node.callee.name)) {
                                            safe = false; p.stop();
                                        }
                                    }
                                });
                                if (safe) tryEval(path);
                            }
                        }
                    },
                    // for/whileを使った制御フロー平坦化の解除
                    "WhileStatement|ForStatement"(path) {
                        const body = path.node.body;
                        let switchStmt = t.isBlockStatement(body) ? body.body.find(n => t.isSwitchStatement(n)) : (t.isSwitchStatement(body) ? body : null);
                        if (!switchStmt || !t.isIdentifier(switchStmt.discriminant)) return;
                        
                        const stateVarName = switchStmt.discriminant.name;
                        const binding = path.scope.getBinding(stateVarName);
                        if (!binding) return;
                        
                        let initVal = binding.path.isVariableDeclarator() ? binding.path.node.init : (binding.path.isAssignmentExpression() ? binding.path.node.right : null);
                        if (initVal && (t.isNumericLiteral(initVal) || t.isStringLiteral(initVal))) {
                            let currentState = initVal.value; const caseMap = {};
                            switchStmt.cases.forEach(c => {
                                if (c.test && (t.isNumericLiteral(c.test) || t.isStringLiteral(c.test))) {
                                    const stmts = c.consequent.filter(stmt => !t.isBreakStatement(stmt) && !t.isContinueStatement(stmt));
                                    let nextState = null; const cleanStmts = [];
                                    for (const stmt of stmts) {
                                        if (t.isExpressionStatement(stmt) && t.isAssignmentExpression(stmt.expression) && t.isIdentifier(stmt.expression.left, { name: stateVarName })) {
                                            if (t.isNumericLiteral(stmt.expression.right) || t.isStringLiteral(stmt.expression.right)) { nextState = stmt.expression.right.value; continue; }
                                        }
                                        cleanStmts.push(stmt);
                                    }
                                    caseMap[c.test.value] = { stmts: cleanStmts, nextState: nextState };
                                }
                            });
                            const unflattened = []; let curr = currentState; let visited = new Set();
                            while (curr !== null && curr !== undefined && caseMap[curr] && !visited.has(curr)) {
                                visited.add(curr); unflattened.push(...caseMap[curr].stmts); curr = caseMap[curr].nextState;
                            }
                            if (unflattened.length > 0) { path.replaceWith(t.blockStatement(unflattened)); replacedCount++; }
                        }
                    },
                    MemberExpression: {
                        exit(path) {
                            if (path.node.computed && t.isStringLiteral(path.node.property)) {
                                const propName = path.node.property.value;
                                if (/^[a-zA-Z_$][0-9a-zA-Z_$]*$/.test(propName)) { 
                                    path.node.computed = false; path.node.property = t.identifier(propName); foldedCount++; 
                                }
                            }
                        }
                    },
                    IfStatement: {
                        exit(path) {
                            const test = path.get('test');
                            const evaluated = test.evaluate();
                            if (evaluated.confident) {
                                const replacement = evaluated.value ? path.node.consequent : path.node.alternate;
                                if (replacement) { t.isBlockStatement(replacement) ? path.replaceWithMultiple(replacement.body) : path.replaceWith(replacement); } else { path.remove(); }
                                foldedCount++;
                            }
                        }
                    },
                    TryStatement: {
                        exit(path) { if (!path.node.block.body.some(stmt => !t.isEmptyStatement(stmt))) { path.remove(); foldedCount++; } }
                    },
                    EmptyStatement(path) { if (!path.parentPath.isLoop() && !path.parentPath.isIfStatement()) path.remove(); },
                    BinaryExpression: { exit(path) { const ev = path.evaluate(); if (ev.confident && ev.value !== undefined) { const lit = toLiteralNode(ev.value); if (lit) { path.replaceWith(lit); foldedCount++; } } } },
                    UnaryExpression: { exit(path) { const ev = path.evaluate(); if (ev.confident && ev.value !== undefined) { const lit = toLiteralNode(ev.value); if (lit) { path.replaceWith(lit); foldedCount++; } } } },
                    LogicalExpression: { exit(path) { const ev = path.evaluate(); if (ev.confident && ev.value !== undefined) { const lit = toLiteralNode(ev.value); if (lit) { path.replaceWith(lit); foldedCount++; } } } }
                }
            };
        };

        // 4. 静的DCE（不必要な暗号関数の残骸を自動削除）
        function applyStaticDCE(initialCode) {
            let workingCode = initialCode;
            let totalRemoved = 0; let changed;
            const dcePlugin = function({ types: t }) {
                return {
                    visitor: {
                        "VariableDeclarator|FunctionDeclaration"(path) {
                            if (path.removed) return;
                            if (!path.node.id || !t.isIdentifier(path.node.id)) return;
                            const binding = path.scope.getBinding(path.node.id.name);
                            if (binding && !binding.referenced) {
                                if (path.isVariableDeclarator()) {
                                    const parent = path.parentPath;
                                    path.remove();
                                    if (parent && parent.isVariableDeclaration() && parent.node.declarations.length === 0) parent.remove();
                                } else { path.remove(); }
                                changed = true; totalRemoved++;
                            }
                        }
                    }
                };
            };
            let passCount = 0;
            do {
                changed = false;
                try {
                    const transformed = Babel.transform(workingCode, { ast: false, code: true, plugins: [dcePlugin] });
                    if (changed) workingCode = transformed.code;
                } catch(e) { break; }
                passCount++;
            } while(changed && passCount < 50);
            return { code: workingCode, removed: totalRemoved };
        }

        try {
            // パス1: フルデコード実行
            const phase2Code = Babel.transformFromAst(ast, code, { 
                ast: false, code: true, 
                generatorOpts: { jsescOption: { minimal: true } }, 
                plugins: [deobfuscatePlugin] 
            }).code;
            
            // パス2: 参照を失ったダミー配列や関数の除去
            const finalResult = applyStaticDCE(phase2Code);
            document.body.removeChild(iframe);
            
            if (replacedCount > 0 || foldedCount > 0) log(`AST Deobf: Evaluated ${replacedCount} calls, Simplified ${foldedCount} paths`, "info");
            if (finalResult.removed > 0) log(`AST Deobf: Removed ${finalResult.removed} dead declarations`, "success");
            
            return { code: finalResult.code, changed: (replacedCount > 0 || foldedCount > 0 || finalResult.removed > 0) };
        } catch (e) {
            document.body.removeChild(iframe);
            log("AST engine error: " + e.message, "error");
            return { code, changed: false };
        }
    }

    document.getElementById('btn-strings').addEventListener('click', (e) => {
        e.preventDefault();
        const snippets = splitInputIntoSnippets(cmInput.getValue());
        if (!snippets.length) return;
        const results = snippets.map((snippet) => {
            log(`Decoding AST & Unflattening...`, "info");
            const result = decodeStringsAST(snippet.code);
            // 修正箇所: formatCode を finalizeCode に変更
            return { title: snippet.title, code: finalizeCode(result.code) };
        });
        cmOutput.setValue(buildMultiSnippetOutput(results));
    });

    // --- Deep Auto (既存の該当部分を修正) ---
    async function deepAutoSingle(code, label = "") {
        const prefix = label ? `[${label}] ` : "";
        let currentCode = code; let prevOverallCode = ""; let globalIter = 0;
        
        while (currentCode !== prevOverallCode && globalIter < 3) {
            prevOverallCode = currentCode; globalIter++;
            log(`${prefix}Pass ${globalIter}: Sandbox Dynamic Unpack...`, "warning");
            const unpacked = await dynamicUnpack(currentCode);
            if (unpacked !== currentCode) currentCode = unpacked;
            
            let prevAstCode = ""; let astIter = 0;
            while (currentCode !== prevAstCode && astIter < 5) {
                prevAstCode = currentCode;
                const result = decodeStringsAST(currentCode);
                currentCode = result.code;
                if (!result.changed) break;
                astIter++;
            }
        }
        
        log(`${prefix}Final Pass: Anti-Minify...`, "info");
        currentCode = antiMinify(currentCode);
        
        log(`${prefix}Final Pass: Cleanup & Format...`, "info");
        // 修正箇所: formatCode を finalizeCode に変更
        return { code: finalizeCode(currentCode), passes: globalIter };
    }

    document.getElementById('btn-auto').addEventListener('click', async (e) => {
        e.preventDefault();
        const snippets = splitInputIntoSnippets(cmInput.getValue());
        if (!snippets.length) return;
        log("==== Deep Auto Deobfuscation Start ====", "success");
        cmOutput.setValue("Processing...");
        
        const results =[];
        for (let i = 0; i < snippets.length; i++) {
            const snippet = snippets[i];
            const label = snippet.title || `Snippet ${i + 1}`;
            const result = await deepAutoSingle(snippet.code, label);
            results.push({ title: snippet.title || label, code: result.code });
            log(`[${label}] done (passes: ${result.passes})`, "success");
        }
        
        cmOutput.setValue(buildMultiSnippetOutput(results));
        log("==== Deep Auto Deobfuscation Done ====", "success");
    });
</script>
