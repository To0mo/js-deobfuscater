<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Deobfuscator</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Fira Code) -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* モバイルキーボード対策：dvhを利用し全体のスクロールを無効化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; /* iOS/Android対応の動的ビューポート高 */
            overflow: hidden !important; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .toolbar { padding: 12px 15px; background-color: #0d1117; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        
        .main-container { 
            display: flex; 
            flex-direction: column; /* モバイルでは縦並び */
            gap: 15px; 
            padding: 0 15px 15px 15px; 
            flex: 1; 
            min-height: 0;
        }
        
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row; /* PCでは横並び */
                padding: 0 20px 20px 20px;
                gap: 20px;
            }
            .toolbar { padding: 12px 20px; gap: 10px; }
        }
        
        /* ウィンドウ風パネル */
        .window-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
            min-height: 0; /* 子要素のオーバーフローを許可 */
        }
        .window-header { 
            padding: 8px 15px; 
            background-color: #21262d; 
            font-size: 0.9em; 
            font-weight: 600; 
            border-bottom: 1px solid #30363d; 
            color: #e6edf3; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0;
        }
        
        /* エディタ部分 */
        .editor { 
            flex: 1; 
            background-color: #0d1117; 
            color: #e6edf3; 
            border: none; 
            padding: 15px; 
            font-family: 'Fira Code', monospace; 
            font-size: 13.5px; 
            line-height: 1.5;
            outline: none; 
            resize: none; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-y: auto;
        }
        
        /* ログウィンドウ */
        .log-container {
            padding: 0 15px 15px 15px;
            height: 25dvh; /* 全体の25%の高さ */
            display: flex;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .log-container { padding: 0 20px 20px 20px; height: 280px; }
        }
        .log-content { 
            flex: 1; 
            padding: 12px 15px; 
            overflow-y: auto;
            font-family: 'Fira Code', monospace; 
            font-size: 12.5px; 
            color: #8b949e; 
            background-color: #0d1117;
        }
        .log-entry { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #21262d; word-break: break-all; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.success { color: #3fb950; }
        .log-entry.error { color: #f85149; }
        .log-entry.warning { color: #d29922; }
        
        .btn-custom { background-color: #21262d; color: #c9d1d9; border: 1px solid #363b42; }
        .btn-custom:hover { background-color: #30363d; color: #fff; border-color: #8b949e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h5" style="font-weight: 600;">
            <i class="bi bi-shield-check me-2" style="color: #3fb950;"></i>Universal JS Deobfuscator
        </span>
    </div>
</nav>

<div class="toolbar">
    <button class="btn btn-success btn-sm fw-bold" id="btn-auto" title="Packerの解除、AST文字列デコード、定数畳み込み、フォーマットを自動で深くまで反復実行します">
        <i class="bi bi-magic me-1"></i> Deep Auto
    </button>
    <button class="btn btn-custom btn-sm" id="btn-dynamic"><i class="bi bi-play-circle me-1"></i> Dynamic Unpack</button>
    <button class="btn btn-custom btn-sm" id="btn-strings"><i class="bi bi-fonts me-1"></i> Decode AST</button>
    <button class="btn btn-custom btn-sm" id="btn-format"><i class="bi bi-code-slash me-1"></i> Beautify</button>
    <button class="btn btn-outline-danger btn-sm ms-auto" id="btn-clear"><i class="bi bi-trash"></i></button>
</div>

<div class="main-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-code me-2"></i>Input (Obfuscated)</span>
        </div>
        <textarea class="editor" id="input-editor" spellcheck="false" placeholder="ここに難読化されたJavaScriptコードを貼り付けてください..."></textarea>
    </div>
    
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-check me-2"></i>Output (Deobfuscated)</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-copy" title="Copy to Clipboard"><i class="bi bi-clipboard"></i></button>
        </div>
        <textarea class="editor" id="output-editor" spellcheck="false" readonly placeholder="デコード・整形されたコードがここに表示されます..."></textarea>
    </div>
</div>

<div class="log-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-terminal me-2"></i>Execution Log</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-clear-log" title="Clear Logs"><i class="bi bi-eraser"></i></button>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</div>

<!-- Babel Standalone (AST Parsing) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- js-beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

<script>
    const inputEditor = document.getElementById('input-editor');
    const outputEditor = document.getElementById('output-editor');
    const logContent = document.getElementById('log-content');

    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        if (type === 'error') icon = 'bi-x-circle';
        if (type === 'warning') icon = 'bi-exclamation-triangle';
        
        entry.innerHTML = `<span style="color: #484f58; font-size: 0.9em;">[${timestamp}]</span> <i class="bi ${icon} me-1"></i> ${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        inputEditor.value = ''; outputEditor.value = ''; logContent.innerHTML = '';
        log('エディタとログをクリアしました。', 'info');
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => logContent.innerHTML = '');
    document.getElementById('btn-copy').addEventListener('click', () => {
        outputEditor.select(); document.execCommand('copy');
        log('出力コードをクリップボードにコピーしました。', 'success');
    });

    // 1. js-beautify
    function formatCode(code) {
        if (typeof js_beautify !== 'function') return code;
        try {
            return js_beautify(code, {
                indent_size: 4, space_in_empty_paren: true, preserve_newlines: true, max_preserve_newlines: 2, jslint_happy: true, brace_style: "collapse"
            });
        } catch (e) {
            log("フォーマットエラー: " + e.message, "warning");
            return code;
        }
    }
    document.getElementById('btn-format').addEventListener('click', () => {
        const code = outputEditor.value || inputEditor.value;
        if (!code) return;
        outputEditor.value = formatCode(code);
        log("コードの整形が完了しました。", "success");
    });

    // 2. 動的アンパッカー (堅牢化版)
    function dynamicUnpack(code) {
        return new Promise((resolve) => {
            log("動的アンパッカー (Eval/Functionフック) を開始...", "info");
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            let payloads =[];

            try {
                const win = iframe.contentWindow;
                win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{}, info: ()=>{} };
                win.onerror = function() { return true; }; // エラーを抑止

                // ペイロードが有効なJSか検証
                function checkAndPush(payload) {
                    if (typeof payload === 'string' && payload.length > 50) {
                        try {
                            Babel.transform(payload, { ast: true, code: false }); // 検証
                            payloads.push(payload);
                        } catch(e) {}
                    }
                }

                const origEval = win.eval;
                win.eval = function(payload) {
                    checkAndPush(payload);
                    try { return origEval.apply(this, arguments); } catch(e){}
                };

                const origFunction = win.Function;
                const hookedFunction = function(...args) {
                    if (args.length > 0) checkAndPush(args[args.length - 1]);
                    try { return origFunction.apply(this, args); } catch(e){}
                };
                win.Function = hookedFunction;
                win.Function.prototype = origFunction.prototype;
                win.Function.prototype.constructor = hookedFunction;
                
                const origWrite = win.document.write;
                win.document.write = function(payload) {
                    checkAndPush(payload);
                    return origWrite.apply(this, arguments);
                };

                // Timer系の無効化
                win.setTimeout = function(cb){ if(typeof cb === 'function') cb(); return 0; };
                win.setInterval = function(){ return 0; };

                const script = win.document.createElement('script');
                script.textContent = code; // try-catchで囲まない(自己検証ハッシュの破壊を防ぐ)
                win.document.body.appendChild(script);

            } catch (err) {
                log(`Sandbox実行エラー: ${err.message}`, "warning");
            }

            setTimeout(() => {
                document.body.removeChild(iframe);
                if (payloads.length > 0) {
                    payloads.sort((a, b) => b.length - a.length);
                    const bestPayload = payloads[0];
                    log(`パッカーを解除しました (${bestPayload.length} bytes)`, "success");
                    resolve(bestPayload);
                } else {
                    resolve(code);
                }
            }, 250);
        });
    }

    // 3. 強化版 ASTベースの文字列デコーダー＆制御フロー・プロキシ解除
    function decodeStringsAST(code) {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const win = iframe.contentWindow;

        let ast;
        try {
            ast = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast;
        } catch(e) {
            document.body.removeChild(iframe);
            log("ASTのパースに失敗: " + e.message, "error");
            return { code, changed: false };
        }

        try {
            win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{} };
            win.setTimeout = function(){}; win.setInterval = function(){};
            
            // 安全と思われる初期化・配列シフター部分を抽出してSandboxで実行
            let setupCode = "";
            ast.program.body.forEach(node => {
                const nodeLength = node.end - node.start;
                if (code.length > 1000 && nodeLength > code.length * 0.5) return;
                if (node.type === 'VariableDeclaration' || node.type === 'FunctionDeclaration' || node.type === 'ExpressionStatement') {
                    setupCode += code.substring(node.start, node.end) + "\n";
                }
            });
            win.eval(setupCode);
        } catch (e) {}

        let replacedCount = 0;
        let foldedCount = 0;

        const deobfuscatePlugin = function({ types: t }) {
            const proxyDict = {};
            return {
                visitor: {
                    VariableDeclarator(path) {
                        // 1. 変数エイリアス解決
                        if (t.isIdentifier(path.node.init)) {
                            const binding = path.scope.getBinding(path.node.id.name);
                            if (binding && binding.constant) {
                                binding.referencePaths.forEach(refPath => {
                                    refPath.replaceWith(t.identifier(path.node.init.name));
                                    replacedCount++;
                                });
                            }
                        } 
                        // 2. プロキシ辞書構築 (難読化ラッパー関数・文字列マッピング)
                        else if (t.isObjectExpression(path.node.init)) {
                            const objName = path.node.id.name;
                            proxyDict[objName] = {};
                            path.node.init.properties.forEach(prop => {
                                if (t.isObjectProperty(prop)) {
                                    let keyName = prop.key.name || (t.isLiteral(prop.key) ? prop.key.value : null);
                                    if (!keyName) return;
                                    
                                    if (t.isFunctionExpression(prop.value) || t.isArrowFunctionExpression(prop.value)) {
                                        const body = prop.value.body;
                                        if (t.isBlockStatement(body) && body.body.length === 1 && t.isReturnStatement(body.body[0])) {
                                            proxyDict[objName][keyName] = { type: 'function', funcNode: prop.value };
                                        } else if (!t.isBlockStatement(body)) {
                                            proxyDict[objName][keyName] = { type: 'function_expr', expr: body, params: prop.value.params };
                                        }
                                    } else if (t.isStringLiteral(prop.value) || t.isNumericLiteral(prop.value)) {
                                        proxyDict[objName][keyName] = { type: 'literal', valueNode: prop.value };
                                    }
                                }
                            });
                        }
                    },
                    
                    // 3. プロキシプロパティのインライン化
                    MemberExpression(path) {
                        if (t.isIdentifier(path.node.object)) {
                            const objName = path.node.object.name;
                            let keyName = path.node.computed && t.isStringLiteral(path.node.property) ? path.node.property.value : (!path.node.computed && t.isIdentifier(path.node.property) ? path.node.property.name : null);
                            
                            if (keyName && proxyDict[objName] && proxyDict[objName][keyName]) {
                                const entry = proxyDict[objName][keyName];
                                if (entry.type === 'literal') {
                                    path.replaceWith(t.cloneNode(entry.valueNode));
                                    replacedCount++;
                                }
                            }
                        }
                    },
                    
                    CallExpression(path) {
                        // 4. 文字列デコーダー評価
                        if (t.isIdentifier(path.node.callee)) {
                            const funcName = path.node.callee.name;
                            if (['eval', 'require', 'setTimeout', 'setInterval', 'Function', 'console', 'parseInt', 'String', 'decodeURIComponent', 'escape', 'atob', 'btoa'].includes(funcName)) return;
                            
                            const isLiteral = (arg) => t.isLiteral(arg) || (t.isUnaryExpression(arg) && t.isLiteral(arg.argument));
                            if (path.node.arguments.length > 0 && path.node.arguments.every(isLiteral)) {
                                const callCode = code.substring(path.node.start, path.node.end);
                                try {
                                    const res = win.eval(callCode);
                                    if (typeof res === 'string') { path.replaceWith(t.stringLiteral(res)); replacedCount++; return; }
                                    else if (typeof res === 'number') { path.replaceWith(t.numericLiteral(res)); replacedCount++; return; }
                                    else if (typeof res === 'boolean') { path.replaceWith(t.booleanLiteral(res)); replacedCount++; return; }
                                } catch (e) {}
                            }
                        }

                        // 5. プロキシ関数呼び出しのインライン化
                        if (t.isMemberExpression(path.node.callee)) {
                            const mem = path.node.callee;
                            if (t.isIdentifier(mem.object)) {
                                const objName = mem.object.name;
                                let keyName = mem.computed && t.isStringLiteral(mem.property) ? mem.property.value : (!mem.computed && t.isIdentifier(mem.property) ? mem.property.name : null);
                                
                                if (keyName && proxyDict[objName] && proxyDict[objName][keyName]) {
                                    const entry = proxyDict[objName][keyName];
                                    if (entry.type === 'function' || entry.type === 'function_expr') {
                                        let retNode = entry.type === 'function' ? entry.funcNode.body.body[0].argument : entry.expr;
                                        let params = entry.type === 'function' ? entry.funcNode.params : entry.params;
                                        const args = path.node.arguments;
                                        const paramMap = {};
                                        params.forEach((p, idx) => { if (args[idx]) paramMap[p.name] = args[idx]; });
                                        
                                        const replaceParams = (node) => {
                                            if (!node) return null;
                                            if (t.isIdentifier(node) && paramMap[node.name]) return t.cloneNode(paramMap[node.name], true);
                                            const cloned = t.cloneNode(node, false);
                                            for (let key in cloned) {
                                                if (cloned[key] && typeof cloned[key] === 'object') {
                                                    if (Array.isArray(cloned[key])) cloned[key] = cloned[key].map(n => replaceParams(n));
                                                    else if (typeof cloned[key].type === 'string') cloned[key] = replaceParams(cloned[key]);
                                                }
                                            }
                                            return cloned;
                                        };
                                        const inlined = replaceParams(retNode);
                                        if (inlined) { path.replaceWith(inlined); replacedCount++; }
                                    }
                                }
                            }
                        }
                    },
                    
                    // 6. 定数畳み込み
                    BinaryExpression(path) {
                        try {
                            const evaluated = path.evaluate();
                            if (evaluated.confident) {
                                if (typeof evaluated.value === 'string') { path.replaceWith(t.stringLiteral(evaluated.value)); foldedCount++; }
                                else if (typeof evaluated.value === 'number') { path.replaceWith(t.numericLiteral(evaluated.value)); foldedCount++; }
                                else if (typeof evaluated.value === 'boolean') { path.replaceWith(t.booleanLiteral(evaluated.value)); foldedCount++; }
                            }
                        } catch(e){}
                    },

                    // 7. 制御フロー平坦化の解除
                    WhileStatement(path) {
                        const body = path.node.body;
                        if (!t.isBlockStatement(body)) return;
                        const switchStmt = body.body.find(n => t.isSwitchStatement(n));
                        if (!switchStmt) return;
                        
                        if (t.isMemberExpression(switchStmt.discriminant) && t.isUpdateExpression(switchStmt.discriminant.property)) {
                            const arrayName = switchStmt.discriminant.object.name;
                            const binding = path.scope.getBinding(arrayName);
                            if (binding && binding.path.isVariableDeclarator()) {
                                const init = binding.path.node.init;
                                let seq;
                                const evalRes = binding.path.get('init').evaluate();
                                if (evalRes.confident && Array.isArray(evalRes.value)) {
                                    seq = evalRes.value;
                                } else {
                                    try { seq = win.eval(code.substring(init.start, init.end)); } catch(e) {}
                                }
                                
                                if (Array.isArray(seq)) {
                                    const caseMap = {};
                                    switchStmt.cases.forEach(c => {
                                        if (c.test && (t.isStringLiteral(c.test) || t.isNumericLiteral(c.test))) {
                                            caseMap[c.test.value] = c.consequent.filter(n => !t.isContinueStatement(n));
                                        }
                                    });
                                    
                                    let unflattened =[];
                                    let valid = true;
                                    seq.forEach(key => {
                                        if (caseMap[key]) unflattened = unflattened.concat(caseMap[key]);
                                        else valid = false;
                                    });
                                    
                                    if (valid && unflattened.length > 0) {
                                        path.replaceWithMultiple(unflattened);
                                        replacedCount++;
                                    }
                                }
                            }
                        }
                    }
                }
            };
        };

        try {
            const transformed = Babel.transform(code, {
                sourceType: "script",
                parserOpts: { allowReturnOutsideFunction: true },
                generatorOpts: { jsescOption: { minimal: true } },
                plugins: [deobfuscatePlugin]
            });
            document.body.removeChild(iframe);
            if (replacedCount > 0 || foldedCount > 0) {
                log(`AST置換: ロジック解除 ${replacedCount}箇所, 定数畳み込み ${foldedCount}箇所`, "info");
            }
            return { code: transformed.code, changed: (replacedCount > 0 || foldedCount > 0) };
        } catch (e) {
            document.body.removeChild(iframe);
            log("AST変換エラー: " + e.message, "error");
            return { code, changed: false };
        }
    }

    document.getElementById('btn-dynamic').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        const unpacked = await dynamicUnpack(code);
        outputEditor.value = formatCode(unpacked);
    });
    
    document.getElementById('btn-strings').addEventListener('click', () => {
        const code = inputEditor.value;
        if (!code) return;
        const result = decodeStringsAST(code);
        outputEditor.value = formatCode(result.code);
    });

    // 4. Deep Auto Deobfuscate パイプライン (完全解除)
    document.getElementById('btn-auto').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        
        log("==== Deep Auto Deobfuscation 開始 ====", "success");
        outputEditor.value = "解析・復元中... (コードの変化が止まるまで深く反復します)";
        
        let currentCode = code;
        let prevOverallCode = "";
        let globalIter = 0;
        const MAX_GLOBAL_ITER = 3;

        while (currentCode !== prevOverallCode && globalIter < MAX_GLOBAL_ITER) {
            prevOverallCode = currentCode;
            globalIter++;
            log(`[Pass ${globalIter}] アンパックと解析を実行中...`, "warning");
            
            let unpacked = await dynamicUnpack(currentCode);
            if (unpacked !== currentCode) currentCode = unpacked;

            let prevAstCode = "";
            let astIter = 0;
            const MAX_AST_ITER = 5;
            while (currentCode !== prevAstCode && astIter < MAX_AST_ITER) {
                prevAstCode = currentCode;
                const result = decodeStringsAST(currentCode);
                currentCode = result.code;
                if (!result.changed) break;
                astIter++;
            }
        }
        
        log("コードをフォーマットしています...", "info");
        currentCode = formatCode(currentCode);
        
        outputEditor.value = currentCode;
        log(`==== 解析完了 (総実行パス数: ${globalIter}) ====`, "success");
    });
</script>
</body>
</html>
