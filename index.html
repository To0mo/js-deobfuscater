<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AST Deobfuscator v11 (Static Analysis Engine)</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; --success: #3fb950; --error: #f85149; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 26px; color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 75vh; }
        textarea { width: 100%; height: 100%; font-family: 'Consolas', monospace; padding: 15px; background: #010409; color: #7ee787; border: 1px solid var(--border); border-radius: 8px; resize: none; box-sizing: border-box; font-size: 14px; line-height: 1.5; outline: none; }
        textarea:focus { border-color: var(--accent); }
        .controls { padding: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        button { background-color: var(--success); color: #fff; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; align-self: flex-start; transition: 0.2s; }
        button:hover:not(:disabled) { filter: brightness(1.2); }
        button:disabled { background-color: var(--border); color: #8b949e; cursor: not-allowed; }
        #log { font-family: monospace; font-size: 13px; color: var(--accent); white-space: pre-wrap; max-height: 200px; overflow-y: auto; padding: 10px; background: #010409; border-radius: 6px; border: 1px solid var(--border);}
    </style>
</head>
<body>

<div class="container">
    <h1>Ultimate AST Deobfuscator v11 (静的解析エンジン)</h1>
    <div class="controls">
        <button id="runBtn" onclick="runDeobfuscator()" disabled>システム起動中...</button>
        <div id="log"></div>
    </div>
    <div class="grid">
        <textarea id="input" spellcheck="false" placeholder="/* ここに難読化コードを貼り付け */"></textarea>
        <textarea id="output" spellcheck="false" readonly placeholder="/* 解析結果がここに表示されます */"></textarea>
    </div>
</div>

<script>
const logEl = document.getElementById('log');
const btn = document.getElementById('runBtn');
function log(msg, isError = false) { logEl.innerHTML += `<span style="color: ${isError ? 'var(--error)' : 'inherit'}">${msg}</span>\n`; logEl.scrollTop = logEl.scrollHeight; }
window.onload = function() { logEl.innerHTML = ""; if (typeof Babel !== 'undefined' && typeof js_beautify !== 'undefined') { log("✅ 全システムの起動が完了しました。"); btn.disabled = false; btn.innerText = "Deobfuscate 実行"; } else { log("❌ 致命的エラー: ライブラリの読み込みに失敗しました。", true); }};
const yieldThread = () => new Promise(resolve => setTimeout(resolve, 10));

async function runDeobfuscator() {
    btn.disabled = true; btn.innerText = "解析中..."; logEl.innerHTML = ""; document.getElementById('output').value = "";
    let code = document.getElementById('input').value;
    if (!code.trim()) { log("❌ エラー: コード未入力", true); btn.disabled = false; btn.innerText = "Deobfuscate 実行"; return; }
    let iframe = document.createElement('iframe'); iframe.style.display = 'none'; document.body.appendChild(iframe);
    let win = iframe.contentWindow;

    try {
        const babelTransform = window.Babel.transform;
        
        log("[*] Phase 1: AST正規化"); await yieldThread();
        code = babelTransform(code, { plugins: [function({types: t}) { return { visitor: {
            ExpressionStatement(path) { if (path.node.expression.type === 'SequenceExpression') path.replaceWithMultiple(path.node.expression.expressions.map(e => t.expressionStatement(e))) },
            MemberExpression(path) { if (path.node.computed && path.node.property.type === 'StringLiteral' && /^[a-zA-Z_$][0-9a-zA-Z_$]*$/.test(path.node.property.value)) { path.node.property = t.identifier(path.node.property.value); path.node.computed = false; }}
        }}}]}).code;
        
        // =================================================================
        // ▼▼▼ 新機能：高度静的解析エンジン (JSFuck / 数式難読化 解除) ▼▼▼
        // =================================================================
        log("[*] Phase 2: 高度静的解析 (数式・型変換の解読)..."); await yieldThread();
        code = babelTransform(code, { plugins: [function({types: t}) { return {
            visitor: {
                "UnaryExpression|BinaryExpression|MemberExpression|CallExpression"(path) {
                    // path.evaluate() は非常に強力だが、無限ループの可能性があるため安全装置を入れる
                    try {
                        const { confident, value } = path.evaluate();
                        if (confident && (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean')) {
                           log(`   -> 静的解析成功: ${path.toString().substring(0, 30)}...  ==>  ${JSON.stringify(value)}`);
                           path.replaceWith(t.valueToNode(value));
                        }
                    } catch (e) {
                        // 評価できない複雑な式は無視
                    }
                }
            }
        }}]}).code;

        log("[*] Phase 3: サンドボックス構築"); await yieldThread();
        win.eval(`window.console=new Proxy({},{get:()=>function(){}});`);
        try { win.eval(code); } catch(e) {}

        log("[*] Phase 4: 文字列復元"); await yieldThread();
        function getOriginalName(path, name) { let c = name, b = path.scope.getBinding(c); while (b && b.path.isVariableDeclarator() && b.path.node.init.type === 'Identifier') { c = b.path.node.init.name; b = path.scope.getBinding(c); } return c; }
        code = babelTransform(code, { plugins: [function({types: t}) { return { visitor: { CallExpression(path) {
            if (path.node.callee.type !== 'Identifier') return;
            const realName = getOriginalName(path, path.node.callee.name);
            if (!win[realName] || typeof win[realName] !== 'function') return;
            const args = []; let canEval = true;
            for (const arg of path.node.arguments) {
                if (arg.type === 'StringLiteral' || arg.type === 'NumericLiteral') args.push(arg.value);
                else if (arg.type === 'UnaryExpression' && arg.argument.type === 'NumericLiteral') args.push(arg.operator === '-' ? -arg.argument.value : arg.argument.value);
                else { canEval = false; break; }
            }
            if (canEval) { try { const res = win[realName](...args); if (typeof res === 'string') path.replaceWith(t.stringLiteral(res)); else if (typeof res === 'number') path.replaceWith(t.numericLiteral(res)); } catch (e) {} }
        }}}}}).code;

        log("[*] Phase 5: アンチ解析ブロック除去"); await yieldThread();
        code = babelTransform(code, { plugins: [function({types: t}) { return { visitor: {
            ExpressionStatement(path) {
                if (path.node.expression.type !== 'CallExpression' || path.node.expression.callee.type !== 'FunctionExpression') return;
                const funcBody = path.node.expression.callee.body.body;
                if (funcBody.some(node => node.type === 'WhileStatement' && node.test.type === 'UnaryExpression')) path.remove();
            }
        }}}]}).code;

        log("[*] Phase 6: ゴミ掃除"); await yieldThread();
        code = babelTransform(code, { plugins: [function({types: t}) { return { visitor: {
            "FunctionDeclaration|VariableDeclarator"(path) { if (path.node.id) { const binding = path.scope.getBinding(path.node.id.name); if (binding && !binding.referenced) path.remove(); }}
        }}}]}).code;

        log("[*] Phase 7: コード整形"); await yieldThread();
        code = js_beautify(code, { indent_size: 4, space_in_empty_paren: true, preserve_newlines: false });
        
        document.getElementById('output').value = code;
        log("✅ 解読完了！");

    } catch (e) {
        log(`❌ 致命的エラー:\n${e.name}: ${e.message}`, true);
    } finally {
        if (iframe) document.body.removeChild(iframe);
        btn.disabled = false;
        btn.innerText = "Deobfuscate 実行";
    }
}
</script>
</body>
</html>
