<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal JS Deobfuscator Studio</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Fira Code) -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* モバイルキーボード対策：dvhとfixedを利用し全体のスクロール・見切れを無効化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            position: fixed; /* スクロールバウンスを完全に防止 */
            top: 0;
            left: 0;
            overflow: hidden !important; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .toolbar { padding: 10px 15px; background-color: #0d1117; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        
        .main-container { 
            display: flex; 
            flex-direction: column; /* モバイルでは縦並び */
            gap: 15px; 
            padding: 0 15px 15px 15px; 
            flex: 1; 
            min-height: 0;
        }
        
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row; /* PCでは横並び */
                padding: 0 20px 20px 20px;
                gap: 20px;
            }
            .toolbar { padding: 12px 20px; gap: 10px; }
        }
        
        /* ウィンドウ風パネル */
        .window-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
            min-height: 0;
        }
        .window-header { 
            padding: 8px 15px; 
            background-color: #21262d; 
            font-size: 0.9em; 
            font-weight: 600; 
            border-bottom: 1px solid #30363d; 
            color: #e6edf3; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0;
        }
        
        /* エディタ部分 */
        .editor { 
            flex: 1; 
            background-color: #0d1117; 
            color: #e6edf3; 
            border: none; 
            padding: 15px; 
            font-family: 'Fira Code', monospace; 
            font-size: 13px; 
            line-height: 1.5;
            outline: none; 
            resize: none; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* iOSのスクロールを滑らかに */
        }
        
        /* ログウィンドウ */
        .log-container {
            padding: 0 15px 15px 15px;
            height: 25dvh;
            display: flex;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .log-container { padding: 0 20px 20px 20px; height: 280px; }
        }
        .log-content { 
            flex: 1; 
            padding: 12px 15px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-family: 'Fira Code', monospace; 
            font-size: 12px; 
            color: #8b949e; 
            background-color: #0d1117;
        }
        .log-entry { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #21262d; word-break: break-all; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.success { color: #3fb950; }
        .log-entry.error { color: #f85149; }
        .log-entry.warning { color: #d29922; }
        
        .btn-custom { background-color: #21262d; color: #c9d1d9; border: 1px solid #363b42; }
        .btn-custom:hover { background-color: #30363d; color: #fff; border-color: #8b949e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h5" style="font-weight: 600;">
            <i class="bi bi-shield-check me-2" style="color: #3fb950;"></i>Universal JS Deobfuscator
        </span>
    </div>
</nav>

<div class="toolbar">
    <button class="btn btn-success btn-sm fw-bold" id="btn-auto" title="強力なAST計装とSandbox解析を用いてコードを復元します">
        <i class="bi bi-magic me-1"></i> Deep Auto
    </button>
    <button class="btn btn-custom btn-sm" id="btn-dynamic"><i class="bi bi-play-circle me-1"></i> Dynamic Unpack</button>
    <button class="btn btn-custom btn-sm" id="btn-strings"><i class="bi bi-fonts me-1"></i> Decode AST</button>
    <button class="btn btn-custom btn-sm" id="btn-format"><i class="bi bi-code-slash me-1"></i> Beautify</button>
    <button class="btn btn-outline-danger btn-sm ms-auto" id="btn-clear"><i class="bi bi-trash"></i></button>
</div>

<div class="main-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-code me-2"></i>Input (Obfuscated)</span>
        </div>
        <textarea class="editor" id="input-editor" spellcheck="false" placeholder="ここに難読化されたJavaScriptコードを貼り付けてください..."></textarea>
    </div>
    
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-check me-2"></i>Output (Deobfuscated)</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-copy" title="Copy to Clipboard"><i class="bi bi-clipboard"></i></button>
        </div>
        <textarea class="editor" id="output-editor" spellcheck="false" readonly placeholder="デコード・整形されたコードがここに表示されます..."></textarea>
    </div>
</div>

<div class="log-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-terminal me-2"></i>Execution Log</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-clear-log" title="Clear Logs"><i class="bi bi-eraser"></i></button>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</div>

<!-- Babel Standalone (AST Parsing) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- js-beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

<script>
    const inputEditor = document.getElementById('input-editor');
    const outputEditor = document.getElementById('output-editor');
    const logContent = document.getElementById('log-content');

    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        if (type === 'error') icon = 'bi-x-circle';
        if (type === 'warning') icon = 'bi-exclamation-triangle';
        
        entry.innerHTML = `<span style="color: #484f58; font-size: 0.9em;">[${timestamp}]</span> <i class="bi ${icon} me-1"></i> ${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        inputEditor.value = ''; outputEditor.value = ''; logContent.innerHTML = '';
        log('エディタとログをクリアしました。', 'info');
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => logContent.innerHTML = '');
    document.getElementById('btn-copy').addEventListener('click', () => {
        outputEditor.select(); document.execCommand('copy');
        log('出力コードをクリップボードにコピーしました。', 'success');
    });

    // 1. js-beautify
    function formatCode(code) {
        if (typeof js_beautify !== 'function') return code;
        try {
            return js_beautify(code, {
                indent_size: 4, space_in_empty_paren: true, preserve_newlines: true, max_preserve_newlines: 2, jslint_happy: true, brace_style: "collapse"
            });
        } catch (e) {
            log("フォーマットエラー: " + e.message, "warning");
            return code;
        }
    }
    document.getElementById('btn-format').addEventListener('click', () => {
        const code = outputEditor.value || inputEditor.value;
        if (!code) return;
        outputEditor.value = formatCode(code);
        log("コードの整形が完了しました。", "success");
    });

    // 2. AST計装型 動的アンパッカー (JSDefender キラー)
    function dynamicUnpack(code) {
        return new Promise((resolve) => {
            log("動的アンパッカーを開始...", "info");
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            const win = iframe.contentWindow;

            let payloads =[];
            function checkAndPush(payload) {
                if (typeof payload === 'string' && payload.length > 50) {
                    try { Babel.transform(payload, { ast: true, code: false }); payloads.push(payload); } catch(e) {}
                }
            }

            win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{}, info: ()=>{} };
            win.onerror = function() { return true; };
            win.setTimeout = function(){ return 0; };
            win.setInterval = function(){ return 0; };

            win.__hook_eval__ = function(p) { checkAndPush(p); try{return win.eval(p);}catch(e){} };
            win.eval = win.__hook_eval__;
            
            const origFunction = win.Function;
            win.Function = function(...args) {
                if (args.length > 0) checkAndPush(args[args.length - 1]);
                try { return origFunction.apply(this, args); } catch(e){}
            };
            win.Function.prototype = origFunction.prototype;

            const origWrite = win.document.write;
            win.document.write = function(p) { checkAndPush(p); return origWrite.apply(this, arguments); };

            // ASTでeval呼び出しを強制的にフック関数へ置換
            let instrumentedCode = code;
            try {
                const ast = Babel.transform(code, {ast:true, code:false, parserOpts:{allowReturnOutsideFunction:true}}).ast;
                Babel.traverse(ast, {
                    CallExpression(path) {
                        if (path.node.callee.name === 'eval') path.node.callee.name = '__hook_eval__';
                    }
                });
                instrumentedCode = Babel.transformFromAst(ast, code, {}).code;
            } catch(e) {}

            const script = win.document.createElement('script');
            script.textContent = instrumentedCode;
            win.document.body.appendChild(script);

            setTimeout(() => {
                document.body.removeChild(iframe);
                if (payloads.length > 0) {
                    payloads.sort((a, b) => b.length - a.length);
                    log(`パッカーを解除しました (${payloads[0].length} bytes)`, "success");
                    resolve(payloads[0]);
                } else {
                    resolve(code);
                }
            }, 250);
        });
    }

    // 3. 強化版 ASTデコーダー (JS Confuser キラー)
    function decodeStringsAST(code) {
        let ast;
        try {
            ast = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast;
        } catch(e) {
            log("ASTのパースに失敗: " + e.message, "error");
            return { code, changed: false };
        }

        // --- Step 1: 全ての関数・配列変数を強制的にグローバル露出させるASTを生成 ---
        let exposeAst;
        try {
            exposeAst = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast;
        } catch(e) { return { code, changed: false }; }

        Babel.traverse(exposeAst, {
            "FunctionDeclaration|FunctionExpression|ArrowFunctionExpression"(path) {
                if (path.node.id && path.node.id.name) {
                    const name = path.node.id.name;
                    const expose = Babel.types.expressionStatement(
                        Babel.types.assignmentExpression("=", Babel.types.memberExpression(Babel.types.identifier("window"), Babel.types.identifier("_fn_" + name)), Babel.types.identifier(name))
                    );
                    if (Babel.types.isBlockStatement(path.node.body)) {
                        try { path.node.body.body.unshift(expose); } catch(e){}
                    }
                }
            },
            VariableDeclaration(path) {
                if (Babel.types.isFor(path.parent)) return;
                const exports =[];
                path.node.declarations.forEach(decl => {
                    if (Babel.types.isIdentifier(decl.id)) {
                        exports.push(
                            Babel.types.expressionStatement(
                                Babel.types.assignmentExpression("=", Babel.types.memberExpression(Babel.types.identifier("window"), Babel.types.identifier("_var_" + decl.id.name)), Babel.types.identifier(decl.id.name))
                            )
                        );
                    }
                });
                if (exports.length > 0) { try { path.insertAfter(exports); } catch(e){} }
            },
            "WhileStatement|ForStatement|DoWhileStatement"(path) {
                const cnt = path.scope.generateUidIdentifier("loop_cnt");
                path.insertBefore(Babel.types.variableDeclaration("let",[Babel.types.variableDeclarator(cnt, Babel.types.numericLiteral(0))]));
                const limitCheck = Babel.types.ifStatement(
                    Babel.types.binaryExpression(">", Babel.types.updateExpression("++", cnt), Babel.types.numericLiteral(50000)),
                    Babel.types.throwStatement(Babel.types.newExpression(Babel.types.identifier("Error"),[Babel.types.stringLiteral("LoopLimit")]))
                );
                if (Babel.types.isBlockStatement(path.node.body)) {
                    path.node.body.body.unshift(limitCheck);
                } else {
                    path.node.body = Babel.types.blockStatement([limitCheck, path.node.body]);
                }
            }
        });

        let exposeCode = "";
        try { exposeCode = Babel.transformFromAst(exposeAst, "", {}).code; } catch (e) {}

        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const win = iframe.contentWindow;

        try {
            win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{} };
            win.setTimeout = function(){}; win.setInterval = function(){};
            // 保護されたコードを実行し、関数/配列をメモリに構築
            win.eval(exposeCode);
        } catch (e) {}

        let replacedCount = 0;
        let foldedCount = 0;

        // --- Step 2: 元のASTを探索し、関数呼び出しや配列アクセスを直接評価して置換 ---
        const deobfuscatePlugin = function({ types: t }) {
            return {
                visitor: {
                    CallExpression(path) {
                        if (t.isIdentifier(path.node.callee)) {
                            const funcName = path.node.callee.name;
                            const isLiteral = (arg) => t.isLiteral(arg) || (t.isUnaryExpression(arg) && t.isLiteral(arg.argument));
                            
                            if (path.node.arguments.length > 0 && path.node.arguments.every(isLiteral)) {
                                if (typeof win["_fn_" + funcName] === 'function') {
                                    try {
                                        // 引数をシリアライズして呼び出し
                                        const callCode = Babel.transformFromAst(t.program([t.expressionStatement(path.node)]), "", {ast:false, code:true}).code;
                                        const hookedCall = callCode.replace(funcName, "window._fn_" + funcName);
                                        const res = win.eval(hookedCall);
                                        if (typeof res === 'string') { path.replaceWith(t.stringLiteral(res)); replacedCount++; }
                                        else if (typeof res === 'number') { path.replaceWith(t.numericLiteral(res)); replacedCount++; }
                                        else if (typeof res === 'boolean') { path.replaceWith(t.booleanLiteral(res)); replacedCount++; }
                                    } catch(e) {}
                                }
                            }
                        }
                    },
                    MemberExpression(path) {
                        if (t.isIdentifier(path.node.object) && t.isNumericLiteral(path.node.property)) {
                            const arrName = path.node.object.name;
                            const idx = path.node.property.value;
                            if (win["_var_" + arrName] !== undefined && typeof win["_var_" + arrName] === 'object' && win["_var_" + arrName] !== null) {
                                try {
                                    const val = win["_var_" + arrName][idx];
                                    if (typeof val === 'string') { path.replaceWith(t.stringLiteral(val)); replacedCount++; }
                                    else if (typeof val === 'number') { path.replaceWith(t.numericLiteral(val)); replacedCount++; }
                                    else if (typeof val === 'boolean') { path.replaceWith(t.booleanLiteral(val)); replacedCount++; }
                                } catch(e){}
                            }
                        }
                    },
                    BinaryExpression(path) {
                        try {
                            const evaluated = path.evaluate();
                            if (evaluated.confident) {
                                if (typeof evaluated.value === 'string') { path.replaceWith(t.stringLiteral(evaluated.value)); foldedCount++; }
                                else if (typeof evaluated.value === 'number') { path.replaceWith(t.numericLiteral(evaluated.value)); foldedCount++; }
                                else if (typeof evaluated.value === 'boolean') { path.replaceWith(t.booleanLiteral(evaluated.value)); foldedCount++; }
                            }
                        } catch(e){}
                    },
                    WhileStatement(path) {
                        // 制御フロー平坦化の解除 (単一変数の状態遷移)
                        const body = path.node.body;
                        if (!t.isBlockStatement(body)) return;
                        const switchStmt = body.body.find(n => t.isSwitchStatement(n));
                        if (!switchStmt || !t.isIdentifier(switchStmt.discriminant)) return;
                        
                        const stateVarName = switchStmt.discriminant.name;
                        const binding = path.scope.getBinding(stateVarName);
                        if (binding && binding.path.isVariableDeclarator()) {
                            const initVal = binding.path.node.init;
                            if (t.isNumericLiteral(initVal) || t.isStringLiteral(initVal)) {
                                let currentState = initVal.value;
                                const caseMap = {};
                                switchStmt.cases.forEach(c => {
                                    if (c.test && (t.isNumericLiteral(c.test) || t.isStringLiteral(c.test))) {
                                        const stmts = c.consequent.filter(stmt => !t.isBreakStatement(stmt));
                                        let nextState = null;
                                        const cleanStmts =[];
                                        for (const stmt of stmts) {
                                            if (t.isExpressionStatement(stmt) && t.isAssignmentExpression(stmt.expression) && t.isIdentifier(stmt.expression.left, { name: stateVarName })) {
                                                if (t.isNumericLiteral(stmt.expression.right) || t.isStringLiteral(stmt.expression.right)) {
                                                    nextState = stmt.expression.right.value;
                                                    continue;
                                                }
                                            }
                                            if (t.isBlockStatement(stmt)) {
                                                let innerNextState = null;
                                                const cleanInner =[];
                                                for (const inner of stmt.body) {
                                                    if (t.isExpressionStatement(inner) && t.isAssignmentExpression(inner.expression) && t.isIdentifier(inner.expression.left, { name: stateVarName })) {
                                                        if (t.isNumericLiteral(inner.expression.right) || t.isStringLiteral(inner.expression.right)) {
                                                            innerNextState = inner.expression.right.value;
                                                            continue;
                                                        }
                                                    }
                                                    cleanInner.push(inner);
                                                }
                                                if (innerNextState !== null) { nextState = innerNextState; stmt.body = cleanInner; }
                                            }
                                            cleanStmts.push(stmt);
                                        }
                                        caseMap[c.test.value] = { stmts: cleanStmts, nextState: nextState };
                                    }
                                });
                                
                                const unflattened =[];
                                let curr = currentState;
                                let visited = new Set();
                                while (curr !== null && caseMap[curr] && !visited.has(curr)) {
                                    visited.add(curr);
                                    unflattened.push(...caseMap[curr].stmts);
                                    curr = caseMap[curr].nextState;
                                }
                                if (unflattened.length > 0) {
                                    path.replaceWithMultiple(unflattened);
                                    replacedCount++;
                                }
                            }
                        }
                    }
                }
            };
        };

        try {
            const transformed = Babel.transformFromAst(ast, code, {
                generatorOpts: { jsescOption: { minimal: true } },
                plugins: [deobfuscatePlugin]
            });
            document.body.removeChild(iframe);
            if (replacedCount > 0 || foldedCount > 0) {
                log(`AST置換: ロジック・配列解除 ${replacedCount}箇所, 定数畳み込み ${foldedCount}箇所`, "info");
            }
            return { code: transformed.code, changed: (replacedCount > 0 || foldedCount > 0) };
        } catch (e) {
            document.body.removeChild(iframe);
            log("AST変換エラー: " + e.message, "error");
            return { code, changed: false };
        }
    }

    document.getElementById('btn-dynamic').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        const unpacked = await dynamicUnpack(code);
        outputEditor.value = formatCode(unpacked);
    });
    
    document.getElementById('btn-strings').addEventListener('click', () => {
        const code = inputEditor.value;
        if (!code) return;
        const result = decodeStringsAST(code);
        outputEditor.value = formatCode(result.code);
    });

    document.getElementById('btn-auto').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        
        log("==== Deep Auto Deobfuscation 開始 ====", "success");
        outputEditor.value = "解析・復元中... (コードの変化が止まるまで深く反復します)";
        
        let currentCode = code;
        let prevOverallCode = "";
        let globalIter = 0;
        const MAX_GLOBAL_ITER = 3;

        while (currentCode !== prevOverallCode && globalIter < MAX_GLOBAL_ITER) {
            prevOverallCode = currentCode;
            globalIter++;
            log(`[Pass ${globalIter}] アンパックと解析を実行中...`, "warning");
            
            let unpacked = await dynamicUnpack(currentCode);
            if (unpacked !== currentCode) currentCode = unpacked;

            let prevAstCode = "";
            let astIter = 0;
            const MAX_AST_ITER = 4;
            while (currentCode !== prevAstCode && astIter < MAX_AST_ITER) {
                prevAstCode = currentCode;
                const result = decodeStringsAST(currentCode);
                currentCode = result.code;
                if (!result.changed) break;
                astIter++;
            }
        }
        
        log("コードをフォーマットしています...", "info");
        currentCode = formatCode(currentCode);
        
        outputEditor.value = currentCode;
        log(`==== 解析完了 (総実行パス数: ${globalIter}) ====`, "success");
    });
</script>
</body>
</html>
