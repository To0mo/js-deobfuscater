<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal JS Deobfuscator Studio</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Fira Code) -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background-color: #0d1117; /* GitHub Dark風の背景 */
            overflow: hidden; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; }
        .toolbar { padding: 12px 20px; background-color: #0d1117; display: flex; gap: 10px; flex-wrap: wrap; }
        
        .main-container { 
            display: flex; 
            gap: 20px; 
            padding: 0 20px 20px 20px; 
            flex: 1; 
            overflow: hidden; 
        }
        
        /* ウィンドウ風のパネルデザイン */
        .window-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .window-header { 
            padding: 10px 15px; 
            background-color: #21262d; 
            font-size: 0.9em; 
            font-weight: 600; 
            border-bottom: 1px solid #30363d; 
            color: #e6edf3; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        /* エディタ部分 (折り返し対応・等幅フォント) */
        .editor { 
            flex: 1; 
            background-color: #0d1117; 
            color: #e6edf3; 
            border: none; 
            padding: 15px; 
            font-family: 'Fira Code', monospace; 
            font-size: 13.5px; 
            line-height: 1.5;
            outline: none; 
            resize: none; 
            white-space: pre-wrap; /* 折り返し */
            word-wrap: break-word; /* 折り返し */
            overflow-y: auto; 
        }
        
        /* ログウィンドウ */
        .log-container {
            padding: 0 20px 20px 20px;
            height: 250px;
            display: flex;
        }
        .log-content { 
            flex: 1; 
            padding: 12px 15px; 
            overflow-y: auto; 
            font-family: 'Fira Code', monospace; 
            font-size: 12.5px; 
            color: #8b949e; 
            background-color: #0d1117;
        }
        .log-entry { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #21262d; word-break: break-all; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.success { color: #3fb950; }
        .log-entry.error { color: #f85149; }
        .log-entry.warning { color: #d29922; }
        
        .btn-custom { background-color: #21262d; color: #c9d1d9; border: 1px solid #363b42; }
        .btn-custom:hover { background-color: #30363d; color: #fff; border-color: #8b949e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h5" style="font-weight: 600;">
            <i class="bi bi-shield-check me-2" style="color: #3fb950;"></i>Universal JS Deobfuscator Studio
        </span>
    </div>
</nav>

<div class="toolbar">
    <button class="btn btn-success btn-sm fw-bold" id="btn-auto" title="Packerの解除、AST文字列デコード、定数畳み込み、フォーマットを自動実行します">
        <i class="bi bi-magic me-1"></i> Auto Deobfuscate
    </button>
    <button class="btn btn-custom btn-sm" id="btn-dynamic"><i class="bi bi-play-circle me-1"></i> Dynamic Unpack (Eval)</button>
    <button class="btn btn-custom btn-sm" id="btn-strings"><i class="bi bi-fonts me-1"></i> Decode Strings (AST)</button>
    <button class="btn btn-custom btn-sm" id="btn-format"><i class="bi bi-code-slash me-1"></i> Beautify Code</button>
    <button class="btn btn-outline-danger btn-sm ms-auto" id="btn-clear"><i class="bi bi-trash me-1"></i> Clear</button>
</div>

<div class="main-container">
    <!-- Input Window -->
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-code me-2"></i>Input (Obfuscated)</span>
        </div>
        <textarea class="editor" id="input-editor" spellcheck="false" placeholder="ここに難読化されたJavaScriptコードを貼り付けてください..."></textarea>
    </div>
    
    <!-- Output Window -->
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-file-earmark-check me-2"></i>Output (Deobfuscated)</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-copy" title="Copy to Clipboard"><i class="bi bi-clipboard"></i></button>
        </div>
        <textarea class="editor" id="output-editor" spellcheck="false" readonly placeholder="デコード・整形されたコードがここに表示されます..."></textarea>
    </div>
</div>

<!-- Log Window -->
<div class="log-container">
    <div class="window-panel">
        <div class="window-header">
            <span><i class="bi bi-terminal me-2"></i>Execution Log</span>
            <button class="btn btn-sm btn-custom py-0" id="btn-clear-log" title="Clear Logs"><i class="bi bi-eraser"></i></button>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</div>

<!-- Babel Standalone (AST Parsing) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- js-beautify (確実なCDNリンク) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

<script>
    const inputEditor = document.getElementById('input-editor');
    const outputEditor = document.getElementById('output-editor');
    const logContent = document.getElementById('log-content');

    // ロギング関数
    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        if (type === 'error') icon = 'bi-x-circle';
        if (type === 'warning') icon = 'bi-exclamation-triangle';
        
        entry.innerHTML = `<span style="color: #484f58; font-size: 0.9em;">[${timestamp}]</span> <i class="bi ${icon} me-1"></i> ${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        inputEditor.value = ''; outputEditor.value = ''; logContent.innerHTML = '';
        log('エディタとログをクリアしました。', 'info');
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => logContent.innerHTML = '');
    document.getElementById('btn-copy').addEventListener('click', () => {
        outputEditor.select(); document.execCommand('copy');
        log('出力コードをクリップボードにコピーしました。', 'success');
    });

    // 1. JS-Beautify による同期フォーマット
    function formatCode(code) {
        if (typeof js_beautify !== 'function') {
            log("js_beautify がロードされていません。", "error");
            return code;
        }
        try {
            return js_beautify(code, {
                indent_size: 4,
                space_in_empty_paren: true,
                preserve_newlines: true,
                max_preserve_newlines: 2,
                jslint_happy: true,
                brace_style: "collapse"
            });
        } catch (e) {
            log("フォーマット中にエラーが発生しました: " + e.message, "warning");
            return code;
        }
    }

    document.getElementById('btn-format').addEventListener('click', () => {
        const code = outputEditor.value || inputEditor.value;
        if (!code) return;
        outputEditor.value = formatCode(code);
        log("js-beautify によるコードフォーマットが完了しました。", "success");
    });

    // 2. 動的アンパッカー (Eval / Function フック)
    // Example 4 のような Packer に対応
    function dynamicUnpack(code) {
        return new Promise((resolve) => {
            log("動的アンパッカー (Eval/Functionフック) を開始...", "info");
            
            const iframe = document.createElement('iframe');
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            let payloads = [];

            try {
                const win = iframe.contentWindow;
                win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{}, info: ()=>{} };

                const origEval = win.eval;
                win.eval = function(payload) {
                    if (typeof payload === 'string' && payload.length > 30) {
                        payloads.push(payload);
                        log(`eval() の呼び出しを傍受しました (サイズ: ${payload.length} bytes)`, "success");
                    }
                    return origEval.apply(this, arguments);
                };

                const origFunction = win.Function;
                const hookedFunction = function(...args) {
                    if (args.length > 0) {
                        const payload = args[args.length - 1];
                        if (typeof payload === 'string' && payload.length > 30) {
                            payloads.push(payload);
                            log(`Function() の呼び出しを傍受しました (サイズ: ${payload.length} bytes)`, "success");
                        }
                    }
                    return origFunction.apply(this, args);
                };
                win.Function = hookedFunction;
                win.Function.prototype = origFunction.prototype;
                win.Function.prototype.constructor = hookedFunction;

                const script = win.document.createElement('script');
                // 無限ループやリダイレクトを防止する防御措置
                script.textContent = `
                    window.setTimeout = function(){};
                    window.setInterval = function(){};
                    window.location = {};
                    try { ${code} } catch(e) {}
                `;
                win.document.body.appendChild(script);

            } catch (err) {
                log(`Sandbox実行中にエラー: ${err.message}`, "warning");
            }

            setTimeout(() => {
                document.body.removeChild(iframe);
                if (payloads.length > 0) {
                    payloads.sort((a, b) => b.length - a.length);
                    const bestPayload = payloads[0];
                    log(`展開されたペイロードを抽出しました (${bestPayload.length} bytes)`, "success");
                    resolve(bestPayload);
                } else {
                    log("動的展開の形跡は見つかりませんでした。", "info");
                    resolve(code);
                }
            }, 300);
        });
    }

    document.getElementById('btn-dynamic').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        const unpacked = await dynamicUnpack(code);
        outputEditor.value = formatCode(unpacked);
    });

    // 3. ASTベースの文字列デコーダー＆定数畳み込み
    // Example 1, 2, 3 のような Obfuscator.io / JsConfuser に対応
    function decodeStringsAST(code) {
        log("ASTによるコンテキスト構築と文字列解決を開始...", "info");
        let ast;
        try {
            ast = Babel.transform(code, { ast: true, code: false }).ast;
        } catch(e) {
            log("ASTのパースに失敗しました (構文エラーの可能性): " + e.message, "error");
            return code;
        }

        // デコーダー関数群を Sandbox にロードするためのコードを抽出
        let setupCode = "";
        let extractedNodes = 0;
        
        ast.program.body.forEach(node => {
            // 変数宣言、関数宣言、即時関数(IIFE)を抽出
            if (node.type === 'VariableDeclaration' || node.type === 'FunctionDeclaration') {
                setupCode += code.substring(node.start, node.end) + "\n";
                extractedNodes++;
            } else if (node.type === 'ExpressionStatement' && node.expression.type === 'CallExpression') {
                setupCode += code.substring(node.start, node.end) + "\n";
                extractedNodes++;
            }
        });

        log(`${extractedNodes} 個のトップレベルコンテキストを Sandbox にロードします。`, "info");

        const iframe = document.createElement('iframe');
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const win = iframe.contentWindow;

        // 防衛コード(Anti-Debug)の暴走を防ぐ
        win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{} };
        try {
            win.eval(`
                window.setTimeout = function(){};
                window.setInterval = function(){};
            `);
            win.eval(setupCode);
            log("Sandbox内でのデコーダー初期化に成功しました。", "success");
        } catch (e) {
            log(`Sandbox実行中にエラーが発生しましたが、一部の関数は利用可能な場合があります (${e.message})`, "warning");
        }

        let replacedCount = 0;
        let foldedCount = 0;

        try {
            const transformed = Babel.transform(code, {
                plugins: [
                    function({ types: t }) {
                        return {
                            visitor: {
                                // 文字列デコーダー関数の評価と置換
                                CallExpression(path) {
                                    if (path.node.callee.type === 'Identifier') {
                                        const funcName = path.node.callee.name;
                                        // 危険なネイティブ関数の実行を防止
                                        if (['eval', 'require', 'setTimeout', 'setInterval', 'console', 'Function', 'parseInt'].includes(funcName)) return;
                                        
                                        // 引数が全てリテラル値かチェック
                                        const isLiteral = (arg) => arg.type.includes('Literal') || (arg.type === 'UnaryExpression' && arg.argument.type.includes('Literal'));
                                        
                                        if (path.node.arguments.length > 0 && path.node.arguments.every(isLiteral)) {
                                            const callCode = code.substring(path.node.start, path.node.end);
                                            try {
                                                const res = win.eval(callCode);
                                                if (typeof res === 'string') {
                                                    path.replaceWith(t.stringLiteral(res));
                                                    replacedCount++;
                                                } else if (typeof res === 'number') {
                                                    path.replaceWith(t.numericLiteral(res));
                                                    replacedCount++;
                                                } else if (typeof res === 'boolean') {
                                                    path.replaceWith(t.booleanLiteral(res));
                                                    replacedCount++;
                                                }
                                            } catch (e) {
                                                // 実行できない関数は無視
                                            }
                                        }
                                    }
                                },
                                // 定数畳み込み (Constant Folding) ex: "a" + "b" -> "ab", 1 + 2 -> 3
                                BinaryExpression(path) {
                                    const evaluated = path.evaluate();
                                    if (evaluated.confident) {
                                        let nodeToReplace;
                                        if (typeof evaluated.value === 'string') nodeToReplace = t.stringLiteral(evaluated.value);
                                        else if (typeof evaluated.value === 'number') nodeToReplace = t.numericLiteral(evaluated.value);
                                        else if (typeof evaluated.value === 'boolean') nodeToReplace = t.booleanLiteral(evaluated.value);
                                        
                                        if (nodeToReplace) {
                                            path.replaceWith(nodeToReplace);
                                            foldedCount++;
                                        }
                                    }
                                }
                            }
                        };
                    }
                ]
            });
            
            document.body.removeChild(iframe);
            log(`AST置換完了: デコーダー呼び出し ${replacedCount} 箇所解除、定数畳み込み ${foldedCount} 箇所解決`, "success");
            return transformed.code;
        } catch (e) {
            document.body.removeChild(iframe);
            log("AST変換に失敗しました: " + e.message, "error");
            return code;
        }
    }

    document.getElementById('btn-strings').addEventListener('click', () => {
        const code = inputEditor.value;
        if (!code) return;
        const decoded = decodeStringsAST(code);
        outputEditor.value = formatCode(decoded);
    });

    // 4. Auto Deobfuscate (一括パイプライン)
    document.getElementById('btn-auto').addEventListener('click', async () => {
        const code = inputEditor.value;
        if (!code) return;
        
        log("==== Auto Deobfuscation パイプライン開始 ====", "info");
        outputEditor.value = "解析・復元中... しばらくお待ちください。";
        
        // Step 1: 動的アンパッカー (Packer解除)
        let currentCode = await dynamicUnpack(code);
        
        // Step 2: AST デコーダー & 定数畳み込み (多重難読化に対応するため複数回実行)
        let previousCode = "";
        let iterations = 0;
        const maxIterations = 3; // 最大3レイヤーまで深掘り
        
        while (currentCode !== previousCode && iterations < maxIterations) {
            previousCode = currentCode;
            log(`AST解析 パス ${iterations + 1} を実行中...`, "info");
            currentCode = decodeStringsAST(currentCode);
            iterations++;
        }
        
        // Step 3: JS-Beautify フォーマット
        log("コードを美しく整形しています...", "info");
        currentCode = formatCode(currentCode);
        
        outputEditor.value = currentCode;
        log("==== パイプラインが完了しました！ ====", "success");
    });
</script>
</body>
</html>
