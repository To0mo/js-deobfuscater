<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Deobfuscator - Web Version</title>
    <!-- Babel Standalone (ブラウザ上でAST操作を行うため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 10px; background: #1e1e1e; color: #d4d4d4; }
        h1 { margin-top: 0; color: #fff; font-size: 24px; }
        .controls { margin-bottom: 10px; }
        button { padding: 8px 16px; cursor: pointer; background: #007acc; color: white; border: none; font-weight: bold; }
        button:hover { background: #005f9e; }
        .editor-container { display: flex; flex: 1; gap: 10px; }
        textarea { flex: 1; resize: none; font-family: monospace; font-size: 14px; padding: 10px; background: #2d2d2d; color: #d4d4d4; border: 1px solid #444; }
        #logs { height: 150px; overflow-y: auto; background: #000; padding: 10px; margin-top: 10px; border: 1px solid #444; }
        .log-time { color: #4af626; }
    </style>
</head>
<body>
    <h1>JS Dynamic Deobfuscator</h1>
    <div class="controls">
        <button id="runBtn">Run & Hook</button>
        <button id="clearBtn">Clear</button>
    </div>
    <div class="editor-container">
        <textarea id="inputCode" placeholder="ここに難読化されたコードを貼り付け..."></textarea>
        <textarea id="outputCode" placeholder="フックされ、Deobfuscateされたコードがここに出力されます..." readonly></textarea>
    </div>
    <div id="logs"></div>

    <script src="app.js"></script>
</body>
</html>
