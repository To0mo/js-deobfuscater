                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'

            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            
            let color = 'text-slate-500';
            let prefix = '⚙️ [SYSTEM]';
            
            if (type === 'success') { color = 'text-emerald-400'; prefix = '✅ [SUCCESS]'; }
            else if (type === 'error') { color = 'text-rose-400'; prefix = '❌ [ERROR]'; }
            else if (type === 'warn') { color = 'text-amber-400'; prefix = '⚠️ [WARN]'; }
            else if (type === 'info') { color = 'text-sky-400'; prefix = 'ℹ️ [INFO]'; }
            
            item.innerHTML = `
                <span class="text-slate-600 font-mono shrink-0">[${timeStr}]</span>
                <span class="${color} font-bold shrink-0 font-mono">${prefix}</span>
                <span class="text-slate-300 font-mono break-all">${escapeHTML(message)}</span>

            consoleEl.appendChild(item);

                <\/script>
            `;

            iframeDoc.open();
            iframeDoc.write(hookScript + userScript);
            iframeDoc.close();
        }

        // サンドボックス停止
        function stopSandbox() {
            if (sandboxIframe) {
                sandboxIframe.remove();
                sandboxIframe = null;
                log('稼働中のサンドボックス（iframe）をリセットしました。', 'info');
            }
        }

        // コード整形
        function formatOutput() {
            const code = outputEditor.getValue();
            if (!code) {
                log('整形対象のコードが出力エリアにありません。', 'warn');
                return;
            }
            try {
                const formatted = js_beautify(code, {
                    indent_size: 2,
                    space_in_empty_paren: true,
                    unescape_strings: true
                });
                outputEditor.setValue(formatted);
                log('コードの整形を実行しました。', 'success');
            } catch (err) {
                log('コードの整形中にエラーが発生しました。', 'error');
            }
        }

        // 親ウィンドウ側メッセージ受信リスナー
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (!data) return;

            if (data.type === 'deobfuscated') {
                log('難読化解除されたコードがインターセプトされました！', 'success');
                outputEditor.setValue(data.code);
                formatOutput(); // 自動的に整形
            } else if (data.type === 'log') {
                log(data.message, data.level);
            }
        });

        // ボタンのクリックイベント群
        document.getElementById('btn-run').addEventListener('click', runSandbox);
        document.getElementById('btn-stop').addEventListener('click', stopSandbox);
        
        document.getElementById('btn-beautify').addEventListener('click', formatOutput);

        document.getElementById('btn-clear').addEventListener('click', () => {
            inputEditor.setValue('');
            log('入力エリアをクリアしました。', 'info');
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            const code = outputEditor.getValue();
            if (code) {
                navigator.clipboard.writeText(code);
                log('出力コードをクリップボードにコピーしました。', 'success');
            } else {
                log('コピーするコードがありません。', 'warn');
            }
        });

        document.getElementById('btn-copy-input').addEventListener('click', () => {
            const code = outputEditor.getValue();
            if (code) {
                inputEditor.setValue(code);
                outputEditor.setValue('');
                log('結果を入力エリアに転送しました。追加の難読化レイヤーを解除できます。', 'info');
            } else {
                log('転送するコードがありません。', 'warn');
            }
        });

        document.getElementById('btn-clear-log').addEventListener('click', () => {
            const consoleEl = document.getElementById('console-log');
            consoleEl.innerHTML = '<div class="text-slate-600">ログをクリアしました。</div>';
        });
    </script>
</body>
</html>
