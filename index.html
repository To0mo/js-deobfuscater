<script>
    const cmInput = CodeMirror.fromTextArea(document.getElementById('input-editor'), { mode: "javascript", theme: "darcula", lineNumbers: true, lineWrapping: true });
    const cmOutput = CodeMirror.fromTextArea(document.getElementById('output-editor'), { mode: "javascript", theme: "darcula", lineNumbers: true, lineWrapping: true });
    const logContent = document.getElementById('log-content');

    function log(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-msg ${type}`;
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `<span style="color: #6b6f75; margin-right: 6px;">[${time}]</span> ${msg}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').onclick = () => { cmInput.setValue(''); cmOutput.setValue(''); logContent.innerHTML=''; };
    document.getElementById('btn-clear-log').onclick = () => logContent.innerHTML='';
    document.getElementById('btn-copy').onclick = () => navigator.clipboard.writeText(cmOutput.getValue()).then(() => log('Copied!', 'success'));

    function formatCode(code) {
        try { return js_beautify(code, { indent_size: 4, space_in_empty_paren: false, preserve_newlines: false, jslint_happy: true, brace_style: "collapse" }); } 
        catch (e) { return code; }
    }

    function finalizeCode(code) {
        try {
            const cleanupPlugin = function({ types: t }) {
                return {
                    visitor: {
                        BlockStatement(path) {
                            let stopIndex = -1;
                            const body = path.get('body');
                            for (let i = 0; i < body.length; i++) {
                                const stmt = body[i];
                                if (stmt.isReturnStatement() || stmt.isThrowStatement() || stmt.isBreakStatement() || stmt.isContinueStatement()) { stopIndex = i; break; }
                            }
                            if (stopIndex !== -1) {
                                for (let i = stopIndex + 1; i < body.length; i++) { body[i].remove(); } 
                            }
                        },
                        EmptyStatement(path) { if (!path.parentPath.isLoop() && !path.parentPath.isIfStatement()) path.remove(); }
                    }
                };
            };
            const minified = Babel.transform(code, { ast: false, code: true, comments: false, compact: true, generatorOpts: { jsescOption: { minimal: true } }, plugins: [cleanupPlugin] });
            return formatCode(minified.code);
        } catch (e) { return formatCode(code); }
    }

    function runPrepasses(code) {
        let changed = false;
        try {
            const unsequencePlugin = function({ types: t }) {
                return {
                    visitor: {
                        VariableDeclaration(path) {
                            if (path.parentPath.isForStatement() || path.parentPath.isForInStatement() || path.parentPath.isForOfStatement()) return;
                            if (path.node.declarations.length > 1) {
                                path.replaceWithMultiple(path.node.declarations.map(decl => t.variableDeclaration(path.node.kind, [t.cloneNode(decl, true)])));
                                changed = true;
                            }
                        },
                        ExpressionStatement(path) {
                            if (t.isSequenceExpression(path.node.expression)) {
                                const exprs = path.node.expression.expressions;
                                path.replaceWithMultiple(exprs.map(e => t.expressionStatement(t.cloneNode(e, true))));
                                changed = true;
                            }
                        }
                    }
                };
            };
            let pass = 0; while(pass < 5) { changed = false; code = Babel.transform(code, { ast: false, code: true, plugins: [unsequencePlugin] }).code; if (!changed) break; pass++; }
        } catch(e) {}

        try {
            const inlineAliasesPlugin = function({ types: t }) {
                return {
                    visitor: {
                        VariableDeclarator(path) {
                            if (t.isIdentifier(path.node.id) && t.isIdentifier(path.node.init)) {
                                const targetBinding = path.scope.getBinding(path.node.init.name);
                                if (targetBinding && targetBinding.constant) {
                                    const binding = path.scope.getBinding(path.node.id.name);
                                    if (binding && binding.constant) {
                                        binding.referencePaths.forEach(ref => ref.replaceWith(t.identifier(path.node.init.name)));
                                        const parent = path.parentPath; path.remove();
                                        if (parent.isVariableDeclaration() && parent.node.declarations.length === 0) parent.remove();
                                        changed = true;
                                    }
                                }
                            }
                        }
                    }
                };
            };
            let pass = 0; while(pass < 3) { changed = false; code = Babel.transform(code, { ast: false, code: true, plugins: [inlineAliasesPlugin] }).code; if (!changed) break; pass++; }
        } catch(e) {}
        return code;
    }

    function decodeStringsAST(rawCode) {
        let code = runPrepasses(rawCode);
        let replacedCount = 0; let foldedCount = 0; let inlinedCount = 0; let dceRemoved = 0;
        
        let ast;
        try { ast = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast; } 
        catch(e) { log("AST parse failed", "error"); return { code: rawCode, changed: false }; }

        let setupCode = "";
        const sideEffectsList = ['document', 'window', 'alert', 'fetch', 'XMLHttpRequest', 'console', 'setTimeout', 'setInterval', 'require', 'process'];

        const findSetupPlugin = function({ types: t }) {
            return {
                visitor: {
                    Program(path) {
                        path.get('body').forEach(stmtPath => {
                            const node = stmtPath.node;
                            let isSafeDecl = false;
                            
                            if (t.isFunctionDeclaration(node) || t.isVariableDeclaration(node)) {
                                let hasSideEffect = false;
                                stmtPath.traverse({ Identifier(p) { if (sideEffectsList.includes(p.node.name)) { hasSideEffect = true; p.stop(); } } });
                                if (!hasSideEffect) isSafeDecl = true;
                            }
                            
                            let isRotation = false;
                            if (t.isExpressionStatement(node)) {
                                let isIIFE = false; const expr = node.expression;
                                if (t.isCallExpression(expr) && (t.isFunctionExpression(expr.callee) || t.isArrowFunctionExpression(expr.callee))) isIIFE = true;
                                else if (t.isUnaryExpression(expr) && t.isCallExpression(expr.argument) && (t.isFunctionExpression(expr.argument.callee) || t.isArrowFunctionExpression(expr.argument.callee))) isIIFE = true;
                                
                                if (isIIFE) {
                                    let hasWhile = false, hasPushShift = false, hasSideEffect = false;
                                    stmtPath.traverse({
                                        WhileStatement() { hasWhile = true; },
                                        Identifier(p) { 
                                            if (['push', 'shift'].includes(p.node.name)) hasPushShift = true; 
                                            if (sideEffectsList.includes(p.node.name)) { hasSideEffect = true; p.stop(); }
                                        }
                                    });
                                    if (hasWhile && hasPushShift && !hasSideEffect) isRotation = true;
                                }
                            }
                            if (isSafeDecl || isRotation) { setupCode += code.substring(node.start, node.end) + "\n"; if (isRotation) node._isRotation = true; }
                        });
                    }
                }
            };
        };
        Babel.transformFromAst(ast, code, { ast: true, code: false, plugins: [findSetupPlugin] });

        try {
            const sandboxPrepPlugin = function({ types: t }) {
                return {
                    visitor: {
                        "WhileStatement|ForStatement|DoWhileStatement"(path) {
                            const limitCheck = t.ifStatement(t.binaryExpression(">", t.assignmentExpression("=", t.memberExpression(t.identifier("window"), t.identifier("_ast_loop")), t.binaryExpression("+", t.logicalExpression("||", t.memberExpression(t.identifier("window"), t.identifier("_ast_loop")), t.numericLiteral(0)), t.numericLiteral(1))), t.numericLiteral(5000)), t.breakStatement());
                            t.isBlockStatement(path.node.body) ? path.node.body.body.unshift(limitCheck) : (path.node.body = t.blockStatement([limitCheck, path.node.body]));
                        }
                    }
                };
            };
            setupCode = Babel.transform(setupCode, { ast: false, code: true, plugins: [sandboxPrepPlugin] }).code;
        } catch(e) {}

        const iframe = document.createElement('iframe'); iframe.style.display = 'none'; document.body.appendChild(iframe);
        const win = iframe.contentWindow;
        try {
            win.console = new Proxy({}, { get: () => () => {} });
            ['alert', 'prompt', 'confirm', 'open', 'print', 'fetch'].forEach(m => win[m] = ()=>{});
            win.setTimeout = ()=>{return 0;}; win.setInterval = ()=>{return 0;};
            if (setupCode.trim()) { const script = win.document.createElement('script'); script.textContent = setupCode; win.document.body.appendChild(script); }
        } catch (e) { log("Sandbox Error: " + e.message, "error"); }

        const deobfuscatePlugin = function({ types: t }) {
            const isLiteralLike = (arg) => {
                if (!arg) return false;
                if (t.isLiteral(arg)) return true;
                if (t.isUnaryExpression(arg) && t.isLiteral(arg.argument)) return true;
                if (t.isArrayExpression(arg)) return arg.elements.every(e => e === null || isLiteralLike(e));
                if (t.isObjectExpression(arg)) return arg.properties.every(p => t.isObjectProperty(p) && isLiteralLike(p.value));
                return false;
            };
            
            const toLiteralNode = (value) => {
                if (typeof value === 'string') return t.stringLiteral(value);
                if (typeof value === 'number' && Number.isFinite(value)) return value < 0 ? t.unaryExpression('-', t.numericLiteral(Math.abs(value))) : t.numericLiteral(value);
                if (typeof value === 'boolean') return t.booleanLiteral(value);
                if (value === null) return t.nullLiteral(); 
                
                // 配列およびオブジェクトはJSON経由でAST化（循環参照によるスタックオーバーフローを防御）
                if (typeof value === 'object' && value !== null) {
                    try { return Babel.transform(`(${JSON.stringify(value)})`, {ast: true, code: false}).ast.program.body[0].expression; } 
                    catch(e) { return null; }
                }
                return null;
            };

            const tryEval = (path) => {
                try {
                    const exprCode = Babel.transformFromAst(t.program([t.expressionStatement(t.cloneNode(path.node, true))]), "", { ast: false, code: true }).code;
                    const res = win.eval(exprCode);
                    if (res !== undefined && typeof res !== 'function' && typeof res !== 'symbol') {
                        const literalNode = toLiteralNode(res);
                        if (literalNode) { path.replaceWith(literalNode); replacedCount++; return true; }
                    }
                } catch (e) {}
                return false;
            };

            return {
                visitor: {
                    IfStatement: {
                        exit(path) {
                            const test = path.get('test');
                            const evaluated = test.evaluate();
                            if (evaluated.confident) {
                                const replacement = evaluated.value ? path.node.consequent : path.node.alternate;
                                if (replacement) { 
                                    const cloned = t.cloneNode(replacement, true); 
                                    t.isBlockStatement(cloned) ? path.replaceWithMultiple(cloned.body) : path.replaceWith(cloned); 
                                } 
                                else { path.remove(); }
                                foldedCount++;
                            }
                        }
                    },
                    MemberExpression: {
                        exit(path) {
                            if (path.node.computed && t.isStringLiteral(path.node.property)) {
                                const propName = path.node.property.value;
                                if (/^[a-zA-Z_$][0-9a-zA-Z_$]*$/.test(propName)) { path.node.computed = false; path.node.property = t.identifier(propName); foldedCount++; }
                            }
                        }
                    },
                    ExpressionStatement(path) { if (path.node._isRotation) { path.remove(); dceRemoved++; } },
                    CallExpression: {
                        exit(path) {
                            // 無限の自己参照ラッパー展開をガードする（Max Call Stack Size Exceededの元凶対策）
                            if (path.node._inlined > 10) return;

                            if (t.isIdentifier(path.node.callee)) {
                                const funcName = path.node.callee.name;
                                const binding = path.scope.getBinding(funcName);
                                if (binding && binding.path.isFunctionDeclaration()) {
                                    const funcNode = binding.path.node;
                                    if (funcNode.body.body.length === 1 && t.isReturnStatement(funcNode.body.body[0]) && funcNode.body.body[0].argument) {
                                        const params = funcNode.params; const args = path.node.arguments;
                                        if (params.every(p => t.isIdentifier(p))) {
                                            const argMap = {}; params.forEach((p, i) => { argMap[p.name] = args[i] || t.identifier("undefined"); });
                                            const inlined = t.cloneNode(funcNode.body.body[0].argument, true);
                                            
                                            // インライン展開のネスト階層をマーキング
                                            inlined._inlined = (path.node._inlined || 0) + 1;

                                            if (t.isIdentifier(inlined) && argMap[inlined.name]) {
                                                const cl = t.cloneNode(argMap[inlined.name], true);
                                                cl._inlined = inlined._inlined;
                                                path.replaceWith(cl);
                                            } else { 
                                                path.replaceWith(inlined); 
                                                path.traverse({ 
                                                    Identifier(ip) { 
                                                        if (ip.isReferencedIdentifier() && argMap[ip.node.name]) {
                                                            const cl = t.cloneNode(argMap[ip.node.name], true);
                                                            cl._inlined = inlined._inlined;
                                                            ip.replaceWith(cl);
                                                            ip.skip();
                                                        }
                                                    } 
                                                }); 
                                            }
                                            inlinedCount++; return;
                                        }
                                    }
                                }
                                if (path.node.arguments.every(isLiteralLike)) tryEval(path);
                            } else if (t.isMemberExpression(path.node.callee)) {
                                if (!path.node.arguments.every(isLiteralLike)) return; 
                                let safe = true;
                                path.traverse({ Identifier(p) { if (sideEffectsList.includes(p.node.name) || ['eval', 'Function'].includes(p.node.name)) { safe = false; p.stop(); } } });
                                if (safe) tryEval(path);
                            }
                        }
                    },
                    "WhileStatement|ForStatement"(path) {
                        const body = path.node.body;
                        let switchStmt = t.isBlockStatement(body) ? body.body.find(n => t.isSwitchStatement(n)) : (t.isSwitchStatement(body) ? body : null);
                        if (!switchStmt || !t.isIdentifier(switchStmt.discriminant)) return;
                        const stateVarName = switchStmt.discriminant.name; const binding = path.scope.getBinding(stateVarName);
                        if (!binding) return;
                        
                        let initVal = binding.path.isVariableDeclarator() ? binding.path.node.init : (binding.path.isAssignmentExpression() ? binding.path.node.right : null);
                        if (initVal && (t.isNumericLiteral(initVal) || t.isStringLiteral(initVal))) {
                            let currentState = initVal.value; const caseMap = {};
                            switchStmt.cases.forEach(c => {
                                if (c.test && (t.isNumericLiteral(c.test) || t.isStringLiteral(c.test))) {
                                    const stmts = c.consequent.filter(stmt => !t.isBreakStatement(stmt) && !t.isContinueStatement(stmt));
                                    let nextState = null; const cleanStmts = [];
                                    for (const stmt of stmts) {
                                        if (t.isExpressionStatement(stmt) && t.isAssignmentExpression(stmt.expression) && t.isIdentifier(stmt.expression.left, { name: stateVarName })) {
                                            if (t.isNumericLiteral(stmt.expression.right) || t.isStringLiteral(stmt.expression.right)) { nextState = stmt.expression.right.value; continue; }
                                        }
                                        cleanStmts.push(stmt);
                                    }
                                    caseMap[c.test.value] = { stmts: cleanStmts, nextState };
                                }
                            });
                            const unflattened = []; let curr = currentState; let visited = new Set();
                            while (curr !== null && curr !== undefined && caseMap[curr] && !visited.has(curr)) {
                                visited.add(curr); 
                                unflattened.push(...caseMap[curr].stmts.map(stmt => t.cloneNode(stmt, true))); 
                                curr = caseMap[curr].nextState;
                            }
                            if (unflattened.length > 0) { path.replaceWith(t.blockStatement(unflattened)); foldedCount++; }
                        }
                    },
                    BinaryExpression: { exit(path) { const ev = path.evaluate(); if (ev.confident && ev.value !== undefined) { const lit = toLiteralNode(ev.value); if (lit) { path.replaceWith(lit); foldedCount++; } } } },
                    UnaryExpression: { exit(path) { const ev = path.evaluate(); if (ev.confident && ev.value !== undefined) { const lit = toLiteralNode(ev.value); if (lit) { path.replaceWith(lit); foldedCount++; } } } },
                    LogicalExpression: { exit(path) { const ev = path.evaluate(); if (ev.confident && ev.value !== undefined) { const lit = toLiteralNode(ev.value); if (lit) { path.replaceWith(lit); foldedCount++; } } } }
                }
            };
        };

        let transformedCode = code;
        try { transformedCode = Babel.transformFromAst(ast, code, { ast: false, code: true, generatorOpts: { jsescOption: { minimal: true } }, plugins: [deobfuscatePlugin] }).code; } 
        catch(e) { log("Deobfuscate AST Error: " + e.message, "error"); }

        const dcePlugin = function({ types: t }) {
            return {
                visitor: {
                    "VariableDeclarator|FunctionDeclaration"(path) {
                        if (path.removed || !path.node.id || !t.isIdentifier(path.node.id)) return;
                        const binding = path.scope.getBinding(path.node.id.name);
                        if (binding && !binding.referenced) {
                            if (path.isVariableDeclarator()) {
                                const parent = path.parentPath; path.remove();
                                if (parent && parent.isVariableDeclaration() && parent.node.declarations.length === 0) parent.remove();
                            } else path.remove();
                            dceRemoved++;
                        }
                    }
                }
            };
        };

        let passCount = 0; let changedDCE = true;
        while(changedDCE && passCount < 10) {
            changedDCE = false;
            try {
                const preDceCode = transformedCode;
                transformedCode = Babel.transform(transformedCode, { ast: false, code: true, parserOpts: { allowReturnOutsideFunction: true }, plugins: [dcePlugin] }).code;
                if (preDceCode !== transformedCode) changedDCE = true;
            } catch(e) { break; }
            passCount++;
        }

        document.body.removeChild(iframe);
        const totalChanged = replacedCount > 0 || foldedCount > 0 || inlinedCount > 0 || dceRemoved > 0;
        if (totalChanged) log(`AST Deobf: Evaluated ${replacedCount} calls, Inlined ${inlinedCount} wrappers, Unflattened ${foldedCount} paths, Removed ${dceRemoved} dead nodes`, "success");
        return { code: transformedCode, changed: totalChanged };
    }

    function dynamicUnpack(code) {
        return new Promise((resolve) => {
            let safeCode = code;
            
            try {
                const loopLimitPlugin = function({ types: t }) {
                    return {
                        visitor: {
                            "WhileStatement|ForStatement|DoWhileStatement"(path) {
                                const limitCheck = t.ifStatement(
                                    t.binaryExpression(">", 
                                        t.assignmentExpression("=", 
                                            t.memberExpression(t.identifier("window"), t.identifier("_dyn_loop")), 
                                            t.binaryExpression("+", 
                                                t.logicalExpression("||", t.memberExpression(t.identifier("window"), t.identifier("_dyn_loop")), t.numericLiteral(0)), 
                                                t.numericLiteral(1)
                                            )
                                        ),
                                        t.numericLiteral(5000)
                                    ),
                                    t.breakStatement()
                                );
                                if (t.isBlockStatement(path.node.body)) { path.node.body.body.unshift(limitCheck); } 
                                else { path.node.body = t.blockStatement([limitCheck, path.node.body]); }
                            }
                        }
                    };
                };
                safeCode = Babel.transform(code, { ast: false, code: true, plugins: [loopLimitPlugin] }).code;
            } catch (e) { log("Dynamic Unpack loop protector failed", "warning"); }

            const iframe = document.createElement('iframe'); iframe.style.display = 'none'; document.body.appendChild(iframe);
            let payloads = [];
            try {
                const win = iframe.contentWindow; win.console = new Proxy({}, { get: () => () => {} });
                win.alert = ()=>{}; win.fetch = ()=>{}; win.onerror = () => true; win.prompt = ()=>{}; win.confirm = ()=>{};
                const checkAndPush = (p) => { if (typeof p === 'string' && p.trim().length > 10) payloads.push(p); };
                
                const origEval = win.eval; win.eval = function(p) { checkAndPush(p); try { return origEval.apply(this, arguments); } catch(e){} };
                win.document.write = function(p) { checkAndPush(p); };
                win.setTimeout = () => 0; 
                win.setInterval = () => 0;
                
                const script = win.document.createElement('script'); script.textContent = safeCode; win.document.body.appendChild(script);
            } catch (err) {}
            
            setTimeout(() => {
                document.body.removeChild(iframe);
                if (payloads.length > 0) {
                    payloads.sort((a, b) => b.length - a.length);
                    for (const p of payloads) {
                        try { Babel.transform(p, { ast: false, code: false }); log(`Packer removed (${p.length} bytes)`, "success"); return resolve(p); } catch(e) {}
                    }
                }
                resolve(code);
            }, 300);
        });
    }

    function antiMinify(code) {
        try {
            const antiMinifyPlugin = function({ types: t }) {
                return {
                    visitor: {
                        Scopable(path) {
                            const bindings = path.scope.bindings;
                            for (const name in bindings) {
                                if (name.length <= 2 && !['e', '_', '$'].includes(name) && /^[a-zA-Z]+$/.test(name)) {
                                    const binding = bindings[name];
                                    let prefix = binding.kind === "param" ? "_arg" : (binding.path.isFunction() ? "_func" : "_var");
                                    path.scope.rename(name, path.scope.generateUid(prefix));
                                }
                            }
                        }
                    }
                };
            };
            return Babel.transform(code, { ast: false, code: true, parserOpts: { allowReturnOutsideFunction: true }, plugins: [antiMinifyPlugin] }).code;
        } catch(e) { return code; }
    }

    async function deepAutoSingle(code) {
        let currentCode = code; let prevOverallCode = ""; let globalIter = 0;
        
        while (currentCode !== prevOverallCode && globalIter < 3) {
            prevOverallCode = currentCode; globalIter++;
            log(`[Pass ${globalIter}] Sandbox Dynamic Unpack...`, "warning");
            currentCode = await dynamicUnpack(currentCode);
            
            let prevAstCode = ""; let astIter = 0;
            while (currentCode !== prevAstCode && astIter < 5) {
                prevAstCode = currentCode;
                const result = decodeStringsAST(currentCode);
                currentCode = result.code;
                if (!result.changed) break;
                astIter++;
            }
        }
        
        log(`Final Pass: Anti-Minify...`, "info");
        currentCode = antiMinify(currentCode);
        return finalizeCode(currentCode);
    }

    // Event Listeners
    document.getElementById('btn-auto').onclick = async (e) => {
        e.preventDefault(); const code = cmInput.getValue(); if (!code) return;
        log("==== Deep Auto Deobfuscation Start ====", "success"); cmOutput.setValue("Processing...");
        const result = await deepAutoSingle(code);
        cmOutput.setValue(result);
        log(`==== Deep Auto Deobfuscation Done ====`, "success");
    };

    document.getElementById('btn-dynamic').onclick = async (e) => { e.preventDefault(); const c = cmInput.getValue(); if(c) cmOutput.setValue(finalizeCode(await dynamicUnpack(c))); };
    document.getElementById('btn-strings').onclick = (e) => { e.preventDefault(); const c = cmInput.getValue(); if(c) cmOutput.setValue(finalizeCode(decodeStringsAST(c).code)); };
    document.getElementById('btn-antiminify').onclick = (e) => { e.preventDefault(); const c = cmOutput.getValue() || cmInput.getValue(); if(c) cmOutput.setValue(finalizeCode(antiMinify(c))); };
</script>
