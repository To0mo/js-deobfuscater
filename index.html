    <!-- Google Fonts (Fira Code) -->

    <style>
        /* 繝｢繝舌う繝ｫ繧ｭ繝ｼ繝懊・繝牙ｯｾ遲厄ｼ單vh縺ｨfixed繧貞茜逕ｨ縺怜・菴薙・繧ｹ繧ｯ繝ｭ繝ｼ繝ｫ繝ｻ隕句・繧後ｒ辟｡蜉ｹ蛹・*/
        html, body {
            margin: 0;

            left: 0;

        .toolbar { padding: 10px 15px; background-color: #0d1117; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        
        .main-container { 
            display: flex; 
            flex-direction: column; /* 繝｢繝舌う繝ｫ縺ｧ縺ｯ邵ｦ荳ｦ縺ｳ */
            gap: 15px; 
            padding: 0 15px 15px 15px; 
            flex: 1; 
            min-height: 0;
        }
        
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row; /* PC縺ｧ縺ｯ讓ｪ荳ｦ縺ｳ */
                padding: 0 20px 20px 20px;
                gap: 20px;

            .toolbar { padding: 12px 20px; gap: 10px; }
        }
        
        /* 繧ｦ繧｣繝ｳ繝峨え鬚ｨ繝代ロ繝ｫ */
        .window-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
            min-height: 0; /* 蟄占ｦ∫ｴ縺ｮ繧ｪ繝ｼ繝舌・繝輔Ο繝ｼ繧定ｨｱ蜿ｯ */
        }

            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0;
        }
        
        /* 繧ｨ繝・ぅ繧ｿ驛ｨ蛻・*/
        .editor { 
            flex: 1; 
            background-color: #0d1117; 
            color: #e6edf3;

            padding: 15px; 
            font-family: 'Fira Code', monospace; 
            font-size: 13px; 
            line-height: 1.5;
            outline: none; 
            resize: none;

            -webkit-overflow-scrolling: touch; /* iOS縺ｮ繧ｹ繧ｯ繝ｭ繝ｼ繝ｫ繧呈ｻ代ｉ縺九↓ */
        }
        
        /* 繝ｭ繧ｰ繧ｦ繧｣繝ｳ繝峨え */
        .log-container {
            padding: 0 15px 15px 15px;
            height: 25dvh; /* 蜈ｨ菴薙・25%縺ｮ鬮倥＆ */
            display: flex;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .log-container { padding: 0 20px 20px 20px; height: 280px; }
        }
        .log-content { 
            flex: 1; 
            padding: 12px 15px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-family: 'Fira Code', monospace; 
            font-size: 12px;

        }
        .log-entry { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #21262d; word-break: break-all; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.success { color: #3fb950; }

<!-- Babel Standalone (AST Parsing) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- js-beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

<script>
    const inputEditor = document.getElementById('input-editor');
    const outputEditor = document.getElementById('output-editor');
    const logContent = document.getElementById('log-content');

    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        if (type === 'error') icon = 'bi-x-circle';
        if (type === 'warning') icon = 'bi-exclamation-triangle';
        
        entry.innerHTML = `<span style="color: #484f58; font-size: 0.9em;">[${timestamp}]</span> <i class="bi ${icon} me-1"></i> ${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        inputEditor.value = ''; outputEditor.value = ''; logContent.innerHTML = '';
        log('Editor and logs cleared.', 'info');
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => logContent.innerHTML = '');
    document.getElementById('btn-copy').addEventListener('click', () => {
        outputEditor.select(); document.execCommand('copy');
        log('Output copied to clipboard.', 'success');
    });

    // 1. js-beautify
    function formatCode(code) {
        if (typeof js_beautify !== 'function') return code;
        try {
            return js_beautify(code, {
                indent_size: 4, space_in_empty_paren: true, preserve_newlines: true, max_preserve_newlines: 2, jslint_happy: true, brace_style: "collapse"
            });
        } catch (e) {
            log("Format Error" + e.message, "warning");
            return code;
        }
    }
    document.getElementById('btn-format').addEventListener('click', () => {
        const code = outputEditor.value || inputEditor.value;
        if (!code) return;
        outputEditor.value = formatCode(code);
        log("Code formatted.", "success");
    });

    // 2. 蜍慕噪繧｢繝ｳ繝代ャ繧ｫ繝ｼ (蝣・欧蛹也沿)
    function canParseJavaScript(code) {
        try {
            Babel.transform(code, {
                ast: true,
                code: false,
                parserOpts: {
                    allowReturnOutsideFunction: true,
                    allowAwaitOutsideFunction: true
                }
            });
            return true;
        } catch (e) {
            return false;
        }
    }

    function splitInputIntoSnippets(rawCode) {
        const normalized = String(rawCode || "").replace(/^\uFEFF/, "").trim();
        if (!normalized) return [];
        if (canParseJavaScript(normalized)) return [{ title: "", code: normalized }];

        const lines = normalized.split(/\r?\n/);
        const snippets = [];
        let currentTitle = "";
        let bucket = [];

        const flushBucket = () => {
            const chunk = bucket.join("\n").trim();
            bucket = [];
            if (!chunk) return;
            if (canParseJavaScript(chunk)) snippets.push({ title: currentTitle, code: chunk });
        };

        lines.forEach((line) => {
            const marker = line.match(/^\s*(?:\/\/\s*)?Example\s+(\d+)\s*:?\s*$/i);
            if (marker) {
                flushBucket();
                currentTitle = `Example ${marker[1]}`;
                return;
            }
            bucket.push(line);
        });
        flushBucket();

        if (snippets.length > 0) return snippets;

        const markerRemoved = normalized.replace(/^\s*(?:\/\/\s*)?Example\s+\d+\s*:?\s*$/gim, "").trim();
        if (markerRemoved && canParseJavaScript(markerRemoved)) return [{ title: "", code: markerRemoved }];
        return [{ title: "", code: normalized }];
    }

    function buildMultiSnippetOutput(results) {
        if (results.length === 1) return results[0].code;
        return results.map((result, index) => {
            const title = result.title || `Snippet ${index + 1}`;
            return `/* ${title} */\n${result.code}`;
        }).join("\n\n");
    }

    function dynamicUnpack(code) {
        return new Promise((resolve) => {
            log("Starting Dynamic Unpacker (Eval/Function hook)...", "info");
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            let payloads =[];

            try {
                const win = iframe.contentWindow;
                win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{}, info: ()=>{} };
                win.onerror = function() { return true; }; // 繧ｨ繝ｩ繝ｼ繧呈椛豁｢

                // 繝壹う繝ｭ繝ｼ繝峨′譛牙柑縺ｪJS縺区､懆ｨｼ
                function checkAndPush(payload) {
                    if (typeof payload === 'string' && payload.length > 50) {
                        try {
                            Babel.transform(payload, { ast: true, code: false }); // 讒区枚繝√ぉ繝・け
                            payloads.push(payload);
                        } catch(e) {}
                    }
                }

                const origEval = win.eval;
                win.eval = function(payload) {
                    checkAndPush(payload);
                    try { return origEval.apply(this, arguments); } catch(e){}
                };

                const origFunction = win.Function;
                const hookedFunction = function(...args) {
                    if (args.length > 0) checkAndPush(args[args.length - 1]);
                    try { return origFunction.apply(this, args); } catch(e){}
                };
                win.Function = hookedFunction;
                win.Function.prototype = origFunction.prototype;
                win.Function.prototype.constructor = hookedFunction;
                
                const origWrite = win.document.write;
                win.document.write = function(payload) {
                    checkAndPush(payload);
                    return origWrite.apply(this, arguments);
                };

                // Timer safety
                win.setTimeout = function(cb){ if(typeof cb === 'function') cb(); return 0; };
                win.setInterval = function(){ return 0; };

                const script = win.document.createElement('script');
                script.textContent = code; // try-catch縺ｧ蝗ｲ縺ｾ縺ｪ縺・閾ｪ蟾ｱ讀懆ｨｼ繝上ャ繧ｷ繝･縺ｮ遐ｴ螢翫ｒ髦ｲ縺・
                win.document.body.appendChild(script);

            } catch (err) {
                log(`Sandbox Error: ${err.message}`, "warning");
            }

            setTimeout(() => {
                document.body.removeChild(iframe);
                if (payloads.length > 0) {
                    payloads.sort((a, b) => b.length - a.length);
                    const bestPayload = payloads[0];
                    log(`Packer removed (${bestPayload.length} bytes)`, "success");
                    resolve(bestPayload);
                } else {
                    resolve(code);
                }
            }, 250);
        });
    }

    // 3. 蠑ｷ蛹也沿 AST繝吶・繧ｹ縺ｮ繝・さ繝ｼ繝繝ｼ・・宛蠕｡繝輔Ο繝ｼ蟷ｳ蝮ｦ蛹冶ｧ｣髯､
    function decodeStringsAST(code) {
        let ast;
        try {
            ast = Babel.transform(code, { ast: true, code: false, parserOpts: { allowReturnOutsideFunction: true } }).ast;
        } catch(e) {
            log("AST parsing failed:" + e.message, "error");
            return { code, changed: false };
        }

        // ==========================================
        // AST繧剃ｽｿ縺｣縺ｦ螳牙・縺ｪ繧ｻ繝・ヨ繧｢繝・・繧ｳ繝ｼ繝峨ｒ謚ｽ蜃ｺ
        // ==========================================
        let setupNodes =[];
        ast.program.body.forEach(node => {
            const nodeLength = node.end - node.start;
            // 譛ｬ邱ｨ縺ｮ蟾ｨ螟ｧ縺ｪ繝弱・繝峨・髯､螟悶☆繧・(Obfuscator.io縺ｮ蛻晄悄蛹悶・繝・さ繝ｼ繝縺ｮ縺ｿ繧呈歓蜃ｺ)
            if (code.length > 200000 && nodeLength > code.length * 0.92) return;
            if (node.type === 'VariableDeclaration' || node.type === 'FunctionDeclaration' || node.type === 'ExpressionStatement') {
                setupNodes.push(node);
            }
        });

        // 謚ｽ蜃ｺ縺励◆繧ｳ繝ｼ繝峨↓縲、ST繧剃ｽｿ縺｣縺ｦ辟｡髯舌Ν繝ｼ繝鈴亟豁｢縺ｮ繧ｫ繧ｦ繝ｳ繧ｿ繧貞ｼｷ蛻ｶ豕ｨ蜈･縺吶ｋ
        let setupCode = "";
        const loopLimitPlugin = function({ types: t }) {
            return {
                visitor: {
                    "WhileStatement|ForStatement|DoWhileStatement"(path) {
                        const cnt = path.scope.generateUidIdentifier("loop_cnt");
                        path.insertBefore(t.variableDeclaration("let",[t.variableDeclarator(cnt, t.numericLiteral(0))]));
                        const limitCheck = t.ifStatement(
                            t.binaryExpression(">", t.updateExpression("++", cnt), t.numericLiteral(100000)),
                            t.throwStatement(t.newExpression(t.identifier("Error"), [t.stringLiteral("Infinite loop detected")]))
                        );
                        if (t.isBlockStatement(path.node.body)) {
                            path.node.body.body.unshift(limitCheck);
                        } else {
                            path.node.body = t.blockStatement([limitCheck, path.node.body]);
                        }
                    }
                }
            };
        };

        if (setupNodes.length > 0) {
            try {
                setupCode = Babel.transformFromAst(Babel.types.program(setupNodes), code, {ast: false, code: true}).code || "";
            } catch (e) {
                try {
                    const chunks = setupNodes
                        .filter((n) => Number.isInteger(n.start) && Number.isInteger(n.end) && n.end > n.start)
                        .map((n) => code.slice(n.start, n.end));
                    setupCode = chunks.join("\n");
                } catch (e2) {}
            }

            if (setupCode.trim()) {
                try {
                    setupCode = Babel.transform(setupCode, {
                        plugins: [loopLimitPlugin],
                        parserOpts: { allowReturnOutsideFunction: true, allowAwaitOutsideFunction: true }
                    }).code;
                } catch (e) {
                    // setup guard only; keep unguarded setupCode
                }
            } else {
                // keep going without setup code
            }
        }

        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const win = iframe.contentWindow;

        try {
            win.console = { log: ()=>{}, warn: ()=>{}, error: ()=>{} };
            win.setTimeout = function(){}; win.setInterval = function(){};
            // Execute setup code in sandbox
            win.eval(setupCode);
        } catch (e) {
            // 辟｡髯舌Ν繝ｼ繝玲凾縺ｯ縺薙％縺ｧError縺荊hrow縺輔ｌ繧九◆繧∫┌隕悶＠縺ｦ邯夊｡悟庄閭ｽ
        }

        let replacedCount = 0;
        let foldedCount = 0;

        const deobfuscatePlugin = function({ types: t }) {
            const proxyDict = {};
            const constArrayDict = {};
            const noOpWrappers = new Set();
            const blockedCallees = new Set(['eval', 'require', 'setTimeout', 'setInterval', 'Function', 'console', 'parseInt', 'String', 'decodeURIComponent', 'escape', 'atob', 'btoa']);

            const isLiteralLike = (arg) => t.isLiteral(arg) || (t.isUnaryExpression(arg) && t.isLiteral(arg.argument));

            const toLiteralNode = (value) => {
                if (typeof value === 'string') return t.stringLiteral(value);
                if (typeof value === 'number' && Number.isFinite(value)) return t.numericLiteral(value);
                if (typeof value === 'boolean') return t.booleanLiteral(value);
                if (value === null) return t.nullLiteral();
                return null;
            };

            const isDotSafeKey = (name) => {
                if (typeof name !== 'string') return false;
                if (!/^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name)) return false;
                const reserved = new Set([
                    'break', 'case', 'catch', 'class', 'const', 'continue', 'debugger', 'default', 'delete',
                    'do', 'else', 'export', 'extends', 'finally', 'for', 'function', 'if', 'import', 'in',
                    'instanceof', 'new', 'return', 'super', 'switch', 'this', 'throw', 'try', 'typeof', 'var',
                    'void', 'while', 'with', 'yield', 'let', 'static', 'enum', 'await', 'implements', 'package',
                    'protected', 'interface', 'private', 'public'
                ]);
                return !reserved.has(name);
            };

            const nodeToLiteralValue = (node) => {
                if (!node) return { ok: false };
                if (t.isStringLiteral(node) || t.isNumericLiteral(node) || t.isBooleanLiteral(node)) return { ok: true, value: node.value };
                if (t.isNullLiteral(node)) return { ok: true, value: null };
                if (t.isUnaryExpression(node) && (node.operator === '-' || node.operator === '+') && t.isNumericLiteral(node.argument)) {
                    return { ok: true, value: node.operator === '-' ? -node.argument.value : node.argument.value };
                }
                return { ok: false };
            };

            const getMemberKey = (memberNode) => {
                if (!memberNode.computed && t.isIdentifier(memberNode.property)) return { ok: true, value: memberNode.property.name };
                if (!memberNode.computed) return { ok: false };

                const prop = memberNode.property;
                if (t.isStringLiteral(prop) || t.isNumericLiteral(prop)) return { ok: true, value: prop.value };
                if (t.isUnaryExpression(prop) && (prop.operator === '-' || prop.operator === '+') && t.isNumericLiteral(prop.argument)) {
                    return { ok: true, value: prop.operator === '-' ? -prop.argument.value : prop.argument.value };
                }
                return { ok: false };
            };

            const canReplaceMemberExpression = (path) => {
                if (path.parentPath && path.parentPath.isAssignmentExpression() && path.parentKey === 'left') return false;
                if (path.parentPath && path.parentPath.isUpdateExpression()) return false;
                if (path.parentPath && path.parentPath.isUnaryExpression({ operator: 'delete' })) return false;
                if (path.parentPath && path.parentPath.isForInStatement() && path.parentKey === 'left') return false;
                if (path.parentPath && path.parentPath.isForOfStatement() && path.parentKey === 'left') return false;
                return true;
            };

            const tryReplaceByEvaluation = (path) => {
                try {
                    const evaluated = path.evaluate();
                    if (!evaluated.confident) return false;
                    const literalNode = toLiteralNode(evaluated.value);
                    if (!literalNode) return false;
                    path.replaceWith(literalNode);
                    foldedCount++;
                    return true;
                } catch (e) {
                    return false;
                }
            };

            const isNoOpWrapperBody = (fnName, bodyStmts) => {
                if (!Array.isArray(bodyStmts)) return false;
                if (bodyStmts.length === 0) return true;
                if (bodyStmts.length !== 1) return false;
                const stmt = bodyStmts[0];
                if (!t.isExpressionStatement(stmt)) return false;
                if (!t.isAssignmentExpression(stmt.expression, { operator: '=' })) return false;
                const assign = stmt.expression;
                if (!t.isIdentifier(assign.left, { name: fnName })) return false;
                if (!t.isFunctionExpression(assign.right) && !t.isArrowFunctionExpression(assign.right)) return false;
                if (!t.isBlockStatement(assign.right.body)) return false;
                return assign.right.body.body.length === 0;
            };

            const seedNoOpWrappers = (programNode) => {
                if (!programNode || !Array.isArray(programNode.body)) return;
                programNode.body.forEach((node) => {
                    if (t.isFunctionDeclaration(node) && node.id && node.id.name && node.body && Array.isArray(node.body.body)) {
                        if (isNoOpWrapperBody(node.id.name, node.body.body)) noOpWrappers.add(node.id.name);
                    }
                    if (t.isVariableDeclaration(node)) {
                        node.declarations.forEach((decl) => {
                            if (!t.isIdentifier(decl.id) || !decl.init) return;
                            if (!t.isFunctionExpression(decl.init) && !t.isArrowFunctionExpression(decl.init)) return;
                            if (!t.isBlockStatement(decl.init.body)) return;
                            if (isNoOpWrapperBody(decl.id.name, decl.init.body.body)) noOpWrappers.add(decl.id.name);
                        });
                    }
                });
            };

            return {
                visitor: {
                    Program: {
                        enter(path) {
                            seedNoOpWrappers(path.node);
                        }
                    },
                    VariableDeclarator: {
                        enter(path) {
                            if (!t.isIdentifier(path.node.id)) return;
                            const varName = path.node.id.name;
                            const initNode = path.node.init;
                            const binding = path.scope.getBinding(varName);

                            if (binding && binding.constant && initNode && isLiteralLike(initNode)) {
                                binding.referencePaths.forEach((refPath) => {
                                    refPath.replaceWith(t.cloneNode(initNode, true));
                                    replacedCount++;
                                });
                            }

                            if (binding && binding.constant && t.isArrayExpression(initNode)) {
                                let ok = true;
                                const values = [];
                                initNode.elements.forEach((el) => {
                                    const parsed = nodeToLiteralValue(el);
                                    if (!parsed.ok) ok = false;
                                    values.push(parsed.ok ? parsed.value : undefined);
                                });
                                if (ok) constArrayDict[varName] = values;
                            }

                            if (t.isIdentifier(path.node.init)) {
                                if (binding && binding.constant) {
                                    binding.referencePaths.forEach((refPath) => {
                                        refPath.replaceWith(t.identifier(path.node.init.name));
                                        replacedCount++;
                                    });
                                }
                            } else if (t.isObjectExpression(path.node.init)) {
                                const objName = path.node.id.name;
                                proxyDict[objName] = {};
                                path.node.init.properties.forEach((prop) => {
                                    if (!t.isObjectProperty(prop)) return;
                                    let keyName = prop.key.name || (t.isLiteral(prop.key) ? prop.key.value : null);
                                    if (keyName === null || keyName === undefined) return;
                                    
                                    if (t.isFunctionExpression(prop.value) || t.isArrowFunctionExpression(prop.value)) {
                                        const body = prop.value.body;
                                        if (t.isBlockStatement(body) && body.body.length === 1 && t.isReturnStatement(body.body[0])) {
                                            proxyDict[objName][keyName] = { type: 'function', funcNode: prop.value };
                                        } else if (!t.isBlockStatement(body)) {
                                            proxyDict[objName][keyName] = { type: 'function_expr', expr: body, params: prop.value.params };
                                        }
                                    } else if (t.isStringLiteral(prop.value) || t.isNumericLiteral(prop.value)) {
                                        proxyDict[objName][keyName] = { type: 'literal', valueNode: prop.value };
                                    }
                                });
                            }
                        },
                        exit(path) {
                            if (!t.isIdentifier(path.node.id)) return;
                            const binding = path.scope.getBinding(path.node.id.name);
                            if (!binding) return;
                            if (binding.constantViolations && binding.constantViolations.length > 0) return;
                            if (binding.referencePaths && binding.referencePaths.length > 0) return;

                            if (!path.node.init) {
                                path.remove();
                                replacedCount++;
                                return;
                            }

                            const initPath = path.get('init');
                            if (initPath && typeof initPath.isPure === 'function' && initPath.isPure()) {
                                path.remove();
                                replacedCount++;
                                const declPath = path.parentPath;
                                if (declPath && declPath.isVariableDeclaration() && declPath.node.declarations.length === 0) {
                                    declPath.remove();
                                }
                            }
                        }
                    },

                    FunctionDeclaration(path) {
                        const name = path.node.id && path.node.id.name;
                        if (!name || !path.node.body || !Array.isArray(path.node.body.body)) return;
                        const stmts = path.node.body.body;

                        if (stmts.length === 0) {
                            noOpWrappers.add(name);
                            return;
                        }

                        if (stmts.length === 1 && t.isExpressionStatement(stmts[0]) && t.isAssignmentExpression(stmts[0].expression, { operator: '=' })) {
                            const assign = stmts[0].expression;
                            if (t.isIdentifier(assign.left, { name }) && t.isFunctionExpression(assign.right)) {
                                const rhsBody = assign.right.body && assign.right.body.body;
                                if (Array.isArray(rhsBody) && rhsBody.length === 0) {
                                    noOpWrappers.add(name);
                                }
                            }
                        }
                    },
                    "FunctionDeclaration|FunctionExpression"(path) {
                        const node = path.node;
                        const name = node.id && node.id.name;
                        if (!name || !noOpWrappers.has(name)) return;
                        const binding = path.scope.getBinding(name);
                        if (binding && binding.referencePaths) {
                            const externalRefs = binding.referencePaths.filter((refPath) => {
                                return !refPath.findParent((p) => p === path);
                            });
                            if (externalRefs.length > 0) return;
                            if (path.isFunctionDeclaration()) {
                                path.remove();
                            } else {
                                path.replaceWith(t.functionExpression(null, node.params || [], t.blockStatement([])));
                            }
                            replacedCount++;
                        }
                    },
                    
                    // 3. Proxy/member resolution
                    MemberExpression(path) {
                        const keyInfo = getMemberKey(path.node);

                        if (path.node.computed && t.isStringLiteral(path.node.property) && isDotSafeKey(path.node.property.value)) {
                            path.node.computed = false;
                            path.node.property = t.identifier(path.node.property.value);
                            replacedCount++;
                            return;
                        }

                        if (t.isIdentifier(path.node.object) && keyInfo.ok) {
                            const objName = path.node.object.name;
                            if (Object.prototype.hasOwnProperty.call(constArrayDict, objName)) {
                                const values = constArrayDict[objName];
                                const idx = Number(keyInfo.value);
                                if (Number.isInteger(idx) && idx >= 0 && idx < values.length) {
                                    const literalNode = toLiteralNode(values[idx]);
                                    if (literalNode) {
                                        path.replaceWith(literalNode);
                                        replacedCount++;
                                        return;
                                    }
                                }
                            }
                        }

                        if (t.isIdentifier(path.node.object)) {
                            const objName = path.node.object.name;
                            let keyName = keyInfo.ok ? keyInfo.value : null;
                            
                            if (keyName !== null && keyName !== undefined && proxyDict[objName] && proxyDict[objName][keyName]) {
                                const entry = proxyDict[objName][keyName];
                                if (entry.type === 'literal') {
                                    path.replaceWith(t.cloneNode(entry.valueNode));
                                    replacedCount++;
                                    return;
                                }
                            }
                        }

                        if (!canReplaceMemberExpression(path)) return;
                        tryReplaceByEvaluation(path);
                    },
                    
                    CallExpression(path) {
                        if (t.isIdentifier(path.node.callee) && noOpWrappers.has(path.node.callee.name)) {
                            const args = path.node.arguments.map((arg) => t.cloneNode(arg, true));
                            if (args.length === 0) {
                                path.replaceWith(t.unaryExpression('void', t.numericLiteral(0), true));
                            } else if (args.length === 1) {
                                path.replaceWith(args[0]);
                            } else {
                                path.replaceWith(t.sequenceExpression(args));
                            }
                            replacedCount++;
                            return;
                        }

                        // 4. 譁・ｭ怜・繝・さ繝ｼ繝繝ｼ隧穂ｾ｡
                        if (t.isIdentifier(path.node.callee)) {
                            const funcName = path.node.callee.name;
                            if (blockedCallees.has(funcName)) return;
                            
                            const isLiteral = isLiteralLike;
                            
                            if (path.node.arguments.length > 0 && path.node.arguments.every(isLiteral)) {
                                const callCode = code.substring(path.node.start, path.node.end);
                                try {
                                    const res = win.eval(callCode);
                                    const literalNode = toLiteralNode(res);
                                    if (literalNode) { path.replaceWith(literalNode); replacedCount++; return; }
                                } catch (e) {}
                            }
                        }

                        // 5. Inline proxy function calls
                        if (t.isMemberExpression(path.node.callee)) {
                            const mem = path.node.callee;
                            if (t.isIdentifier(mem.object)) {
                                const objName = mem.object.name;
                                const keyInfo = getMemberKey(mem);
                                let keyName = keyInfo.ok ? keyInfo.value : null;
                                
                                if (keyName !== null && keyName !== undefined && proxyDict[objName] && proxyDict[objName][keyName]) {
                                    const entry = proxyDict[objName][keyName];
                                    if (entry.type === 'function' || entry.type === 'function_expr') {
                                        let retNode = entry.type === 'function' ? entry.funcNode.body.body[0].argument : entry.expr;
                                        let params = entry.type === 'function' ? entry.funcNode.params : entry.params;
                                        const args = path.node.arguments;
                                        const paramMap = {};
                                        const safeParams = Array.isArray(params) ? params : [];
                                        safeParams.forEach((p, idx) => {
                                            if (args[idx] && t.isIdentifier(p)) paramMap[p.name] = args[idx];
                                        });
                                        
                                        const replaceParams = (node) => {
                                            if (Array.isArray(node)) {
                                                return node.map((n) => replaceParams(n)).filter((n) => n !== undefined);
                                            }
                                            if (node === null || node === undefined) return node;
                                            if (typeof node !== 'object') return node;
                                            if (t.isIdentifier(node) && Object.prototype.hasOwnProperty.call(paramMap, node.name)) {
                                                return t.cloneNode(paramMap[node.name], true);
                                            }
                                            if (typeof node.type !== 'string') return node;

                                            const cloned = t.cloneNode(node, false);
                                            Object.keys(cloned).forEach((key) => {
                                                const value = cloned[key];
                                                if (Array.isArray(value)) {
                                                    cloned[key] = value.map((n) => replaceParams(n)).filter((n) => n !== undefined);
                                                } else if (value && typeof value === 'object' && typeof value.type === 'string') {
                                                    const replaced = replaceParams(value);
                                                    if (replaced !== undefined) cloned[key] = replaced;
                                                }
                                            });
                                            return cloned;
                                        };
                                        const inlined = replaceParams(retNode);
                                        if (inlined && typeof inlined.type === 'string') { path.replaceWith(inlined); replacedCount++; return;}
                                    }
                                }
                            }
                        }

                        if (path.node.arguments.length > 0 && path.node.arguments.every(isLiteralLike)) {
                            const callCode = code.substring(path.node.start, path.node.end);
                            try {
                                const res = win.eval(callCode);
                                const literalNode = toLiteralNode(res);
                                if (literalNode) { path.replaceWith(literalNode); replacedCount++; return; }
                            } catch (e) {}
                        }
                    },
                    
                    // 6. 螳壽焚逡ｳ縺ｿ霎ｼ縺ｿ
                    EmptyStatement(path) {
                        path.remove();
                    },

                    ExpressionStatement(path) {
                        if (!t.isSequenceExpression(path.node.expression)) return;
                        const exprs = path.node.expression.expressions || [];
                        if (exprs.length <= 1) return;
                        path.replaceWithMultiple(exprs.map((expr) => t.expressionStatement(expr)));
                        replacedCount++;
                    },

                    BinaryExpression(path) { tryReplaceByEvaluation(path); },
                    UnaryExpression(path) { tryReplaceByEvaluation(path); },
                    LogicalExpression(path) { tryReplaceByEvaluation(path); },
                    ConditionalExpression(path) { tryReplaceByEvaluation(path); },
                    IfStatement(path) {
                        try {
                            const evaluated = path.get('test').evaluate();
                            if (!evaluated.confident || typeof evaluated.value !== 'boolean') return;
                            if (evaluated.value) {
                                if (t.isBlockStatement(path.node.consequent)) {
                                    path.replaceWithMultiple(path.node.consequent.body);
                                } else {
                                    path.replaceWith(path.node.consequent);
                                }
                            } else if (path.node.alternate) {
                                if (t.isBlockStatement(path.node.alternate)) {
                                    path.replaceWithMultiple(path.node.alternate.body);
                                } else {
                                    path.replaceWith(path.node.alternate);
                                }
                            } else {
                                path.remove();
                            }
                            foldedCount++;
                        } catch (e) {}
                    },

                    // 7. 蛻ｶ蠕｡繝輔Ο繝ｼ蟷ｳ蝮ｦ蛹悶・隗｣髯､
                    WhileStatement(path) {
                        const body = path.node.body;
                        if (!t.isBlockStatement(body)) return;
                        const switchStmt = body.body.find(n => t.isSwitchStatement(n));
                        if (!switchStmt) return;
                        
                        // 繝代ち繝ｼ繝ｳA: 驟榊・繧ｷ繝輔ヨ蝙・(Obfuscator.io)
                        if (t.isMemberExpression(switchStmt.discriminant) && t.isUpdateExpression(switchStmt.discriminant.property)) {
                            const arrayName = switchStmt.discriminant.object.name;
                            const binding = path.scope.getBinding(arrayName);
                            if (binding && binding.path.isVariableDeclarator()) {
                                const init = binding.path.node.init;
                                let seq;
                                const evalRes = binding.path.get('init').evaluate();
                                if (evalRes.confident && Array.isArray(evalRes.value)) {
                                    seq = evalRes.value;
                                } else {
                                    try {
                                        let codePart = "";
                                        try {
                                            codePart = Babel.transformFromAst(t.program([t.expressionStatement(init)]), "", {ast: false, code: true}).code || "";
                                        } catch (eGen) {
                                            if (Number.isInteger(init.start) && Number.isInteger(init.end) && init.end > init.start) {
                                                codePart = code.slice(init.start, init.end);
                                            }
                                        }
                                        if (codePart) seq = win.eval(codePart);
                                    } catch(e) {}
                                }
                                
                                if (Array.isArray(seq)) {
                                    const caseMap = {};
                                    switchStmt.cases.forEach(c => {
                                        if (c.test && (t.isStringLiteral(c.test) || t.isNumericLiteral(c.test))) {
                                            caseMap[c.test.value] = c.consequent.filter(n => !t.isContinueStatement(n) && !t.isBreakStatement(n));
                                        }
                                    });
                                    
                                    let unflattened =[];
                                    let valid = true;
                                    seq.forEach(key => {
                                        if (caseMap[key]) unflattened = unflattened.concat(caseMap[key]);
                                        else valid = false;
                                    });
                                    
                                    if (valid && unflattened.length > 0) {
                                        path.replaceWithMultiple(unflattened);
                                        replacedCount++;
                                    }
                                }
                            }
                        }
                        
                        // 繝代ち繝ｼ繝ｳB: 迥ｶ諷句､画焚莉｣蜈･蝙・(Example 4蟇ｾ蠢・
                        if (t.isIdentifier(switchStmt.discriminant)) {
                            const stateVarName = switchStmt.discriminant.name;
                            const binding = path.scope.getBinding(stateVarName);
                            if (binding && binding.path.isVariableDeclarator()) {
                                const initVal = binding.path.node.init;
                                if (t.isNumericLiteral(initVal) || t.isStringLiteral(initVal)) {
                                    let currentState = initVal.value;
                                    const caseMap = {};
                                    switchStmt.cases.forEach(c => {
                                        if (c.test && (t.isNumericLiteral(c.test) || t.isStringLiteral(c.test))) {
                                            const stmts = c.consequent.filter(stmt => !t.isBreakStatement(stmt));
                                            let nextState = null;
                                            const cleanStmts =[];
                                            for (const stmt of stmts) {
                                                // 逶ｴ荳九・莉｣蜈･
                                                if (t.isExpressionStatement(stmt) && t.isAssignmentExpression(stmt.expression) &&
                                                    t.isIdentifier(stmt.expression.left, { name: stateVarName })) {
                                                    if (t.isNumericLiteral(stmt.expression.right) || t.isStringLiteral(stmt.expression.right)) {
                                                        nextState = stmt.expression.right.value;
                                                        continue; // 莉｣蜈･蠑上・蜑企勁
                                                    }
                                                }
                                                // 繝悶Ο繝・け蜀・・莉｣蜈･ (Example 4蟇ｾ遲・
                                                if (t.isBlockStatement(stmt)) {
                                                    let innerNextState = null;
                                                    const cleanInner =[];
                                                    for (const inner of stmt.body) {
                                                        if (t.isExpressionStatement(inner) && t.isAssignmentExpression(inner.expression) &&
                                                            t.isIdentifier(inner.expression.left, { name: stateVarName })) {
                                                            if (t.isNumericLiteral(inner.expression.right) || t.isStringLiteral(inner.expression.right)) {
                                                                innerNextState = inner.expression.right.value;
                                                                continue;
                                                            }
                                                        }
                                                        cleanInner.push(inner);
                                                    }
                                                    if (innerNextState !== null) {
                                                        nextState = innerNextState;
                                                        stmt.body = cleanInner;
                                                    }
                                                }
                                                cleanStmts.push(stmt);
                                            }
                                            caseMap[c.test.value] = { stmts: cleanStmts, nextState: nextState };
                                        }
                                    });
                                    
                                    const unflattened =[];
                                    let curr = currentState;
                                    let visited = new Set();
                                    
                                    while (curr !== null && caseMap[curr] && !visited.has(curr)) {
                                        visited.add(curr);
                                        unflattened.push(...caseMap[curr].stmts);
                                        curr = caseMap[curr].nextState;
                                    }
                                    
                                    if (unflattened.length > 0) {
                                        path.replaceWithMultiple(unflattened);
                                        replacedCount++;
                                    }
                                }
                            }
                        }
                    }
                }
            };
        };

        try {
            const transformed = Babel.transformFromAst(ast, code, {
                generatorOpts: { jsescOption: { minimal: true } },
                plugins:[deobfuscatePlugin]
            });
            document.body.removeChild(iframe);
            if (replacedCount > 0 || foldedCount > 0) {
                log(`AST Replace: Logic/Control Flow unflattened, ${replacedCount}points, Constant folding ${foldedCount}points`, "info");
            }
            return { code: transformed.code, changed: (replacedCount > 0 || foldedCount > 0) };
        } catch (e) {
            document.body.removeChild(iframe);
            log("AST transformation error: " + e.message, "error");
            return { code, changed: false };
        }
    }

        async function deepAutoSingle(code, label = "") {
        const prefix = label ? `[${label}] ` : "";
        let currentCode = code;
        let prevOverallCode = "";
        let globalIter = 0;
        const MAX_GLOBAL_ITER = 6;

        while (currentCode !== prevOverallCode && globalIter < MAX_GLOBAL_ITER) {
            prevOverallCode = currentCode;
            globalIter++;
            log(`${prefix}Pass ${globalIter}: Dynamic + AST`, "warning");
            
            const unpacked = await dynamicUnpack(currentCode);
            if (unpacked !== currentCode) currentCode = unpacked;

            let prevAstCode = "";
            let astIter = 0;
            const MAX_AST_ITER = 12;
            while (currentCode !== prevAstCode && astIter < MAX_AST_ITER) {
                prevAstCode = currentCode;
                const result = decodeStringsAST(currentCode);
                currentCode = result.code;
                if (!result.changed) break;
                astIter++;
            }
        }

        return { code: formatCode(currentCode), passes: globalIter };
    }

    document.getElementById('btn-dynamic').addEventListener('click', async () => {
        const snippets = splitInputIntoSnippets(inputEditor.value);
        if (!snippets.length) return;
        if (snippets.length > 1) log(`${snippets.length} snippets detected`, "info");

        const results = [];
        for (let i = 0; i < snippets.length; i++) {
            const snippet = snippets[i];
            if (snippet.title) log(`[${snippet.title}] Dynamic Unpack`, "warning");
            const unpacked = await dynamicUnpack(snippet.code);
            results.push({ title: snippet.title, code: formatCode(unpacked) });
        }
        outputEditor.value = buildMultiSnippetOutput(results);
    });
    
    document.getElementById('btn-strings').addEventListener('click', () => {
        const snippets = splitInputIntoSnippets(inputEditor.value);
        if (!snippets.length) return;
        if (snippets.length > 1) log(`${snippets.length} snippets detected`, "info");

        const results = snippets.map((snippet) => {
            if (snippet.title) log(`[${snippet.title}] Decode AST`, "warning");
            const result = decodeStringsAST(snippet.code);
            return { title: snippet.title, code: formatCode(result.code) };
        });
        outputEditor.value = buildMultiSnippetOutput(results);
    });

    // 4. Deep Auto Deobfuscate pipeline
    document.getElementById('btn-auto').addEventListener('click', async () => {
        const snippets = splitInputIntoSnippets(inputEditor.value);
        if (!snippets.length) return;
        
        log("==== Deep Auto Deobfuscation Start ====", "success");
        outputEditor.value = "Processing...";
        if (snippets.length > 1) log(`${snippets.length} snippets detected`, "info");

        const results = [];
        for (let i = 0; i < snippets.length; i++) {
            const snippet = snippets[i];
            const label = snippet.title || `Snippet ${i + 1}`;
            const result = await deepAutoSingle(snippet.code, label);
            results.push({ title: snippet.title || label, code: result.code });
            log(`[${label}] done (passes: ${result.passes})`, "success");
        }
        
        outputEditor.value = buildMultiSnippetOutput(results);
        log("==== Deep Auto Deobfuscation Done ====", "success");
    });
</script>
