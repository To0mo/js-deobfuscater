<!DOCTYPE html>
<html lang="ja">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <style>
        .CodeMirror {
            height: 480px !important;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 13px;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-indigo-500/30">

    <div class="flex flex-col h-screen">
        <!-- Header -->
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">

                <span class="text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/20 font-mono">HYBRID LOOP v3.4</span>
            </div>
            <div class="text-xs text-slate-500 font-mono">
                Babel AST（静的） ＋ Sandboxフック（動的） ハイブリッドデオブファスケータ
            </div>
        </header>

        <!-- Main Content (2 Column Layout) -->
        <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 p-4 min-h-0 bg-slate-950">
            <!-- Left: Input Area -->
            <div class="flex flex-col bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 gap-3 min-h-0">

                    </h2>
                    <button id="btn-clear" class="px-2.5 py-1 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-mono transition-colors border border-slate-700/50 flex items-center gap-1">

            <!-- Right: Output Area -->
            <div class="flex flex-col bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 gap-3 min-h-0">
                <div class="flex items-center justify-between">
                    <h2 class="font-mono text-xs font-semibold text-slate-400 flex items-center gap-2">
                        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
                        解析結果の表示 (Deobfuscated Output)
                    </h2>
                    <div class="flex gap-2">
                        <button id="btn-copy-input" class="px-2.5 py-1 text-xs bg-emerald-950/80 hover:bg-emerald-900/80 text-emerald-400 hover:text-emerald-300 rounded font-mono transition-colors border border-emerald-800/50 flex items-center gap-1" title="出力を入力に手動で戻します">
                            <i class="bi bi-arrow-left-circle"></i> 結果を入力へ転送
                        </button>
                        <button id="btn-copy" class="px-2.5 py-1 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-mono transition-colors border border-slate-700/50 flex items-center gap-1">

        <!-- Footer / Control Panel -->
        <section class="bg-slate-900 border-t border-slate-800 p-4 grid grid-cols-1 md:grid-cols-4 gap-4 shrink-0">
            <!-- Execution Controls -->
            <div class="flex flex-col justify-center gap-2">
                <button id="btn-run" class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold font-mono rounded-lg shadow-lg hover:shadow-indigo-500/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm">
                    <i class="bi bi-play-fill text-lg leading-none"></i>
                    自動再帰解析を実行
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-stop" class="py-1.5 px-2 bg-slate-800 hover:bg-rose-900/40 text-slate-400 hover:text-rose-300 rounded font-mono text-[11px] border border-slate-700/50 hover:border-rose-900/50 transition-all flex justify-center items-center gap-1">
                        <i class="bi bi-stop-circle"></i> 停止/リセット
                    </button>
                    <button id="btn-beautify" class="py-1.5 px-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-mono text-[11px] border border-slate-700/50 transition-all flex justify-center items-center gap-1">
                        <i class="bi bi-magic"></i> 整形のみ
                    </button>
                </div>
            </div>

            <!-- Console Log -->
            <div class="md:col-span-3 flex flex-col gap-1 min-h-0">
                <div class="flex items-center justify-between text-[11px] font-mono text-slate-500">
                    <span class="flex items-center gap-1"><i class="bi bi-terminal"></i> CONSOLE LOG</span>
                    <button id="btn-clear-log" class="hover:text-slate-300 transition-colors flex items-center gap-1"><i class="bi bi-eraser"></i> ログクリア</button>
                </div>
                <div id="console-log" class="bg-slate-950 border border-slate-800 rounded-lg p-3 font-mono text-xs h-28 overflow-y-auto flex flex-col gap-0.5">
                    <div class="text-slate-600">待機中。難読化コードを貼り付けて実行ボタンをクリックしてください。</div>
                </div>
            </div>
        </section>
    </div>

    <!-- CodeMirror, Babel Standalone & Beautify Libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify.min.js"></script>

    <script>
        // CodeMirror エディタ初期化
        const inputEditor = CodeMirror.fromTextArea(document.getElementById('input-code'), {
            lineNumbers: true,
            mode: 'javascript',
            theme: 'material-darker',
            lineWrapping: true
        });

        const outputEditor = CodeMirror.fromTextArea(document.getElementById('output-code'), {
            lineNumbers: true,
            mode: 'javascript',
            theme: 'material-darker',
            lineWrapping: true
        });

        // HTMLエスケープ
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        // ログ出力
        function log(message, type = 'info') {
            const consoleEl = document.getElementById('console-log');
            const item = document.createElement('div');
            item.className = 'py-0.5 flex items-start gap-2 text-[11px]';
            
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            
            let color = 'text-slate-500';
            let iconClass = 'bi-gear-fill';
            let label = '[SYSTEM]';
            
            if (type === 'success') { color = 'text-emerald-400'; iconClass = 'bi-check-circle-fill'; label = '[SUCCESS]'; }
            else if (type === 'error') { color = 'text-rose-400'; iconClass = 'bi-x-circle-fill'; label = '[ERROR]'; }
            else if (type === 'warn') { color = 'text-amber-400'; iconClass = 'bi-exclamation-triangle-fill'; label = '[WARN]'; }
            else if (type === 'info') { color = 'text-sky-400'; iconClass = 'bi-info-circle-fill'; label = '[INFO]'; }
            
            item.innerHTML = `
                <span class="text-slate-600 font-mono shrink-0">[${timeStr}]</span>
                <span class="${color} font-bold shrink-0 font-mono flex items-center gap-1"><i class="bi ${iconClass}"></i> ${label}</span>
                <span class="text-slate-300 font-mono break-all ml-1">${escapeHTML(message)}</span>
            `;
            
            consoleEl.appendChild(item);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // BabelによるASTベースの各種クレンジング（静的アンパッカー / 定数折りたたみ / デバッグ除去）
        function cleanWithBabel(rawCode) {
            try {
                const { transform, transformFromAst } = Babel;
                const t = Babel.types;

                // 1. 文字列配列デコーダーの静的復元と置換を適用するカスタムプラグイン
                const staticUnpackerPlugin = function({ types: t }) {
                    return {
                        visitor: {
                            Program(programPath) {
                                let arrayFuncName = "";
                                let arrayFuncNode = null;
                                let shiftIIFENode = null;
                                let decoderFuncName = "";
                                let decoderFuncNode = null;
                                let decoderAliasNames = new Set();

                                // 配列関数の特定 (5要素以上の配列を持つプログラム直下の関数)
                                programPath.traverse({
                                    FunctionDeclaration(path) {
                                        if (path.parentPath.type !== 'Program') return;
                                        const node = path.node;
                                        let hasLargeArray = false;
                                        path.traverse({
                                            VariableDeclarator(vPath) {
                                                if (vPath.node.init && vPath.node.init.type === 'ArrayExpression') {
                                                    if (vPath.node.init.elements.length >= 5) {
                                                        hasLargeArray = true;
                                                    }
                                                }
                                            }
                                        });
                                        if (hasLargeArray) {
                                            arrayFuncName = node.id.name;
                                            arrayFuncNode = node;
                                        }
                                    }
                                });

                                if (!arrayFuncName) return;
                                log(`Babel: 文字列配列関数を検出 -> ${arrayFuncName}`, 'info');

                                // 配列シフトIIFEとデコーダーの特定
                                programPath.traverse({
                                    ExpressionStatement(path) {
                                        if (path.parentPath.type !== 'Program') return;
                                        const expr = path.node.expression;
                                        // 単一のCallExpressionの場合
                                        if (expr && expr.type === 'CallExpression') {
                                            const args = expr.arguments;
                                            if (args.some(arg => arg.type === 'Identifier' && arg.name === arrayFuncName)) {
                                                shiftIIFENode = path.node;
                                            }
                                        } 
                                        // カンマ連結(SequenceExpression)の中にIIFEがある場合
                                        else if (expr && expr.type === 'SequenceExpression') {
                                            expr.expressions.forEach(subExpr => {
                                                if (subExpr.type === 'CallExpression') {
                                                    const args = subExpr.arguments;
                                                    if (args.some(arg => arg.type === 'Identifier' && arg.name === arrayFuncName)) {
                                                        shiftIIFENode = subExpr; // CallExpressionノード単体として抽出
                                                    }
                                                }
                                            });
                                        }
                                    },
                                    FunctionDeclaration(path) {
                                        if (path.parentPath.type !== 'Program') return;
                                        const node = path.node;
                                        if (node.id.name === arrayFuncName) return;
                                        
                                        let callsArrayFunc = false;
                                        programPath.traverse({
                                            CallExpression(innerPath) {
                                                if (innerPath.node.callee.name === arrayFuncName) {
                                                    callsArrayFunc = true;
                                                }
                                            }
                                        });
                                        if (callsArrayFunc) {
                                            decoderFuncName = node.id.name;
                                            decoderFuncNode = node;
                                        }
                                    }
                                });

                                if (!decoderFuncName) return;
                                log(`Babel: デコーダー関数を検出 -> ${decoderFuncName}`, 'info');

                                // エイリアス（別名）の特定
                                programPath.traverse({
                                    VariableDeclarator(path) {
                                        const node = path.node;
                                        if (node.init && node.init.type === 'Identifier' && node.init.name === decoderFuncName) {
                                            decoderAliasNames.add(node.id.name);
                                            log(`Babel: デコーダーの別名を検出 -> ${node.id.name}`, 'info');
                                        }
                                    }
                                });

                                // 安全なコード生成とブラウザ内実体化 (transformFromAst を使用)
                                try {
                                    const arrayFuncStr = transformFromAst(t.program([arrayFuncNode]), null, {}).code;
                                    
                                    // shiftIIFEがExpressionStatementか、CallExpression単体かでラップ方式を切り分ける
                                    let shiftIIFEStr = "";
                                    if (shiftIIFENode) {
                                        if (shiftIIFENode.type === 'ExpressionStatement') {
                                            shiftIIFEStr = transformFromAst(t.program([shiftIIFENode]), null, {}).code;
                                        } else {
                                            // CallExpression単体ならExpressionStatementに包む
                                            shiftIIFEStr = transformFromAst(t.program([t.expressionStatement(shiftIIFENode)]), null, {}).code;
                                        }
                                    }
                                    
                                    const decoderFuncStr = transformFromAst(t.program([decoderFuncNode]), null, {}).code;

                                    const executionCode = `
                                        (function() {
                                            ${arrayFuncStr}
                                            ${shiftIIFEStr}
                                            ${decoderFuncStr}
                                            window.__tempDecoder = ${decoderFuncName};
                                        })();
                                    `;
                                    
                                    eval(executionCode);

                                    if (typeof window.__tempDecoder === 'function') {
                                        log('Babel: デコード関数をエミュレート。置換を開始...', 'info');
                                        let replacedCount = 0;

                                        programPath.traverse({
                                            CallExpression(path) {
                                                const callee = path.node.callee;
                                                const isDirectCall = callee.type === 'Identifier' && (callee.name === decoderFuncName || decoderAliasNames.has(callee.name));
                                                if (isDirectCall) {
                                                    const args = path.node.arguments;
                                                    if (args.length > 0) {
                                                        try {
                                                            let argVal;
                                                            if (args[0].type === 'NumericLiteral' || args[0].type === 'StringLiteral') {
                                                                argVal = args[0].value;
                                                            } else if (args[0].type === 'BinaryExpression') {
                                                                const evaluated = path.get('arguments.0').evaluate();
                                                                if (evaluated.confident) {
                                                                    argVal = evaluated.value;
                                                                }
                                                            }

                                                            if (argVal !== undefined) {
                                                                const decryptedStr = window.__tempDecoder(argVal);
                                                                if (typeof decryptedStr === 'string') {
                                                                    path.replaceWith(t.stringLiteral(decryptedStr));
                                                                    replacedCount++;
                                                                }
                                                            }
                                                        } catch (e) {}
                                                    }
                                                }
                                            }
                                        });

                                        log(`Babel: 合計 ${replacedCount} 箇所の難読化文字列を解決・展開。`, 'success');

                                        // 不要になった定義をピンポイントで削除 (カンマ連結されたシフトIIFEを安全に部分除去)
                                        programPath.traverse({
                                            FunctionDeclaration(path) {
                                                if (path.node.id.name === arrayFuncName || path.node.id.name === decoderFuncName) {
                                                    path.remove();
                                                }
                                            },
                                            CallExpression(path) {
                                                // 呼び出しの引数に arrayFuncName を持っている CallExpression (シフトIIFE) のみをピンポイントで除去
                                                const args = path.node.arguments;
                                                const isShiftIIFE = args.some(arg => arg.type === 'Identifier' && arg.name === arrayFuncName);
                                                if (isShiftIIFE) {
                                                    log(`Babel: シフトIIFEを検出して除去しました。`, 'info');
                                                    path.remove();
                                                }
                                            },
                                            VariableDeclarator(path) {
                                                const isDecoderDeclaration = path.node.init && path.node.init.type === 'Identifier' && 
                                                    (path.node.init.name === decoderFuncName || decoderAliasNames.has(path.node.init.name));
                                                
                                                if (isDecoderDeclaration) {
                                                    if (path.parent.declarations.length > 1) {
                                                        path.remove(); // 単体削除
                                                    } else {
                                                        path.parentPath.remove(); // 1つだけならステートメントごと削除
                                                    }
                                                }
                                            }
                                        });
                                    }
                                    delete window.__tempDecoder;
                                } catch (e) {
                                    log('Babel: 静的解決中のエラー: ' + e.message, 'error');
                                }
                            }
                        }
                    };
                };

                // その他のプラグイン (定数折りたたみ、アンチデバッグ回避)
                const otherPlugins = [
                    // 定数折りたたみ (BinaryExpressionを静的評価)
                    function({ types: t }) {
                        return {
                            visitor: {
                                BinaryExpression(path) {
                                    const evaluated = path.evaluate();
                                    if (evaluated.confident) {
                                        const value = evaluated.value;
                                        if (typeof value === 'number') {
                                            path.replaceWith(t.numericLiteral(value));
                                        } else if (typeof value === 'string') {
                                            path.replaceWith(t.stringLiteral(value));
                                        } else if (typeof value === 'boolean') {
                                            path.replaceWith(t.booleanLiteral(value));
                                        }
                                    }
                                }
                            }
                        };
                    },
                    // 各種アンチデバッグ回避
                    function({ types: t }) {
                        return {
                            visitor: {
                                DebuggerStatement(path) {
                                    path.remove();
                                },
                                RegExpLiteral(path) {
                                    const pattern = path.node.pattern;
                                    if (pattern.includes('(((.+)+)+)+$')) {
                                        path.node.pattern = '.*';
                                    }
                                },
                                NewExpression(path) {
                                    if (t.isIdentifier(path.node.callee, { name: 'RegExp' })) {
                                        const args = path.node.arguments;
                                        if (args.length > 0 && t.isStringLiteral(args[0])) {
                                            const val = args[0].value;
                                            if (val.includes('(((.+)+)+)+$') || val.includes('sys_')) {
                                                args[0].value = '.*';
                                            }
                                        }
                                    }
                                },
                                CallExpression(path) {
                                    const callee = path.node.callee;
                                    if (t.isIdentifier(callee, { name: 'setInterval' }) || t.isIdentifier(callee, { name: 'setTimeout' })) {
                                        let hasDebugger = false;
                                        path.traverse({
                                            DebuggerStatement(innerPath) {
                                                hasDebugger = true;
                                            }
                                        });
                                        if (hasDebugger) {
                                            path.remove();
                                        }
                                    }
                                }
                            }
                        };
                    }
                ];

                // 2段階に分けて変換する (1段階目で文字列展開、2段階目で定数折りたたみ・デバッグ除去)
                const res1 = transform(rawCode, {
                    plugins: [staticUnpackerPlugin],
                    compact: false,
                    retainLines: true
                });

                const res2 = transform(res1.code, {
                    plugins: otherPlugins,
                    compact: false,
                    retainLines: true
                });

                return res2.code;
            } catch (err) {
                log('Babel: ASTクレンジング処理でエラーが発生しました。 ' + err.message, 'error');
                return rawCode;
            }
        }

        let sandboxIframe = null;
        let isLoopRunning = false;
        let iterationCount = 0;
        const maxIterations = 8; // 無限ループ防止閾値

        // 1回分の解析と結果待機
        function runSingleDeobfuscateStep(code) {
            return new Promise((resolve) => {
                let resolved = false;

                // タイムアウト設定 (1.8秒間フックに何もかからなければ動的終了と判定)
                const timeoutId = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        cleanup();
                        resolve(null);
                    }
                }, 1800);

                function messageListener(event) {
                    const data = event.data;
                    if (!data) return;

                    if (data.type === 'deobfuscated') {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeoutId);
                            cleanup();
                            // キャプチャされたコードをBabel静的クレンジングして返す
                            const cleanResult = cleanWithBabel(data.code);
                            resolve(cleanResult);
                        }
                    } else if (data.type === 'log') {
                        log(data.message, data.level);
                    }
                }

                window.addEventListener('message', messageListener);

                function cleanup() {
                    window.removeEventListener('message', messageListener);
                    stopSandbox();
                }

                executeInSandbox(code);
            });
        }

        // サンドボックス起動
        function executeInSandbox(code) {
            // 実行前にBabelクレンジング（静的アンパック含む）を通す
            const sanitizedCode = cleanWithBabel(code);

            sandboxIframe = document.createElement('iframe');
            sandboxIframe.id = 'sandbox-iframe';
            sandboxIframe.style.display = 'none';
            sandboxIframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
            document.body.appendChild(sandboxIframe);

            const iframeDoc = sandboxIframe.contentWindow.document;

            iframeDoc.open();
            iframeDoc.write('<!DOCTYPE html><html><head></head><body></body></html>');
            iframeDoc.close();

            const hookScript = iframeDoc.createElement('script');
            hookScript.textContent = `
                (function() {
                    const originalFunction = window.Function;
                    const originalEval = window.eval;
                    const originalToString = Function.prototype.toString;

                    window.sendToParent = function(type, payload) {
                        window.parent.postMessage(Object.assign({ type: type }, payload), '*');
                    };

                    function handleCapturedCode(rawCode) {
                        if (typeof rawCode === 'string' && rawCode.trim().length > 0) {
                            window.sendToParent('deobfuscated', { code: rawCode });
                        }
                    }

                    // --- [Self Defending 回避] ---
                    Function.prototype.toString = function() {
                        const str = originalToString.call(this);
                        if (this === Function.prototype.toString) {
                            return originalToString.call(originalToString);
                        }
                        if (typeof this === 'function' && !str.includes('[native code]')) {
                            return str.replace(/\\r?\\n/g, '').replace(/\\s+/g, ' ');
                        }
                        return str;
                    };

                    // Function フック
                    const functionHook = function(...args) {
                        if (args.length > 0) {
                            handleCapturedCode(args[args.length - 1]);
                        }
                        if (new.target) {
                            return Reflect.construct(originalFunction, args, new.target);
                        }
                        return originalFunction(...args);
                    };

                    Object.defineProperty(Function.prototype, 'constructor', {
                        value: functionHook,
                        writable: true,
                        configurable: true
                    });
                    window.Function = functionHook;

                    // eval フック
                    window.eval = function(code) {
                        handleCapturedCode(code);
                        return originalEval(code);
                    };

                    const originalSearch = String.prototype.search;
                    String.prototype.search = function(regexp) {
                        const searchStr = typeof regexp === 'string' ? regexp : (regexp instanceof RegExp ? regexp.source : '');
                        if (searchStr.includes('(((.+)+)+)+$') || searchStr.includes('sys_')) {
                            window.sendToParent('log', { message: 'Hook: search() の自己防御を回避しました。', level: 'warn' });
                            return 0; 
                        }
                        return originalSearch.apply(this, arguments);
                    };

                    const originalTest = RegExp.prototype.test;
                    RegExp.prototype.test = function(str) {
                        if (this.toString().includes('(((.+)+)+)+$')) {
                            window.sendToParent('log', { message: 'Hook: test() の自己防御を回避しました。', level: 'warn' });
                            return true;
                        }
                        return originalTest.apply(this, arguments);
                    };

                    window.addEventListener('error', function(e) {
                        window.sendToParent('log', { message: 'サンドボックス内エラー: ' + e.message, level: 'error' });
                    });

                    window.sendToParent('log', { message: 'フック環境の準備完了。実行します。', level: 'info' });
                })();
            `;
            iframeDoc.body.appendChild(hookScript);

            const userScriptElement = iframeDoc.createElement('script');
            userScriptElement.textContent = `
                try {
                    ${sanitizedCode}
                } catch (err) {
                    window.sendToParent('log', { message: '実行中断（例外）: ' + err.message, level: 'error' });
                }
            `;
            iframeDoc.body.appendChild(userScriptElement);
        }

        // 自動ループ解析の開始
        async function startAutoDeobfuscateLoop() {
            const initialCode = inputEditor.getValue().trim();
            if (!initialCode) {
                log('実行対象のコードが入力されていません。', 'warn');
                return;
            }

            isLoopRunning = true;
            iterationCount = 0;
            let lastCode = initialCode;
            let currentIterationCode = initialCode;

            log('--- 静的・動的ハイブリッド自動解析を開始 ---', 'info');

            while (isLoopRunning && iterationCount < maxIterations) {
                iterationCount++;
                log(`[Phase ${iterationCount}] 解析を開始します...`, 'info');

                // 1ステップ（静的Babel + 動的Sandboxフック）実行
                const stepResult = await runSingleDeobfuscateStep(currentIterationCode);

                // もし動的フックに何もかからなかった場合、または最初の静的アンパックだけで
                // 完全にコードが展開された場合のフェールセーフ
                const currentUnpackedCode = cleanWithBabel(currentIterationCode);

                if (!stepResult) {
                    log(`[Phase ${iterationCount}] 解析完了。静的アンパッカーおよび定数折りたたみを適用します。`, 'success');
                    outputEditor.setValue(currentUnpackedCode);
                    formatOutput();
                    break;
                }

                // 変化がなくなったか判定 (スペース排除して比較)
                const normalizedLast = lastCode.replace(/\s+/g, '');
                const normalizedNext = stepResult.replace(/\s+/g, '');

                if (normalizedLast === normalizedNext) {
                    log(`[Phase ${iterationCount}] 出力にこれ以上の変化はありません。解析を完了します。`, 'success');
                    break;
                }

                log(`[Phase ${iterationCount}] レイヤーの解読に成功。さらに下層を自動解析します。`, 'success');
                lastCode = stepResult;
                currentIterationCode = stepResult;

                outputEditor.setValue(stepResult);
                formatOutput();

                // UIフリーズ防止
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            isLoopRunning = false;
            log('--- すべての自動展開・解析が終了しました ---', 'success');
        }

        // サンドボックス消去
        function stopSandbox() {
            if (sandboxIframe) {
                sandboxIframe.remove();
                sandboxIframe = null;
            }
        }

        // コード整形
        function formatOutput() {
            const code = outputEditor.getValue();
            if (!code) return;
            try {
                const formatted = js_beautify(code, {
                    indent_size: 2,
                    space_in_empty_paren: true,
                    unescape_strings: true
                });
                outputEditor.setValue(formatted);
            } catch (err) {
                log('整形でエラーが発生しました。', 'error');
            }
        }

        // イベントリスナー群
        document.getElementById('btn-run').addEventListener('click', startAutoDeobfuscateLoop);
        
        document.getElementById('btn-stop').addEventListener('click', () => {
            isLoopRunning = false;
            stopSandbox();
            log('稼働中の解析ループおよびサンドボックスを強制停止しました。', 'warn');
        });
        
        document.getElementById('btn-beautify').addEventListener('click', () => {
            formatOutput();
            log('コードの整形を実行しました。', 'success');
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            inputEditor.setValue('');
            log('入力エリアをクリアしました。', 'info');
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            const code = outputEditor.getValue();
            if (code) {
                navigator.clipboard.writeText(code);
                log('出力コードをコピーしました。', 'success');
            } else {
                log('コピーするコードがありません。', 'warn');
            }
        });

        document.getElementById('btn-copy-input').addEventListener('click', () => {
            const code = outputEditor.getValue();
            if (code) {
                inputEditor.setValue(code);
                outputEditor.setValue('');
                log('結果を入力エリアに転送しました。', 'info');
            } else {
                log('転送するコードがありません。', 'warn');
            }
        });

        document.getElementById('btn-clear-log').addEventListener('click', () => {
            const consoleEl = document.getElementById('console-log');
            consoleEl.innerHTML = '<div class="text-slate-600">ログをクリアしました。</div>';
        });
    </script>
</body>
</html>
